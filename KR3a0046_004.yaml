body:
  text: 欽定四庫全書御定小學集注卷四內篇稽古第四稽考也考虞夏商周聖賢已行之迹以證前篇立教明倫敬身之言也凡四十七章孟子道性善言必稱堯舜朱子曰道言也性者人所稟於天以生之理也渾然至善未嘗有惡人與堯舜初無少異但衆人汨沒於私欲而失之堯舜則無私欲之蔽而能充其性爾故孟子每道性善而必稱堯舜以實之欲人知仁義不假外求聖人可學而至而不懈於用力也其言曰舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也憂之如何如舜而已矣其指孟子也朱子曰法者人倫而已鄉人鄉里之常人也托往行實前言述此篇使讀者有所興起托音只托猶采也實猶證也興起謂感動奮發而為善也太任文王之母摰任氏之中女也王季娶以為妃摰音至中音仲太尊稱任姓文王周國之君摰國名中女次女王季文王之父太任之性端一誠莊惟德之行及其娠文王目不視惡色耳不聽淫聲口不出敖言生文王而明聖太任教之以一而識百卒為周宗君子謂太任為能胎教娠音身敖音傲端正純一誠實莊肅性之美也惟德是行行之美也娠妊也始受命曰宗太任性行既美又能胎教故文王之生明無不照聖無不通教之以一即能識百後為周家始受命之君也此托太任之行以實首篇胎教之言後皆放此然或詳或略未必盡同讀者宜求其大意焉孟軻之母其舍近墓孟子之少也嬉戲為墓間之事踊躍築埋孟母曰此非所以居子也乃去舍市其嬉戲為賈衒孟母曰此非所以居子也乃徙舍學宮之旁其嬉戲乃設俎豆揖讓進退孟母曰此真可以居子矣遂居之賈音古衒音炫軻孟子名舍居也踊躍哭狀築埋葬事坐而賣曰賈行而賣曰衒徙遷也俎豆禮器揖讓進退禮容孟子幼時問東家殺豬何為母曰欲啖汝既而悔曰吾聞古有胎教今適有知而欺之是教之不信乃買豬肉以食之啖音淡食音似啖食也欲啖汝戲答之也適猶方也欺誑也信實也買肉食之以見前言之非誑既長就學遂成大儒趙氏曰孟子夙喪父幼被慈母三遷之教長師孔子之孫子思通五經著書七篇命世亞聖之大才也孔子嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩鯉孔子之子字伯魚朱子曰事理通達而心氣和平故能言他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮朱子曰品節詳明而德性堅定故能立孔子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與女音汝召音邵與平聲朱子曰為猶學也周南召南詩首篇名所言皆修身齊家之事正牆面而立言即其至近之地而一物無所見一步不可行右立教虞舜父頑母嚚象傲克諧以孝蒸蒸乂不格姦嚚音銀蔡氏曰虞氏舜名也舜父號瞽瞍心不則德義之經為頑母舜後母也口不道忠信之言為嚚象舜異母弟名傲驕慢也克能也諧和也蒸進也乂治也格至也言舜不幸遭此而能和以孝使之進進以善自治而不至於大為姦惡也萬章問曰舜往于田號泣于旻天何為其號泣也孟子曰怨慕也我竭力耕田共為子職而已矣父母之不我愛於我何哉號平聲旻音民共音恭萬章孟子弟子朱子曰舜往于田耕歷山時也仁覆憫下謂之旻天號泣于旻天呼天而泣也怨慕怨己之不得其親而思慕之也於我何哉自責不知已有何罪耳非怨父母也帝使其子九男二女百官牛羊倉廩備以事舜於畎畝之中天下之士多就之者帝將胥天下而遷之焉為不順於父母如窮人無所歸為去聲朱子曰帝堯也史記云二女妻之以觀其內九男事之以觀其外又言一年所居成聚二年成邑三年成都是天下之士就之也胥相視也遷之移以與之也如窮人無所歸言其怨慕迫切之甚也天下之士悅之人之所欲也而不足以解憂好色人之所欲妻帝之二女而不足以解憂富人之所欲富有天下而不足以解憂貴人之所欲貴為天子而不足以解憂人悅之好色富貴無足以解憂者惟順於父母可以解憂好妻並如字朱子曰孟子推舜之心如此以解上文之意言極天下之欲不足以解憂而惟順於父母可以解憂孟子真知舜之心哉人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者豫於大舜見之矣少去聲下同好去聲朱子曰常人之情因物有遷惟聖人為能不失其本心也艾美好也不得失意也熱中躁急心熱也言五十者舜攝政時年五十也五十而慕則其終身慕可知矣此章言舜不以得衆人之所欲為已樂而以不順乎親之心為己憂非聖人之盡性其孰能之揚子曰事父母自知不足者其舜乎不可得而久者事親之謂也孝子愛日揚子名雄西漢人自知不足者舜雖已順其親而其心常若不足也愛日者惜此日之易過懼來日之無多而不得久事其親也文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜及日中又至亦如之及莫又至亦如之朝音潮豎音樹國君之適子曰世子內庭之小臣曰內豎御直日者其有不安節則內豎以告文王文王色憂行不能正履王季復膳然後亦復初食上必在視寒暖之節食下問所膳命膳宰曰末有原應曰諾然後退履音理上上聲不安節謂有疾不能循其起居飲食之常也履蹈地也復膳飲食安節也復初其憂解也在察也進食則察視寒暖之節如飯宜溫羹宜熱之類食畢而徹則問所食之多寡末猶勿也原再也謂所食之餘不可再進也文王有疾武王不説冠帶而養文王一飯亦一飯文王再飯亦再飯説音脫養去聲飯音反下同武王文王之子孔子曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也周公文王之子武王之弟朱子曰達通也言武王周公之孝乃天下之人通謂之孝也志者事之未成者也繼則續而成之事者志之已成者也述則循而行之踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也朱子曰踐猶履也其指先王也所尊所親先王之祖考子孫臣庶也始死謂之死既葬則曰反而亡焉皆指先王也此皆繼志述事之意也淮南子曰周公之事文王也行無専制事無由已身若不勝衣言若不出口有奉持於文王洞洞屬屬如將不勝如恐失之可謂能子矣行去聲勝音升下同奉音捧屬音竹淮南子漢淮南王劉安也奉持執物以進也能子能盡子道也餘見明倫孟子曰曽子養曽晳必有酒肉將徹必請所與問有餘必曰有曽晳死曽元養曽子必有酒肉將徹不請所與問有餘曰亡矣將以復進也此所謂養口體者也若曽子則可謂養志也養去聲下同徹直列切下同亡音無復扶又切朱子曰曽晳名點曽子父也曽元曽子子也曽子養其父每食必有酒肉食畢將徹去必請於父曰此餘者與誰或父問此物尚有餘否必曰有恐親意更欲與人也曽元不請所與雖有言無其意將以復進於親不欲其與人也此但能養父母之口體而已曽子則能承順父母之志而不忍傷之也事親若曽子者可也朱子曰言當如曽子之養志不可如曽元但養口體孔子曰孝哉閔子騫人不間於其父母昆弟之言間去聲閔子騫孔子弟子名損胡氏曰父母兄弟稱其孝友人皆信之無異辭者蓋其孝友之實有以積於中而著於外故夫子嘆而美之老萊子孝奉二親行年七十作嬰兒戲身著五色斑斕之衣嘗取水上堂詐跌仆臥地為小兒啼弄雛於親側欲親之喜著音酌跌音迭仆音付老萊子楚人也五色青赤黃白黑也仆僵倒也雛謂鳥雛吳氏曰恐父母見子之老而生悲感故為是以樂其心也樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也瘳音抽樂正姓子春名曽子弟子瘳愈也樂正子春曰善如爾之問也善如爾之問也吾聞諸曽子曽子聞諸夫子曰天之所生地之所養惟人為大父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子頃步而不敢忘孝也今豫忘孝之道豫是以有憂色也頃苦猥切亦作蹞亦作跬大猶貴也一舉足為頃再舉足為步方氏曰不虧其體所以全其形不辱其身所以全其德一舉足而不敢忘父母是故道而不徑舟而不遊不敢以先父母之遺體行殆一出言而不敢忘父母是故惡言不出於口忿言不反於身不辱其身不羞其親可謂孝矣道大路也徑小路也遊浮水也忿恨怒也由道而不由徑由舟而不由水不敢以先父母之遺體行歷於危殆故也已之惡言不出於口故人之忿言不反於身忿言不反則不辱身不羞親矣伯俞有過其母笞之泣其母曰他日笞子未嘗泣今泣何也對曰俞得罪笞常痛今母之力不能使痛是以泣伯俞姓韓名俞得罪謂他日得罪也伯俞之泣悲母力之衰耳故曰父母怒之不作於意不見於色深受其罪使可哀憐上也父母怒之不作於意不見於色其次也父母怒之作於意見於色下也見音現下同故曰以下劉向論也意發於心色見於面公明宣學於曽子三年不讀書曽子曰宣而居參之門三年不學何也公明姓宣名曽子弟子公明宣曰安敢不學宣見夫子居庭親在叱吒之聲未嘗至於犬馬宣説之學而未能宣見夫子之應賓客恭儉而不懈惰宣説之學而未能宣見夫子之居朝廷嚴臨下而不毁傷宣説之學而未能宣説此三者學而未能宣安敢不學而居夫子之門乎叱尺栗切吒丑亞切説音悅下同懈音戒夫子謂曽子庭中庭也叱吒怒聲也恭莊敬也儉節制也朝廷外庭也不毁傷謂不毁傷其下讀書學文之事孝敬慈力行之事論語曰行有餘力則以學文少連大連善居喪三日不怠三月不解期悲哀三年憂東夷之子也少去聲解音懈期音期此孔子之言三日親始死時也怠惰也不怠如水漿不入口之類三月親未葬時也解倦也不解如哀至則哭之類期周一年也悲哀如朝夕哭之類憂謂憂戚憔悴二子居喪如此非惟進於中國而且善於禮矣故孔子稱而表之高子臯之執親之喪也泣血三年未嘗見齒君子以為難見音現子臯孔子弟子名柴無聲出涕曰泣血見齒笑也顔丁善居喪始死皇皇焉如有求而弗得既殯望望焉如有從而弗及既葬慨然如不及其反而息顔丁魯人皇皇猶倣徨求謂求其親望望仰思貌從謂從其親慨感悵意息者待也待其反也皆不忍死其親之至情也曽子有疾召門弟子曰啓豫足啓豫手詩曰戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫小子夫音扶朱子曰啓開也曽子平日以為身體受於父母不敢毁傷故於此使弟子開其衾而視之詩小旻之篇戰戰恐懼兢兢戒謹臨深恐墜履冰恐陷也曽子以其所保之全示門人而言其所以保之之難如此至於將死而後知其得免於毁傷也小子門人也語畢而又呼之以致反覆丁寧之意其警之也深矣范氏曰身體猶不可虧也况虧具行以辱其親乎箕子者紂親戚也紂始為象箸箕子歎曰彼為象箸必為玉杯為玉杯則必思逺方珍怪之物而御之矣輿馬宮室之漸自此始不可振也箕國名子爵也紂之諸父紂商王受也御用也振救也紂為淫泆箕子諫紂不聽而囚之人或曰可以去矣箕子曰為人臣諫不聽而去是彰君之惡而自説於民吾不忍為也乃被髮佯狂而為奴遂隱而鼓琴以自悲故傳之曰箕子操泆音逸説音悅佯音羊淫貪欲泆放蕩如嬖妲已為酒池肉林之類囚拘繫也傳曰囚箕子以為奴彰著也佯詐也操琴曲也王子比干者亦紂之親戚也見箕子諫不聽而為奴則曰君有過而不以死爭則百姓何辜乃直言諫紂紂怒曰吾聞聖人之心有七竅信有諸乎乃遂殺王子比干刳視其心爭去聲竅苦弔切刳音枯王子比干亦紂諸父辜罪也何辜言無罪而被虐也刳剖也微子曰父子有骨肉而臣主以義屬故父有過子三諫而不聽則隨而號之人臣三諫而不聽則其義可以去矣於是遂行屬音竹號平聲微國名子爵也紂庶兄屬聨續也行所以存宗祀也孔子曰殷有三仁焉朱子曰三人之行不同而同出於至誠惻怛之意故皆不咈乎愛之理而有以全其心之德也武王伐紂伯夷叔齊叩馬而諫左右欲兵之太公曰此義人也扶而去之伯夷叔齊孤竹君之二子叩馬當馬之前也兵猶殺也太公呂望也夷齊之諫曰以臣弒君可謂義乎故太公以為義人扶猶搊也武王已平殷亂天下宗周而伯夷叔齊恥之義不食周粟隱於首陽山採薇而食之遂餓而死武王處一時之大權二子守萬世之大經各一義也衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問夫人曰知此為誰夫人曰此蘧伯玉也公曰何以知之夫人曰妾聞禮下公門式路馬所以廣敬也夫忠臣與孝子不為昭昭信節不為冥冥惰行蘧伯玉衛之賢大夫也仁而有智敬於事上此其人必不以暗昧廢禮是以知之公使人視之果伯玉也轔音鄰蘧音劬夫音扶為去聲下同信音伸行去聲暗音暗衛國名靈公衛君名元闕君門蘧伯玉衛大夫名瑗下者下車以過也公門亦君門式説見敬身路大也君馬曰路馬大之也廣敬推廣其敬也昭昭顯明也冥冥隱暗也忠臣之事君也如事親孝子之事親也如事天豈以人知而信節人不知而惰行乎趙襄子殺智伯漆其頭以為飲器智伯之臣豫讓欲為之報讐乃詐為刑人挾匕首入襄子宮中塗厠左右欲殺之襄子曰智伯死無後而此人欲為報讐真義士也吾謹避之耳欲為之為去聲讐音求七音比襄子名無恤智伯名瑤皆晉大夫飲器或云飲酒之器或云溲溺之器未詳孰是刑人有罪被刑而執役者匕首短劒也其首類七塗厠謂以泥塗墁溷厠之牆壁讓之為此謀欲以殺襄子也左右謂襄子從者讓又漆身為癩吞炭為啞行乞於市其妻不識也其友識之為之泣曰以子之才臣事趙孟必得近幸子乃為所欲為顧不易邪何乃自苦如此讓曰委質為臣而求殺之是二心也吾所以為此者將以愧天下後世之為人臣而懷二心者也癩音賴啞倚下切為之之為去聲易音異為癩為啞而行乞欲人不識得以殺襄子也識謂識其形容一説謂識其志意在於報仇趙孟即襄子顧猶反也為所欲為謂殺襄子委質猶屈膝也即致身之意後又伏於橋下欲殺襄子襄子殺之讓之死舍生取義也真可以愧天下後世之為人臣而懷二心者矣王孫賈事齊湣王王出走賈失王之處其母曰女朝去而晚來則吾倚門而望女暮出而不還則吾倚閭而望女今事王王出走女不知其處女尚何歸走去聲女音汝下俱同王孫姓賈名齊大夫湣王名地燕破齊王走莒為楚人淖齒所殺門謂家之門閭謂巷之門王孫賈乃入市中曰淖齒亂齊國殺湣王欲與我誅齒者袒右市人從之者四百人與誅淖齒刺而殺之淖音閙袒音但刺音戚淖姓齒名齊相也袒右袒露右臂也從之謂袒右也臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之臣聞出門如賔承事如祭仁之則也文公以為下軍大夫使去聲過平聲耨乃豆切饁音葉臼季晉大夫名胥臣文公晉君名重耳冀邑名缺人名卻其姓也耘田曰耨野饋曰饁能敬則心存心存則理得故敬為德之聚修已可以安百姓故曰德以治民出門如賔承事如祭敬也以是為則而持守之則私意無所容而心德全矣下軍大夫官名公父文伯之母季康子之從祖叔一無叔字母也康子往焉䦱門而與之言皆不踰閾仲尼聞之以為别於男女之禮父音府從去聲䦱音委閾音域公父文伯魯大夫名歜其母敬薑也季康子亦魯大夫名肥往謂往而見之也䦱開也閾門限也敬薑不踰閾而出康子不踰閾而入故曰皆不踰閾衛共薑者衛世子共伯之妻也共伯蚤死共薑守義父母欲奪而嫁之共薑不許作柏舟之詩以死自誓共音恭下同衛國名薑齊姓歸共伯故曰共薑夫死不嫁義也奪謂奪其守義之志柏舟之詩曰之死矢靡他是以死自誓也蔡人妻宋人之女也既嫁而夫有惡疾其母將改嫁之女曰夫之不幸乃妾之不幸也奈何去之適人之道一與之醮終身不改不幸遇惡疾彼無大故又不遣妾何以得去終不聽其母女之母也酌而無酬酢曰醮蓋婚禮贊者三酌壻婦而不酬酢也彼指夫大故謂惡逆婦人自稱曰妾聽猶從也萬章問曰象日以殺舜為事立為天子則放之何也孟子曰封之也或曰放焉仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣朱子曰放猶置也置之於此使不得去也萬章疑舜何不誅之孟子言舜實封之而或者誤以為放也藏怒謂藏匿其怒宿怨謂留宿其怨饒氏曰仁人之於弟雖有怒亦不藏之雖有怨亦不留之少間心便釋然孟子曰親之欲其貴也愛之欲其富也封之有庳富貴之也伯夷叔齊孤竹君之二子也父欲立叔齊及父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子中音仲孤竹國名朱子曰伯夷以父命為尊叔齊以天倫為重虞芮之君相與爭田久而不平乃相謂曰西伯仁人也盍往質焉乃相與朝周入其境則耕者讓畔行者讓路入其邑男女異路斑白者不提挈入其朝士讓為大夫大夫讓為卿二國之君感而相謂曰我等小人不可以履君子之庭乃相讓以其所爭田為間田而退天下聞而歸之者四十餘國芮儒遂切盍音合虞芮皆國名西伯周文王也盍何不也質正也畔田界也曽子曰以能問於不能以多問於寡有若無實若虛犯而不校昔者吾友嘗從事於斯矣朱子曰校計校也友馬氏以為顔淵是也顔子之心惟知理義之無窮不見物我之有間故能如此孔子曰晏平仲善與人交久而敬之晏平仲齊大夫名嬰程子曰人交久則敬衰久而能敬所以為善右明倫李氏曰首十七章明父子之親次五章明君臣之義次四章明夫婦之别次三章明長幼之序末二章明朋友之交孟子曰伯夷目不視惡色耳不聽惡聲惡色非禮之色惡聲非禮之聲子遊為武城宰子曰女得人焉爾乎曰有淡臺滅明者行不由徑非公事未嘗至於偃之室也女音汝淡音談子遊孔子弟子姓言名偃朱子曰武城魯下邑淡臺姓滅明名字子羽徑路之小而捷者公事如飲射讀法之類不由徑則動必以正而無見小欲速之意可知非公事不見邑宰則其有以自守而無枉己徇人之私可見矣又曰焉爾乎三字是助語聖人之言寬緩而不迫高柴自見孔子足不履影啓蟄不殺方長不折衛輒之難出而門閉或曰此有徑子羔曰吾聞之君子不徑曰此有竇子羔曰吾聞之君子不竇有間使者至門啓而出蟄直立切長上聲折音哲難去聲間如字啓謂開穴而出蟄蟲之藏者方長謂草木輒衛君名難謂輒以兵拒父時也竇孔穴也有間少頃也不踐影敬人之至不殺不折愛物之至不徑不竇守身之至朱子曰不徑不竇無事時可也若有寇盜患難如何守此以殘其軀觀聖人微服過宋可見矣南容三復白圭孔子以其兄之子妻之三去聲復音福南容孔子弟子居南宮名縚又名適字子容朱子曰詩大雅抑之篇曰白圭之玷尚可磨也斯言之玷不可為也南容一日三復此言事見家語蓋深有意於謹言也此邦有道所以不廢邦無道所以免禍故孔子以兄子妻之子路無宿諾朱子曰宿留也急於踐言不留其諾也孔子曰衣敝緼袍與衣狐貉者立而不恥者其由也與衣去聲緼音慍貉音鶴朱子曰敝壞也緼枲著也袍衣有著者也蓋衣之賤者狐貉以狐貉之皮為裘衣之貴者子路之志如此則能不以貧富動其心而可以進於道矣故夫子稱之鄭子臧出奔宋好聚鷸冠鄭伯聞而惡之使盜殺之君子曰服之不衷身之災也詩曰彼其之子不稱其服子臧之服不稱也夫好去聲鷸音聿惡去聲衷音中其音記稱去聲鄭宋皆國名子臧鄭伯之子鷸翠鳥聚鷸冠者聚其羽以為冠也衷正也詩曹風候人之篇其語辭公父文伯退朝朝其母其母方績文伯曰以歜之家而主猶績乎其母歎曰魯其亡乎使僮子備官而未之聞邪父音甫朝音潮下同歜昌六切亡如字績緝麻也歜文伯之名主主母也僮子指文伯國將亡則任非人文伯富貴而驕故敬薑歎而責之亦善計國矣居吾語女民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也語去聲女音汝瘠音寂嚮音向居者喻之使止也勞勤勞逸安逸淫淫蕩沃肥饒瘠薄瘦也善心生則嚮義矣惡心生則不材矣不材由於淫嚮義由於勞是故王后親織元紞公侯之夫人加以紘綖卿之內子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事蒸而獻功男女效績愆則有辟古之制也紞丁坎切紘音宏綖音延辟音闢元黑色紞冠之垂前後者紘纓之無緌者綖冕之上覆者內子卿之妻命婦大夫之妻列士元士庶士下士庶士以下則庶人也自公侯至士庶之妻所織以漸而加者以貴賤為勞逸之差也冬祭曰蒸績功愆過辟罪也春祭社之時則供其農桑之事冬祭廟之時則獻其五榖布帛之功男耕女織各效其績逸而有過則治以罪也古之制通貴賤言之吾冀而朝夕修我曰必無廢先人爾今曰胡不自安以是承君之官豫懼穆伯之絶嗣也冀欲也而爾皆汝也修猶飭也廢猶墜也先人謂穆伯文伯之父也胡何也君謂魯君居位而苟求安逸敗亡之道也故敬薑懼穆伯之絶嗣文伯曠於禮敬薑語之皆凜凜有法度其愛而知勞者與孔子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也簞音丹食音似樂音雒回孔子弟子姓顔字子淵朱子曰簞竹器食飯也瓢瓠也顔子之貧如此而處之泰然不以害其樂故夫子再言賢哉回也以深歎美之右敬身李氏曰首三章言心術次二章言威儀次三章言衣服末章言飲食衛莊公娶于齊東宮得臣之妹曰莊薑美而無子其娣戴媯生桓公莊薑以為己子娣音弟媯音圭衛齊皆國名莊公衛君名揚東宮太子宮得臣太子名薑齊姓媯陳姓莊公再娶于陳莊戴皆諡也娣女弟之從嫁者桓公名完公子州吁嬖人之子也有寵而好兵公弗禁莊薑惡之嬖音庇好去聲惡去聲嬖人幸妾也石碏諫曰臣聞愛子教之以義方弗納於邪驕奢淫泆所自邪也四者之來寵祿過也碏音鵲泆音逸石碏衛大夫方道也義方即六順納猶置也邪即六逆自由也寵祿過盛則驕奢淫泆而陷於邪逆矣夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣夫音扶眕音軫鮮上聲降抑也憾恨也眕安重也蓋恃寵則驕驕則恣橫而不能自抑若強抑之則恨恨則思亂而不能自安自重此必然之勢也且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也夫音扶少去聲間去聲貴賤以位言少長以齒言親猶近也逺近以地言新舊以時言小大以德言淫義以道言淫者邪道義者正道也妨害也陵犯也間離也破亦害也義謂使臣以義行謂行君之義去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎去上聲下同去猶違也順即六順效猶習也逆即六逆速召也言為人君者當務於去禍不可反召禍也莊公溺愛嬖人之子使恃寵弄兵而弗之禁是去順而效逆也其後州吁弒桓公為石碏所誅豈非速禍之明驗乎孔氏曰州吁于六逆則少陵長於六順則弟不敬兄非謂遍犯之也劉康公成肅公會晉侯伐秦成子受脤于社不敬脤音腎劉成皆邑名康肅皆諡秦晉皆國名脤祭肉也凡出兵則宜于社宜祭名脤亦作蜃大蛤也古人多以蜃飾器祭肉以蜃器盛之故曰脤諡者生有功德卒則人君賜諡以易其名劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍中者理之本然也動作以事言禮義以理言威儀以身言定者靜而復也天地之理人得之以生所謂在天為命在人為性者也動作禮義威儀各有當然之則聖人所以定其性而使弗失也能循是則以養其性則為福順乎天而吉也不能循是則而敗其性則取禍違乎天而凶也能與不能亦在乎敬怠之間而已矣是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎膰音煩君子小人以位言之敦加厚也篤實而加厚焉亦敬也養神謂奉祭守業謂務農戎兵戎膰祭肉執膰受脤皆交神之大節惰謂受脤不敬反還也君子敬以奉祭小人敬以務農皆養之以福者也成子以君子而受脤不敬有取禍之道故劉子逆知其不反其後果卒于瑕衛侯在楚北宮文子見令尹圍之威儀言於衛侯曰令尹其將不免詩云敬慎威儀維民之則令尹無威儀民無則焉民所不則以在民上不可以終衛楚皆國名衛侯名惡文子衛大夫名他北宮其姓也時相衛侯在楚令尹楚上卿執政者名圍免謂免於禍詩大雅抑之篇則法也終謂善終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也聞音問此衛侯問而文子答也令聞長世謂善名久垂於世也是指君臣而言順是以下若父子兄弟內外大小是矣皆如是謂皆有威儀也固者安固不敗也衛詩曰威儀棣棣不可選也言君臣上下父子兄弟內外大小皆有威儀也棣音第詩弼風柏舟之篇棣棣富而間習之貌選簡擇也言威儀無一不善不可得而簡擇取舍也此蓋借引以為人皆不可無威儀耳周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也詩大雅既醉之篇攸所也攝簡也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也舍上聲行去聲樂音雒施用也舍不用也用舍當斯可愛十者皆威儀也自可畏言曰威自可象言曰儀真氏曰令尹圍専楚國之政有篡奪之心形諸威儀必有僣逼于上者故文子見而知其不終也未幾以篡被殺果不能終右通論通論立教明倫敬身三者御定小學集注卷四
