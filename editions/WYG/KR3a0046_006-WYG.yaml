body:
  text: 欽定四庫全書御定小學集註卷六外篇善行第六此篇紀漢以來賢者所行之善行以實立教眀倫敬身也凡八十一章呂榮公名希哲字原眀申國正獻公之長子正獻公居家簡重寡黙不以事物經心而申國夫人性嚴有法雖甚愛公然教公事事循蹈規矩正獻公名公著字晦叔相宋封申國公簡簡要重重厚寡省事黙慎言也事物謂外事外物經猶縈也蹈猶行也規矩喻禮度事事依循禮度而行下文所言是也甫十歲祁寒暑雨侍立終日不命之坐不敢坐也日必冠帶以見長者平居雖甚熱在父母長者之側不得去巾襪縳袴衣服唯謹縳音篆甫始祁大縳繞也縳袴所以纒繞袴管者亦謂之偪首之巾足之襪脛之縳袴身之衣服皆不得去謹則又加整飭矣行歩出入無得入茶肆酒肆市井里巷之語鄭衛之音未嘗一經於耳不正之書非禮之色未嘗一接於目鄭衛二國名其音淫熊氏曰足不妄行耳不妄聽目不妄視正獻公通判潁州歐陽公適知州事焦先生千之伯强客文忠公所嚴毅方正正獻公招延之使教諸子諸生小有過差先生端坐召與相對終日竟夕不與之語諸生恐懼畏服先生方畧降辭色歐陽公名修字永叔諡文忠焦先生名千之字伯强時寓歐陽公家諸子諸生皆謂榮公及其弟也端正也降猶舒也解也時公方十餘歲内則正獻公與申國夫人教訓如此之嚴外則焦先生化導如此之篤故公徳器成就大異衆人公嘗言人生内無賢父兄外無嚴師友而能有成者少矣行成曰徳才成曰器呂榮公張夫人待制諱昷之之幼女也最鍾愛然居常至微細事教之必有法度如飲食之類飯羮許更益魚肉不更進也時張公已為待制河北都轉運使矣昷音温使去聲夫人榮公之妻待制官名諱即名也生曰名死曰諱鍾聚更再益増也都轉運使亦官名張公已貴顯矣而示女子以儉約如此非特教子者所當法亦守官者所當法也及夫人嫁吕氏夫人之母申國夫人姊也一日來視女見舍後有鍋釡之類大不樂謂申國夫人曰豈可使小兒輩私作飲食壞家法耶其嚴如此樂音雒張待制吕正獻公皆魯叅政宗道之壻唐陽城為國子司業引諸生告之曰凡學者所以學為忠與孝也諸生有久不省親者乎眀日謁城還養者二十輩有三年不歸侍者斥之養去聲唐李氏王天下之號城字亢宗定州人謁告也斥逐也安定先生胡瑗字翼之患隋唐以來仕進尚文辭而遺經業苟趨禄利及為蘇湖二州教授嚴條約以身先之雖大暑必公服終日以見諸生嚴師弟子之禮解經至有要義􅈤􅈤為諸生言其所以治已而後治乎人者學徒千數日月刮劘為文章皆傅經義必以理勝信其師說敦尚行實後為太學四方歸之庠舍不能容瑗音願先去聲􅈤口狠切為去聲劘音磨傅音附行去聲條教條約約束以身先之謂躬行以率之要義即治人治己之道􅈤􅈤切到之意治己而後治人眀體適用之學也刮劘刮垢劘光也兼文行而言傅依也必以理勝不尚辭也信尊信也安定後為國子直講四方學者歸之故庠舍不能容其在湖學置經義齋治事齋經義齋者擇疏通有器局者居之治事齋者人各治一事又兼一事如治民治兵水利算數之類其在太學亦然疏通謂才識眀逹有器局謂器局正大其弟子散在四方隨其人賢愚皆循循雅飭其言談舉止遇之不問可知為先生弟子其學者相與稱先生不問可知為胡公也飭音赤循循雅正謹飭之貌言動皆雅飭故遇之則知其為安定弟子學者皆尊師故稱先生則知其為安定眀道先生言於朝曰治天下以正風俗得賢才為本風者上所化俗者下所習賢有徳者才有能者二者固治天下之本然得賢才斯可以正風俗則得賢才又正風俗之本也宜先禮命近侍賢儒及百執事悉心推訪有徳業充備足為師表者其次有篤志好學材良行修者延聘敦遣萃於京師朝夕相與講眀正學好行俱去聲悉盡也推訪推求詢訪也延聘謂迎之以禮敦遣謂送之以禮萃聚京大師衆也天子之都曰京師其道必本於人倫眀乎物理其教自小學灑掃應對以徃脩其孝弟忠信周旋禮樂其所以誘掖激勵漸磨成就之道皆有節序其要在於擇善脩身至於化成天下自鄉人而可至於聖人之道漸音尖誘之掖之使有進激之勵之使無退漸之磨之使不苦其難皆所以成就之正學不出乎人倫物理而已灑掃應對以至周旋禮樂小學之教也誘掖激勵漸磨成就之成其始也擇善脩身以至化成天下大學之教也自鄉人而至於聖人之道成其終也其學行皆中於是者為成徳取材識眀逹可進於善者使日受其業擇其學眀徳尊者為太學之師次以分教天下之學行去聲中去聲中於是謂合於小學大學之教也以成徳為師取才識之眀逹者受其教及學之既成上者使教國學其次以分教州縣之學也此三節言擇師之法擇士入學縣升之州州賔興於太學太學聚而教之歲論其賢者能者於朝縣謂縣學州謂州學王制曰論定然後官之凡選士之法皆以性行端潔居家孝悌有廉恥禮讓通眀學業曉逹治道者行去聲選亦擇也此兩節言擇士之法朱子曰眀道論學制最為有本讀之未嘗不慨然發嘆也伊川先生看詳學制大槩以為學校禮義相先之地而月使之争殊非敎養之道請改試為課有所未至則學官召而教之更不考定髙下伊川嘗充崇政殿說書同孫覺等看詳國子監條制相先猶相尚月使之争謂月有試以較其髙下是使之争競也制尊賢堂以延天下道徳之士鐫解額以去利誘省繁文以専委任勵行檢以厚風敎及置待賔吏師齋立觀光法如是者亦數十條鐫子全切解居隘切去上聲行去聲制置也延待也鐫謂刻定之解猶貢也額數也宋元豐中以利禄誘士國學解額増至五百人來者奔湊程子蓋欲量留百人餘四百分於州郡使士人各安鄉土也省減也繁文吏牘之類師儒之官不責以小文所以専委任也行檢為行誼名檢待賔齋所以待行能可賔敬者吏師齋則通於治道可為吏之師法者居之觀光謂觀見國之盛徳光輝立觀光法蓋以處來學之士也藍田呂氏鄉約曰凡同約者徳業相勸藍田縣名呂氏兄弟四人大中大防大約大臨鄉約與鄉人約誓也勸勉也本註徳謂見善必行聞過必改能治其身能治其家能事父兄能教子弟能御童僕能事長上能睦親故能擇交游能守廉介能廣施惠能受寄託能救患難能導人為善能規人過失能為人謀事能為衆集事能解鬬争能決是非能興利除害能居官舉職業謂居家則事父兄教子弟待妻妾在外則事長上接朋友教後生御童僕至於讀書治田營家濟物如禮樂射御書數之類皆可為之非此之類皆為無益過失相規規猶戒也本註犯義之過六一曰酗博鬬訟二曰行止踰違三曰行不恭遜四曰言不忠信五曰造言誣毁六曰營私太甚不修之過五一曰交非其人二曰逰戲怠惰三曰動止無儀四曰臨事不恪五曰用度不節禮俗相交本註謂婚姻喪葬祭祀之禮有徃還書問慶弔之節患難相䘏本註一曰水火二曰盗賊三曰疾病四曰死喪五曰孤弱六曰誣枉七曰貧乏有善則書於籍有過若違約者亦書之三犯而行罰不悛者絶之悛音銓若及也悛改也絶之使不與約也明道先生教人自致知至於知止誠意至於平天下灑掃應對至於窮理盡性循循有序格物致知所以求知所止誠意正心脩身齊家治國平天下所以求得所止灑掃應對小學之教也窮理即致知至於知止之事盡性即誠意至於平天下之事大學之教也循循有次序貌謂先習之於小學而後進之於大學而大學之教又自有其序也病世之學者捨近而趨逺處下而闚髙所以輕自大而卒無得也闚音窺趨奔也闚猶闞也卒終也此學者之大病程子敎人循循有序蓋病乎此矣吳氏曰行逺自近升髙自下學之序也自大小學之序言灑掃應對近者下者也窮理盡性髙者逺者也以大學之序言之格物致知誠意正心脩身非近而下者乎齊家治國平天下非髙而逺者乎右實立教江革少失父獨與母居遭天下亂盗賊並起革負母逃難備經險阻常採拾以為養數遇賊或刧欲將去革輒涕泣哀求言有老母辭氣愿欵有足感動人者賊以是不忍殺之或乃指避兵之方遂得俱全於難少去聲難去聲下同養去聲數音朔愿音願漢江革字次翁臨淄人備經險阻謂徧歴道路之艱危採拾謂採取草木之可食者數頻也刧欲將去謂欲脅革以去也愿款誠慤也俱全謂母子皆保全也轉客下邳貧窮裸跣行傭以供母便身之物莫不畢給裸魯果切跣蘇典切傭音庸轉客猶飄泊下邳今邳州裸露身跣露足行傭為雇工也便身之物謂母身所便安之物畢猶皆也給猶足也薛包好學篤行父娶後妻而憎包分出之包日夜號泣不能去至被毆杖不得已廬於舍外旦入而灑掃父怒又逐之乃廬於里門晨昏不廢積歲餘父母慚而還之後服喪過哀好去聲行去聲號平聲毆音嘔漢薛包字孟嘗汝南人不能猶不忍里門巷門也不廢謂不廢定省之禮既而弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓者曰吾少時所理意所戀也器物取其朽敗者曰我素所服食身口所安也弟子數破其産輒復賑給少去聲戀龍眷切數音朔復去聲既謂服喪已也弟子弟及其子也中分均分也共事同事也若汝也指弟子荒謂田畝荒蕪頓謂廬舍傾頓服用也王祥性孝蚤喪親繼母朱氏不慈數譖之由是失愛於父每使掃除牛下祥愈恭謹父母有疾衣不解帶湯藥必親嘗母嘗欲生魚時天寒冰凍祥解衣將剖冰求之冰忽自解䨇鯉躍出持之而歸母又思黄雀炙復有雀數十飛入其幕復以供母鄉里驚歎以為孝感所致有丹柰結實母命守之每風雨祥輒抱樹而泣其篤孝純至如此數音朔譖則禁切剖普厚切炙音柘幕音莫晉王祥字休徵琅琊人親母也譖毁也失愛於父不得父之愛也牛下牛糞剖破也炙炙肉驚歎驚異嗟歎也孝感謂魚雀之至皆孝誠之感動也丹紅色柰果名王裒字偉元父儀為魏安東將軍司馬昭司馬東關之敗昭問於衆曰近日之事誰任其咎儀對曰責在元帥昭怒曰司馬欲委罪於孤邪遂引出斬之裒蒲侯切儀裒父名魏曹氏篡國之號上司馬覆姓下司馬官名言儀為魏國安東將軍司馬昭之司馬也東關地名敗謂戰敗咎罪也元帥稱昭孤昭自稱也裒痛父非命於是隱居教授三徵七辟皆不就廬於墓側旦夕常至墓所拜跪攀柏悲號涕淚著樹樹為之枯讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇辟音璧號平聲著直略切復音福蓼音六朝廷召曰徵郡國舉曰辟哀哀父母生我劬勞蓼莪詩之辭三復謂再三反覆誦之廢蓼莪篇者恐其師哀感故舍之而不誦也家貧躬耕計口而田度身而蠶或有密助之者裒皆不聽及司馬氏篡魏裒終身未嘗西向而坐以示不臣于晉度音鐸篡初患切密猶私也聽猶從也逆而奪取之曰篡昭既死子炎篡魏自立為晉衣食不求豐裕而坐不面闕皆痛父非命不忍故爾晉西河人王延事親色養夏則扇枕席冬則以身温被隆冬盛寒體常無全衣而親極滋味養去聲扇平聲西河縣名延字延元色養以和恱之顔色而奉養也以用也全完也滋味猶言甘㫖柳玭曰崔山南昆弟子孫之盛鄉族罕比山南曾祖王母長孫夫人年髙無齒祖母唐夫人事姑孝每旦櫛縰笄拜於階下即升堂乳其姑長孫夫人不粒食數年而康寧乳去聲山南名琯唐博陵人為山南西道節度使故稱山南昆兄也王大也曾祖王母即曽祖母也姓長孫不粒食而康樂安寧繇飲乳也一日疾病長幼咸萃宣言無以報新婦恩願新婦有子有孫皆得如新婦孝敬則崔氏之門安得不昌大乎疾甚曰病萃聚也南齊庾黔婁為孱陵令到縣未旬父易在家遘疾黔婁忽心驚舉身流汗即日棄官歸家家人悉驚其忽至孱鉏山切易音異遘音垢南南朝齊蕭氏僭國之號黔婁字子真孱陵縣名旬十日也易黔婁父名遘遇也熊氏曰父子一體而分父疾而子心驚汗出自然之理也時易疾始二日醫云欲知差劇但嘗糞甜苦易泄利黔婁輒取嘗之味轉甜滑心甚憂苦至夕每稽顙北辰求以身代差楚戒切劇音極稽音起顙蘇朗切病愈曰差病甚曰劇醫蓋以糞甜則病甚糞苦則病愈矣稽顙叩頭也北辰北極也海虞令何子平母喪去官哀毁踰禮每哭踊頓絶方蘇屬大眀末東土饑荒繼以師旅八年不得營葬晝夜號哭常如袒括之日冬不衣絮夏不就清凉一日以米數合為粥不進鹽菜所居屋敗不蔽風日兄子伯興欲為葺理子平不肯曰我情事未申天地一罪人耳屋何宜覆屬音竹袒音但葺音緝覆敷救切海虞縣名子平南朝㑹稽人哀毁踰禮痛傷過於禮也頓絶遽然氣絶也蘇猶醒也屬猶㑹也大眀年號東土即㑹稽軍法二千五百人為師五百人為旅營謀為也袒露臂括括髮人子初喪之禮也葺修補也情事未申謂親未葬也蔡興宗為㑹稽太守甚加矜賞為營塜壙㑹音檜為去聲矜者憫其苦賞者嘉其孝朱夀昌生七歲父守雍出其母劉氏嫁民間母子不相知者五十年夀昌行四方求之不已飲食罕御酒肉與人言輒流涕雍去聲下同夀昌字康叔宋天長人父為雍州太守御用也熈寧初棄官入秦與家人訣句誓不見母不復還行次同州得焉劉氏時年七十餘矣雍守錢眀逸以事聞詔夀昌還就官由是天下皆知其孝熈寧年號秦即雍州之地訣别也次猶至也眀逸字子飛聞謂言之於朝法棄官不得復就以尋母故優詔許之夀昌再為郡守至是以母故通判河中府迎其同母弟妹以歸居數歲母卒涕泣幾喪眀拊其弟妹益篤為買田宅居之其於宗族尤盡恩意嫁兄弟之孤女二人葬其不能葬者十餘喪蓋其天性如此幾平聲喪去聲拊音府為去聲河中府今蒲州也近同州夀昌嘗為閬廣徳二郡守至是以便於養母之故辭郡守而為河中通判拊安慰也推愛母之心而篤於同母弟妹推愛父之心而篤於宗族兄弟蓋至孝出於天性而然伊川先生家治喪不用浮屠在雒亦有一二人家化之雒音樂浮屠佛氏也雒水名在河南霍光出入禁闥二十餘年小心謹慎未嘗有過為人沉静詳審每出入下殿門進止有常處郎僕射竊識視之不失尺寸闥音逹下去聲射音夜識音志光字子孟漢平陽人為大將軍禁闥宫中小門也深沉安静不浮躁也精詳審密不麤率也進止一進一止也郎僕射皆官名不失尺寸猶言一歩不差耳僕主也古者重射故有是官關中語轉射為夜耳汲黯漢景帝時為太子洗馬以嚴見憚武帝即位召為主爵都尉以數直諫不得久居位是時太后弟武安侯田蚡為丞相句中二千石拜謁句蚡弗為禮黯見蚡未嘗拜句揖之洗蘇典切數音朔蚡音忿黯字長孺漢濮陽人太子洗馬官名以嚴見憚以正直為景帝所敬憚也主爵都尉亦官名以猶因也中滿也中二千石謂九卿之官歲俸滿二千石也蚡負貴而驕人黯獨不為之屈但揖之而已洗之言先也太子出則前導也上方招文學儒者上曰吾欲云云黯對曰陛下内多欲而外施仁義奈何欲效唐虞之治乎上怒變色而罷朝公卿皆為黯懼上退謂人曰甚矣汲黯之戅也治去聲為去聲戅音撞上謂武帝云云猶言如此如此蓋言效唐虞之治也心多欲如好征伐好神仙之類唐虞唐堯虞舜也戅愚也帝不罪黯而容之君人之度偉也羣臣或數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎且已在其位縱愛身奈辱朝廷何數上聲數責也輔弼輔徳而弼違也從諛承意順從阿諛以奉承上意也已既也黯多病病且滿三月上常賜告者數終不瘉最後嚴助為請告上曰汲黯何如人也曰使黯任職居官亡以瘉人然至其輔少主守成雖自謂賁育弗能奪也上曰然古有社稷之臣至如汲黯近之矣數音朔瘉音愈下同為去聲亡無同少去聲賁音奔漢法病滿三月當免官告休假也瘉通作愈病痊也嚴助人姓名時為侍中瘉當作愈過也孟賁夏育皆古之有力者言黯之正直若託之擁輔幼君以保守成業雖自謂有賁育之勇者亦不能奪其大節也然是其言也社稷臣能安社稷者大將軍青侍中上踞厠視之丞相𢎞宴見上或時不冠至如見黯不冠不見也上嘗坐武帳黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此見音現青衛青侍中侍於禁中也踞蹲坐也厠牀邊側𢎞公孫𢎞宴見宴閑時進見也嘗曽也武帳帳中置兵衛者可猶是也從其奏則稱制曰可初魏遼東公翟黒子有寵於太武奉使并州受布千疋事覺黑子謀於著作郎髙允曰主上問我當以實告為當諱之允曰公帷幄寵臣有罪首實庻或見原不可重為欺罔也中書侍郎崔鑒公孫質曰若首實罪不可測不如姑諱之黒子怨允曰君奈何誘人就死地入見帝不以實對帝怒殺之翟音狄使去聲并音兵為去聲幄一角切首去聲下同重平聲史氏記事而原其始則曰初此則莭取其事而失刪也魏元魏太武魏帝覺發覺也允字伯恭諱隱諱也帷幄寵臣侍帷幄受寵眷之臣也宥罪曰原重再也言已受賄若更隐諱是再造欺罔之罪也崔鑒公孫質皆中書侍郎測度姑且誘引也帝使允授太子經及崔浩以史事被收太子謂允曰入見至尊吾自導卿脫至尊有問但依吾語崔浩為司徒與允等修國書刻石以彰直筆太武怒其㬥揚國惡收浩誅之将及於允故太子欲指導其生路脫儻若也太子見帝言髙允小心慎密且微賤制由崔浩請赦其死帝召允問曰國事皆浩所為乎對曰臣與浩共為之然浩所領事句多總裁而已至於著述臣多於浩帝怒曰允罪甚於浩何以得生太子懼曰天威嚴重允小臣迷亂失次耳臣曏問皆云浩所為帝問允信如東宫所言乎對曰臣罪當滅族不敢虛妄殿下以臣侍講日久哀臣欲丏其生耳實不問臣臣亦無此言不敢迷亂曏音向丏音蓋微賤言其職之卑制著述也多猶皆也總裁謂總其大綱而裁正之紀事曰著纂言曰述失次謂所對失其次序曏猶昔也東宫太子之宫殿下太子之稱丏乞也帝顧謂太子曰直哉此人情所難而允能為之臨死不易辭信也為臣不欺君貞也宜特除其罪以旌之遂赦之直哉贊其直也旌之表其善也他日太子讓允曰吾欲為卿脫死而卿不從何也允曰臣與崔浩實同史事死生榮辱義無獨殊誠荷殿下再造之慈違心苟免非臣所願也太子動容稱嘆為去聲何去聲讓責也殊異也言當與浩同之再造猶言再生動容變貌也允退謂人曰我不奉東宫指導者恐負翟黒子故也静修劉氏曰髙允告黒子之言衷情之忠亮而作史者遽繼之以庻或見原則所謂首實者乃所以為徼倖之資又以不奉東宫指導為恐負黒子則允所以為是者非以義理之當然苐以此爾此皆史臣不眀義理而於遣辭之際輕為増損使允忠亮之心不白豈直筆可信之史乎李君行先生名潛䖍州人入京至泗州留止其子弟請先徃君行問其故曰科塲近欲先至京師貫開封户籍取應君行不許曰汝䖍州人而貫開封户籍欲求事君而先欺君可乎寧遲緩數年不可行也䖍音乾君行字潛名宋人也宋之京師在開封府貫猶係也冒籍以應舉欺君矣崔元暐母盧氏嘗誡元暐曰吾見姨兄屯田郎中辛元馭曰兒子從宦者有人來云貧乏不能存此是好消息若聞貲貨充足衣馬輕肥此惡消息吾嘗以為確論暐音偉馭音御貲音咨元暐名􅋫唐博陵人仕至宰相姨兄姨之子長於我者也貧必亷故曰好消息富必貪故曰惡消息比見親表中仕宦者將錢物上其父母父母但知喜恱竟不問此物從何而來必是禄俸餘資誠亦善事如其非理所得此與盗賊何别縱無大咎獨不内愧於心元暐遵奉教誡以清謹見稱别必列切比近也親同姓表外姓非理所得如竊官物剝民財皆是咎罪也言罪雖幸免心實有愧矣劉器之待制初登科與二同年謁張觀參政三人同起身請教張曰某自守官以來常持四字勤謹和緩中間一後生應聲曰勤謹和既聞命矣緩之一字某所未聞張正色作氣曰何嘗教賢緩不及事且道世間甚事不因忙後錯了器之名安世宋元城人待制參政皆官名勤以從政謹以持身和以待人緩以處事未聞猶未喻也賢稱後生也蓋緩非迂緩不及事之謂乃從容不忙廹之謂耳伊川先生曰安定之門人徃徃知稽古愛民矣則於為政也何有門人如劉彜錢藻孫覺范純仁錢公輔是也稽古經義齋之事愛民治事齋之事何有言不難也吕榮公自少官守處未嘗干人舉薦其子舜從守官㑹稽人或譏其不求知者舜從對曰勤於職事其他不敢不慎乃所以求知也少去聲㑹音檜官守以官為守也干求也舜從名疑問漢陳孝婦年十六而嫁未有子其夫當行戍且行時屬孝婦曰我生死未可知幸有老母無他兄弟備養吾不還汝肯養吾母乎婦應曰諾戍音庻屬音竹養去聲下同孝婦漢時陳州人守邊曰戍夫果死不還婦養姑不衰慈愛愈固紡績織絍以為家業終無嫁意慈愛愈固姑慈婦愛愈深固也紡以車績以指織以機絍以箴居喪三年其父母哀其少無子而早寡也將取嫁之孝婦曰夫去時屬妾以供養老母妾既許諾之夫養人老母而不能卒許人以諾而不能信將何以立於世欲自殺其父母懼而不敢嫁也遂使養其姑二十八年姑八十餘以天年終盡賣其田宅財物以葬之終奉祭祀少去聲屬音竹夫音扶卒終也夫死不嫁節也養姑而生事葬祭必盡力孝也淮陽太守以聞使使者賜黄金四十斤句復之終身無所與號曰孝婦下使去聲復音福與去聲淮陽即陳州復謂除其家之役與猶及也漢鮑宣妻桓氏字少君宣嘗就少君父學父竒其清苦故以女妻之裝送資賄甚盛宣不恱謂妻曰少君生富驕習美飾而吾實貧賤不敢當禮少去聲下同妻去聲賄音悔宣字子都渤海人清謂淡泊苦謂憂勤學以清苦而成行以清苦而立士能如此亦竒矣妻曰大人以先生脩徳守約故使賤妾侍執巾􅌨既奉承君子唯命是從宣笑曰能如是是吾志也妻乃悉歸侍御服飾更著短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之更平聲著音酌挽音晚大人稱其父也先生以年君子以徳稱其夫也約即清苦之謂歸謂還於父家侍御婢妾也服飾資装也引車曰挽鹿車小車可容一鹿者曹爽從弟文叔妻譙郡夏侯文寧之女名令女文叔蚤死服闋自以年少無子恐家必嫁已乃斷髮為信其後家果欲嫁之令女聞即復以刀截兩耳居止常依爽及爽被誅曹氏盡死令女叔父上書與曹氏絶婚彊迎令女歸從去聲譙音樵闋音缺少去聲斷音短復扶又切彊上聲曹爽魏宗室從弟同祖之弟夏侯姓文寧名闋終斷截誅殺也司馬懿殺爽夷其族時文寧為梁相憐其少執義又曹氏無遺類冀其意阻乃微使人風之令女嘆且泣曰吾亦惟之許之是也家以為信防之少懈令女於是竊入寢室以刀斷鼻蒙被而卧其母呼與語不應發被視之血流滿牀席舉家驚惶徃視之莫不酸鼻相一作州少去聲風去聲懈音戒斷音短無遺類盡死也冀其意阻幸其阻守義之意而改適也風謂以言動之惟思也竊私也或謂之曰人生世間如輕塵棲弱草耳何辛苦乃爾且夫家夷滅已盡守此欲誰為哉令女曰聞仁者不以盛衰改節義者不以存亡易心曹氏前盛之時尚欲保終况今衰亡何忍棄之禽獸之行吾豈為哉為去聲行去聲輕塵弱草熊氏曰輕塵易散弱草難依適然棲泊颺即去矣非有纒固也而已曰耳如此曰爾夷誅也守此謂守義不仁不義禽獸之行也唐鄭義宗妻盧氏略渉書史事舅姑甚得婦道嘗夜有强盗數十持杖鼔譟踰垣而入家人悉奔竄唯有姑自在室盧冒白刃徃至姑側為賊捶擊幾死杖音丈譟先到切竄取亂切冒音墨為去聲捶主蕊切幾平聲涉渉水在書史則泛觀之也杖兵器也鼔譟鼔舞呼譟也奔竄奔走竄匿也冒犯也賊去後家人問何獨不懼盧氏曰人所以異於禽獸者以其有仁義也鄰里有急尚相赴救况在於姑而可委棄乎若萬一危禍豈宜獨生五家為鄰二十五家為里危禍謂姑獨生謂已唐奉天竇氏二女生長草野幼有志操永泰中羣盗數千人剽掠其村落二女皆有容色長者年十九幼者年十六匿巖穴間曳出之驅廹以前臨壑谷深數百尺其姊先曰吾寧就死義不受辱即投崖下而死盜方驚駭其妹繼之自投折足破面流血羣盜乃捨之而去長上聲剽音票曳音裔奉天縣名永泰年號剽掠攻刼也村落村居也匿藏也曳拖也前謂前行捨之謂捨其妹京兆尹第五琦嘉其貞烈奏之詔旌表其門閭永蠲其家丁役蠲音捐京兆郡尹官第五姓琦名蠲除也繆肜少孤兄弟四人皆同財業及各取妻諸婦遂求分異又數有鬭争之言肜深懐忿嘆乃掩户自撾曰繆肜汝脩身謹行學聖人之法將以齊整風俗奈何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂更為敦睦之行繆音木肜音容少去聲取音娶數音朔撾職𤓰切行俱去聲更平聲肜字豫公漢汝南人幼而無父曰孤撾打更改敦厚睦和也蘇瓊除南清河太守有百姓乙普眀兄弟争田積年不斷各相援據乃至百人瓊召普眀兄弟諭之曰天下難得者兄弟易求者田地假令得田地失兄弟心如何因而下淚諸證人莫不灑泣普眀兄弟叩頭乞外更思分異十年遂還同住斷都玩切易音異令平聲瓊字珍之北朝人南清河郡乙姓普眀名斷決也援據攀援他人為證據也諭曉也如何問之以發動其良心也太守下淚而諸證人灑泣普眀兄弟悔過可以見人心之天矣王祥弟覽母朱氏遇祥無道覽年數歲見祥被楚撻輒涕泣抱持至於成童每諫其母少止凶虐朱屢以非理使祥覽與祥俱又虐使祥妻句覽妻亦趨而共之朱患之乃止屢音慮覽字元通遇待也楚痛也成童十五歲也俱謂共為之晉右僕射鄧攸永嘉末没于石勒過泗水攸以牛馬負妻子而逃又遇賊掠其牛馬歩走擔其兒及其弟子綏度不能兩全乃謂其妻曰吾弟蚤亡唯有一息理不可絶止應自棄我兒耳幸而得存我後當有子妻泣而從之乃棄其子而去之卒以無嗣射音夜度音鐸應平聲右僕射官名攸字伯道永嘉年號石勒胡人沒陷沒息子息弟子弟之子綏其名也時人義而哀之為之語曰天道無知使鄧伯道無兒弟子綏服攸喪三年為去聲義者義其能存姪也服喪三年如喪父也晉咸寧中大疫庾衮二兄俱亡次兄毗復危殆癘氣方熾父母諸弟皆出次於外衮獨留不去諸父兄强之乃曰衮性不畏病遂親自扶持晝夜不眠句其間復撫柩哀臨不輟如此十有餘旬疫勢既歇家人乃反毗病得差袞亦無恙疫音役毗音皮復扶又切下同癘音利熾昌志切强上聲間音澗臨去聲輟音拙有音又差楚戒切恙音樣咸寧年號疫癘皆瘟疾衮字叔褒次兄名毗危殆謂病甚也熾盛次舍也間空隙也臨哭輟止差愈恙病也父老咸曰異哉此子守人所不能守行人所不能行歲寒然後知松栢之後凋始知疫癘之不能相染也父老鄉之髙年者後凋謂後於衆木之凋楊播家世純厚並敦義讓昆季相事有如父子椿津恭謙兄弟旦則聚於㕔堂終日相對未嘗入内有一美味不集不食㕔堂間徃徃幃幔隔障為寢息之所時就休偃還共談笑幔莫半切播字延慶北朝人昆季兄弟也椿字延夀津字羅漢休亦息也偃猶卧也椿年老曾他處醉歸津扶持還室假寢閣前承候安否寢本傳作寐假寢不脫衣冠而寢也閣謂室之門椿津年過六十並登台鼎而津常旦莫叅問子姪羅列階下椿不命坐津不敢坐莫音暮台鼎三公之稱如星之有三台鼎之有三足也椿為司徒津為司空故曰並登台鼎椿每近出或日斜不至津不先飯椿還然後共食食則津親授匙箸味皆先嘗椿命食然後食津為肆州椿在京宅每有四時嘉味輒因使次附之若或未寄不先入口一家之内男女百口緦服同爨庭無間言飯上聲匙音時箸音住使去聲爨取亂切間去聲京宅宅在京也嘉味美味也未寄於兄則不先食緦麻之服同炊爨四世不分異也間言異言也隋吏部尚書牛𢎞弟弼好酒而酗嘗醉射殺𢎞駕車牛𢎞還宅其妻迎謂𢎞曰叔射殺牛𢎞聞無所怪問直答曰作脯坐定其妻又曰叔射殺牛大是異事𢎞曰已知顔色自若讀書不輟酗許御切脯音府輟音拙𢎞字里仁安定人弟名弼酗酒狂也直猶但也輟止也唐英公李勣貴為僕射其姊病必親為然火煑粥火燎其鬚姊曰僕妾多矣何為自苦如此勣曰豈為無人耶顧今姊年老勣亦老雖欲數為姊煑粥復可得乎勣音迹射音夜為去聲下同數音朔復去聲勣字懋功封英公僕射唐宰相顧猶念也司馬温公與其兄伯康友愛尤篤伯康年將八十公奉之如嚴父保之如嬰兒每食少頃則問曰得無饑乎天少冷則拊其背曰衣得無薄乎拊音府伯康名旦吳氏曰奉之如嚴父敬之至也保之如嬰兒愛之至也老人腸胃弱易飽易饑氣體虛易寒易熱故公撫問之勤如此近世故家惟晁氏因以道申戒子弟皆有法度羣居相呼外姓尊長必曰某姓第幾叔若兄諸姑尊姑之夫必曰某姓姑夫某姓尊姑夫未嘗敢呼字也其言父黨交逰必曰某姓幾丈亦未嘗敢呼字也當時故家舊族皆不能若是晁音潮故家舊家惟獨也以道名恱之澶淵人若及也尊者曰某姓第幾叔長者曰某姓第幾兄姑父之姊妹也尊姑祖之姊妹也父黨交逰父之友也稱姓稱行稱位而不呼字皆謙厚之道包孝肅公尹京時民有自言以白金百兩寄我者死矣予其子不肯受願召其子予之尹召其子辭曰亡父未嘗以白金委人也兩人相讓久之予音與下同公名拯字希仁孝肅諡也宋廬州人尹京時為京尹之時呂榮公聞之曰世人喜言無好人三字者可謂自賊者矣古人言人皆可以為堯舜蓋觀於此而知之賊害也古人謂孟子人無有不善故皆可以為堯舜蓋疑辭此指讓金而言猶言此等事也萬石君石奮歸老於家過宮門闕必下車趨見路馬必軾焉子孫為小吏來歸謁萬石君必朝服見之不名子孫有過失不誚讓為便坐對案不食然後諸子相責因長老肉袒固謝罪改之乃許誚在笑切為去聲漢石奮與四子皆官至二千石故號萬石君歸老老而歸也路馬說見稽古誚讓謂以言責之坐于便室設食於案對之而不食自責也長老族之髙年者肉袒袒衣露肉也固再三也許謂許其改過而已復坐復食也子孫勝冠者在側雖燕必冠申申如也童僕訢訢如也唯謹勝音升側音則訢音銀勝冠謂年及冠者燕謂燕居申申和緩也訢訢和恱也和則易肆故加謹上時賜食於家必稽首俯伏而食如在上前其執喪哀戚甚子孫遵教亦如之稽音啓稽首即叩首稽首俯伏而後起食敬也萬石君家以孝謹聞乎郡國雖齊魯諸儒質行皆自以為不及也行去聲孝謹即下宫門闕等事齊魯二國名長子建為郎中令少子慶為内史少去聲郎中令内史皆官名建老白首萬石君尚無恙每五日洗沐歸謁親入子舍竊問侍者取親中帬廁牏身自浣滌復與侍者不敢令萬石君知之以為常恙音㨾帬音裙牏音投浣音緩滌音狄恙病也漢法在官五日則休假一日以洗身沐首子舍小房親謂萬石君中帬中衣廁牏穢器不使親知者共為子職而又欲親心安也内史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒謝罪不許舉宗及兄建肉袒萬石君讓曰内史貴人入閭里里中長老皆走匿而内史坐車中自如固當乃謝罷慶慶及諸子入里門趨至家外門巷門舉宗猶言闔族讓責也固當者反辭以責之也謝罷慶者許不過慶而復食也里門即巷門言自是以後入巷門則疾趨而歸不但下車矣疏廣為太子太傅上疏乞骸骨加賜黄金二十斤太子贈五十斤歸鄉里日令家供具設酒食請族人故舊賔客相與娛樂數問其家金餘尚有幾斤趣賣以共具疏音疎骸音諧樂音雒數音朔趣音促共音供廣字仲翁漢蘭陵人太傅官名上疏乞骸骨猶今之告老也娛歡也趣與促同共與供同言促賣餘金以供酒食之具也居歲餘廣子孫竊謂其昆弟老人廣所信愛者曰子孫冀及君時頗立産業基址今日飲食費且盡宜從丈人所勸說君置田宅老人即以閒暇時為廣言此計說音稅為去聲冀欲也君指廣丈人即廣所愛信之髙年兄弟也所處也說誘也廣曰吾豈老悖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復増益之以為贏餘但教子孫怠惰耳悖音佩令平聲共音供復扶又切老悖年老而乖悖也贏亦餘也衣食有餘則子孫倚之而怠惰矣賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既無以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共享其賜以盡吾餘日不亦可乎夫音扶樂音雒益増也龎公未嘗入城府夫妻相敬如賔劉表候之龎公釋耕於壟上而妻子耘於前表指而問曰先生苦居􅅵畝而不肯官禄後世何以遺子孫乎龎公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表嘆息而去遺音位下同龎公字德公漢襄陽人劉表漢宗室候猶訪也釋猶罷也壟田間髙處也畎田間水道也遺猶與也富貴者易危勤勞者常安理勢然也陶淵眀為彭澤令不以家累自隨送一力給其子書曰汝旦夕之費自給為難今遣此力助汝薪水之勞此亦人子也可善遇之淵眀字元亮晉潯陽人彭澤縣名家累妻子也力僕也給與也贍也遇待也崔孝芬兄弟孝義慈厚弟孝暐等奉孝芬盡恭順之禮坐食進退孝芬不命則不敢也鷄鳴而起且温顔色一錢尺帛不入私房吉凶有須聚對分給諸婦亦相親愛有無共之暐音偉孝芬北朝博陵人孝芬叔振既亡後孝芬等承奉叔母李氏若事所生旦夕温凊出入啓覲家事巨細一以咨決每兄弟出行有獲則尺寸以上皆入李之庫四時分賚李氏自裁之如此二十餘歲凊七正切上上聲賚雒代切孝芬之叔名振温謂冬温凊謂夏凊啓謂出必告覲謂反必面獲得也賚與也王凝常居慄如也子孫非公服不見閨門之内若朝廷焉慄音栗凝字叔恬文中子之弟慄嚴謹貌御家以四敎勤儉恭恕正家以四禮冠婚喪祭御治也勤以作事儉以制用恭以處己恕以待人四禮說見嘉言聖人之書及公服禮器不假垣屋什物必堅朴曰無苟費也門巷果木必方列曰無苟亂也假借也不假阮氏曰皆自足也營築垣屋造設什物必渾堅朴素經畫門巷種植果木必方整成列蓋其為人不苟故每事亦不苟如此張公藝九世同居北齊隋唐皆旌表其門麟徳中髙宗封泰山幸其宅召見公藝問其所以能睦族之道公藝請紙筆以對乃書忍字百餘以進其意以為宗族所以不協由尊長衣食或有不均卑幼禮節或有不備更相責望遂為乖争苟能相與忍之則家道雍睦矣更平聲公藝唐東平人北齊北朝髙齊也麟徳唐髙宗年號封謂封土為壇以祭也泰山山名天子所至曰幸忍耐也協和也卑幼責望尊長之不均尊長責望卑幼之不備是更相責望也乖戾也雍和也韓文公作董生行曰淮水出桐栢山東馳遥遥千里不能休淝水出其側不能千里百里入淮流夀州屬縣有安豐唐貞元年時縣人董生召南隐居行義於其中刺史不能薦天子不聞名聲爵禄不及門門外惟有吏日來徵租更索錢行如字淝音肥召音邵索音色公名愈字退之諡文唐昌黎人董生名召南行歌類桐栢山在唐縣肥水在合肥縣安豐縣名貞元年號董生隐居行義於淮肥之間時之人不能與儔韓子為作此詩蓋賦而興也嗟哉董生朝出耕夜歸讀古人書盡日不得息或山而樵或水而漁入厨具甘㫖上堂問起居父母不慼慼妻子不咨咨吳氏曰慼慼憂愁也咨咨嗟怨也父母安其孝故不憂妻子樂其慈故不怨嗟哉董生孝且慈人不識唯有天翁知生祥下瑞無休期家有狗乳出求食鷄來哺其兒啄啄庭中拾蟲蟻哺之不食鳴聲悲彷徨躑躅久不去以翼來覆待狗歸乳去聲哺音步彷音旁徨音皇躑音擲躅音逐覆敷救切天翁猶言老天乳生子也躑躅跳貌吳氏曰董生孝慈之行獨天知之故祥瑞見於異類如此嗟哉董生誰將與儔時之人夫妻相虐兄弟為讎食君之禄而令父母愁亦獨何心嗟哉董生無與儔儔音紬儔匹也朱子曰上句誰將與儔疑而問之之辭也下句無與儔答而決之之辭也唐河東節度使栁公綽在公卿間最名有家法綽尺約切河東道名節度使官名公綽字子寛中門東有小齋自非朝謁之日每平旦輒出至小齋諸子仲郢皆束帶晨省於中門之北公綽決私事接賔客與弟公權及羣從弟再㑹食自旦至莫不離小齋燭至則命一人子弟執經史躬讀一過訖乃講議居官治家之法或論文或聽琴至人定鐘然後歸寢諸子復昏定於中門之北凡二十餘年未嘗一日變易朝音潮郢音頴從去聲莫音暮離去聲仲郢節度之子字諭蒙公權節度之弟字誠懸其遇饑歲則諸子皆蔬食曰昔吾兄弟侍先君為丹州刺史以學業未成不聽食肉吾不敢忘也食音似曰節度言也父沒稱先君聽猶許也姑姊妹姪有孤嫠者雖疎逺必為擇壻嫁之皆用刻木粧奩纈文絹為資裝常言必待資裝豐備何如嫁不失時嫠音離為去聲奩音廉纈胡結切姪謂兄弟之女孤無父者嫠無夫者奩鏡匣也纈丈絹繫絹染為文者及公綽卒仲郢一遵其法事公權如事公綽非甚病見公權未嘗不束帶為京兆尹鹽鐵使出遇公權於通衢必下馬端笏立候公權過乃上馬公權莫歸必束帶迎候於馬首公權屢以為言仲郢終不以官逹有小改莫音暮其指節度也以上言家法之在外者公綽妻韓氏相國休之曾孫家法嚴肅儉約為搢紳家楷範歸栁氏三年無少長未嘗見其啟齒常衣絹素不用綾羅錦繡每歸覲不乗金碧輿祇乗竹兜子二青衣歩屣以隨常命粉苦參黄連熊膽和為丸賜諸子每永夜習學含之以資勤苦楷口駭切少去聲衣去聲祇音止兜當侯切屣音洗和去聲相國宰相之稱休其名也搢紳搢笏垂紳也楷範猶言法式婦人謂嫁曰歸啟齒笑也歸覲歸寧父母也竹兜子竹轎也二青衣二僮使也屣徐行貌資助也此言家法之在内者江州陳氏宗族七百口每食設廣席長幼以次坐而共食之有畜犬百餘共一牢食一犬不至諸犬為之不食畜許六切為去聲陳氏名褒南唐人十世同居犬知愛其類和順之所感也温公曰國朝公卿能守先法久而不衰者唯故李相家子孫數世至二百餘口猶同居共爨田園邸舍所收及有官者俸禄皆聚之一庫計口日給餉婚姻喪葬所費皆有常數分命子弟掌其事其規模大抵出於翰林學士宗諤所制也相去聲邸音底國朝温公自謂本朝也李相名昉字明逺滁州人為宰相故稱李相邸舍客店也宗諤李相之子字昌武右實眀倫李氏曰首十章實父子之親次八章實君臣之義次五章實夫婦之别次十章實長幼之序次一章實朋友之交後十一章通實五倫之義或問此篇似少朋友章朱子曰當時是衆編類來偶缺此耳或問第五倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也吾兄子嘗病一夜十徃退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎第五姓倫名字伯魚漢京兆人為司空以公正稱周以太師太傅太保為三公東漢以太尉司徒司空為三公竟終也朱子曰不薦自是好然於心終不忘便是喫他趨奉意思不過這便是私意又曰如十起與不起便是私這便是避嫌只是他見得這意思已是大段做工夫大段㑹省察了劉寛雖居倉卒未嘗疾言遽色夫人欲試寛令恚伺當朝㑹裝嚴已訖使侍婢奉肉羮翻汚朝衣婢遽收之寛神色不異乃徐言曰羮爛汝手乎其性度如此倉上聲卒音村入聲遽音句恚音惠伺音似朝音潮奉音捧汚去聲寛字文饒漢𢎞農人恚怒也裝嚴謂裝著嚴整異變也張湛矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉及在鄉黨詳言正色三輔以為儀表好去聲處去聲湛字子孝漢平陵人矜嚴矜莊而嚴厲也嚴君尊嚴之君長也漢以京兆尹左馮翊右扶風為三輔共治長安城中儀表猶言法式建武初為左馮翊告歸平陵望寺門而歩主簿進曰眀府位尊徳重不宜自輕湛曰禮下公門式路馬孔子於鄉黨恂恂如也父母之國所宜盡禮何謂輕哉馮音平翊音亦建武年號寺官府之稱主簿馮翊屬吏也恂恂信實之貌楊震所舉荆州茂才王密為昌邑令謁見懐金十斤以遺震震曰故人知君君不知故人何也密曰莫夜無知者震曰天知神知我知子知何謂無知密愧而去遺音位莫音暮震字伯起漢𢎞農人嘗為荆州刺史故人震自謂君謂密熊氏曰眀不欺天幽不欺神内不欺心外不欺人茅容與等輩避雨樹下衆皆夷踞相對容獨危坐愈恭郭林宗行見之而竒其異遂與共言因請寓宿旦日容殺鷄為饌林宗謂為已設既而供其母自以草蔬與客同飯林宗起拜之曰卿賢乎哉因勸令學卒以成徳夷本作跠踞音據為去聲令平聲容字季偉漢陳留人夷踞蹲坐也危坐以尻著蹠而坐也林宗名泰太原人異謂異於衆陶侃為廣州刺史在州無事輒朝運百甓於齋外莫運於齋内人問其故答曰吾方致力中原過爾優逸恐不堪事其勵志勤力皆此類也甓音闢莫音暮侃字士行晉鄱陽人仕至太尉甓磚也時中原陷沒侃欲致力興復故朝夕運甓以習勞也後為荆州刺史侃性聰敏勤於吏職恭而近禮愛好人倫終日斂膝危坐閫外多事千緒萬端罔有遺漏逺近書疏莫不手答筆翰如流未嘗壅滯引接疏逺門無停客閫苦本切上疏去聲下疏平聲愛好人倫尚名敎也閫外謂邦域之外晉處江左以荆楚為國之西門故曰閫外常語人曰大禹聖人乃惜寸隂至於衆人當惜分隂豈可逸逰荒醉生無益於時死無聞於後是自棄也語去聲隂光隂諸叅佐或以談戱廢事者乃命取其酒器蒱博之具悉投之于江吏將則加鞭扑曰摴蒱者牧猪奴戲耳老莊浮華非先王之法言不可行也君子當正其衣冠攝其威儀何有亂頭養望自謂𢎞逹耶蒱音蒲下同樗音樞蒱摴蒱博局戲䨇陸之類浮華謂老聃莊周之言虛而無實也攝簡束也養望通鑑作跣足逸逰荒醉談戲廢事蓬頭跣足皆老莊尚元虛棄禮法之流弊吳氏曰養望養其虛望也王勃楊炯盧照鄰駱賔王皆有文名謂之四傑裴行儉曰士之致逺先器識而後文藝勃等雖有文才而浮躁淺露豈享爵禄之器耶楊子沉静應得令長餘得令終為幸其後勃溺南海照鄰投潁水賔王被誅炯終盈川令皆如行儉之言躁音竈溺音匿行儉字守約唐絳州人器器局識識見浮躁不沉静也淺露不深潛也令長令尹令終善終盈川縣名孔戡於為義若嗜慾不顧前後於利與禄則畏避退怯如懦夫然戡音堪懦音糯戡字君勝孔子三十八世孫懦柔弱也言其勇於為義而怯於趨利禄如此栁公綽居外藩其子每入境郡邑未嘗知既至每出入常於㦸門外下馬呼幕賔為丈皆許納拜未嘗笑語欵洽外藩謂節度使取屏蔽之義也其門得列㦸故曰㦸門納受也柳仲郢以禮律身居家無事亦端坐拱手出内齋未嘗不束帶三為大鎮廐無良馬衣不熏香公退必讀書手不釋卷廐音救仲郢嘗為山南劒南天平三道節度使故曰三為大鎮公退自公而退也釋捨也端坐拱手束帶敬也廐無良馬衣不熏香儉也讀書不釋卷勤也家法句在官不奏祥瑞不度僧道不貸贓吏法凡理藩府急於濟貧䘏孤有水旱必先期假貸廩軍食必精豐逋租必貰免館傳必增飾宴賔犒軍必華盛而交代之際食儲帑藏必盈溢於始至境内有孤貧衣纓家女及笄者皆為選壻出俸金為資裝嫁之貸音泰逋奔謨切貰音世傳朱戀切犒口到切帑音倘藏去聲溢音逸皆為之為去聲在官以下皆栁氏之家法貸寛也假貸謂以錢穀借之廩倉廩軍食軍餉精豐不待欠也貰除也館客舍傳馬驛犒勞也儲蓄也帑藏皆庫名所以貯金帛者衣纓猶簪纓及笄年十五者熊氏曰不奏祥瑞為諂上也吳氏曰食儲帑藏盈溢於始至出納有籍用無所私而致也栁玭曰王相國涯方居相位掌利權竇氏女歸請曰玉工貨一釵竒巧須七十萬錢王曰七十萬錢我一月俸金耳豈於女惜但一釵七十萬此妖物必與禍相隨女子不復敢言女音汝復扶又切王涯唐宰相掌利權謂其兼度支鹽鐵𣙜茶等使也竇氏女涯女嫁竇氏者歸謂歸寧熊氏曰涯實靳嗇託辭拒之然妖物必與禍隨則名言也蓋妖巧之物人所貪競固有招禍之道也數月女自婚姻㑹歸告王曰前時釵為馮外郎妻首飾矣乃馮球也王歎曰馮為郎吏妻之首飾有七十萬錢其可久乎球音求婚姻㑹因婚姻而燕㑹也馮為賈相餗門人最密賈有蒼頭頗張威福馮召而朂之未浹旬馮晨謁賈有二青衣捧地黄酒出飲之食頃而終賈為出涕竟不知其由餗音速朂音旭浹音接飲去聲賈為之為去聲賈餗亦宰相密親密也奴僕以蒼為巾故曰蒼頭朂勉也浹周也十日為旬二青衣二童使也地黄藥名無毒蓋他酒詭稱耳食頃一飯之頃也球以奴張威福恐為主累故戒之奴恐球告主故毒殺之又眀年王賈皆遘禍遘音垢遘遇也涯餗皆為宦者仇士良所殺噫王以珍玩竒貨為物之妖信知言矣徒知物之妖而不知恩權隆赫之妖甚於物耶馮以卑位貪寶貨已不能正其家盡忠所事而不能保其身斯亦不足言矣賈之臧獲害門客於牆廡之間而不知欲終始富貴其可得乎廡音武恩權之隆赫禍機所伏也故謂之妖知言本謂知言之是非此則謂知理之言也盡忠所事謂盡心於餗也奴曰臧婢曰獲指蒼頭門客指馮球廡堂下周屋也此雖一事作戒數端熊氏曰珍玩竒貨不可貪一戒也恩權隆赫不可恃二戒也溺愛而不能正家三戒也失言而不能保身四戒也嬖臧獲張威福害門客而不知五戒也王文正公發解南省廷試皆為首冠或戲之曰狀元試三場一生喫著不盡公正色曰曾平生之志不在温飽解去聲冠去聲著音酌公名曾字孝先宋青州人仕至宰相諡文正狀元指公試三塲言鄉試省試廷試皆第一也志不在温飽則在安天下矣范文正公少有大節其於富貴貧賤毁譽歡戚不一動其心而慨然有志於天下嘗自誦曰士當先天下之憂而憂後天下之樂而樂也少去聲譽音于樂音雒下同不一動其心謂富貴不慕貧賤不厭毁之不怒譽之不喜得而不歡失而不戚也天下未憂而先憂天下已樂而後樂仁人之心如此其事上遇人一以自信不擇利害為趨捨其有所為必盡其方曰為之自我者當如是其成與否有不在我者雖聖賢不能必吾豈苟哉自信守其正也如是盡其方也事上待人一以自信而不趨利不避害有所為必盡其方而成敗不苟焉容心於其間有行法俟命意司馬温公嘗言吾無過人者但平生所為未嘗有不可對人言者耳誠而已管寧嘗坐一木榻積五十餘年未嘗箕股其榻上當膝處皆穿股音古寧字幼安漢髙士古人危坐如跪箕股謂兩展其股狀如箕也呂正獻公自少講學即以治心養性為本寡嗜慾薄滋味無疾言遽色無窘歩無惰容凡嬉笑俚近之語未嘗出諸口於世利紛華聲伎游宴以至於博弈竒玩淡然無所容少去聲窘臣隕切俚音里伎音忌好去聲治心收其放心也養性養其徳性也自寡嗜慾以下當治心以養性之事窘廹促也俚鄙俗也伎巧戲也眀道先生終日端坐如泥塑人及至接人則渾是一團和氣塑音素終日端坐如泥塑人敬也眀道先生作字時甚敬嘗謂人曰非欲字好即此是學朱子曰此亦可以收放心劉忠定公見温公問盡心行已之要可以終身行之者公曰其誠乎劉公問行之何先公曰自不妄語始忠定元城先生諡也朱子曰温公所謂誠即大學所謂誠其意者指人之實其心而不自欺也劉公初甚易之及退而自檃括日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成自此言行一致表裏相應遇事坦然常有餘裕易音異檃音隱掣昌列切肘音帚矛音謀盾汝允切言行之行去聲易之以不妄語為易也揉曲者曰檃正方者曰括皆制木之器也自相掣肘矛盾喻言行相違也吳氏曰掣挽也肘臂節也掣肘謂肘欲運動而人挽之不能運也矛有鈎之兵盾即今傍牌也矛盾謂矛欲傷人而盾蔽之不能傷也劉公見賔客談論踰時體無欹側肩背竦直身不小動至手足亦不移欹音欺竦音聳敬而已矣徐積仲車初從安定胡先生學潛心力行不復仕進其學以至誠為本事母至孝自言初見安定先生退頭容少偏安定忽厲聲云頭容直某因自思不獨頭容直心亦要直也自此不敢有邪心卒諡節孝先生仲車父早卒盡孝於母朱子曰這樣人都是資質美所以一撥便轉終身不為惡也文中子之服儉以絜無長物焉綺羅錦繡不入於室曰君子非黄白不御婦人則有青碧絜音潔長音丈儉謂不華靡潔謂不垢汚長剰也無長物謂儉潔之外無所増飾也黄白麻絲自然之色青碧染造使然之色栁玭曰髙侍郎兄弟三人俱居清列非速客不二羮胾夕食齕蔔匏而已胾音恣齕音核匏音庖髙氏兄弟唐人長釴翰林學士次銖給事中次鍇禮部侍郎速召也不貳不兼設也羮肉羮胾肉臠齕猶嚼也蔔匏皆菜名李文靖公治居第於封邱門外廳事前僅容旋馬或言其太隘公笑曰居第當傳子孫此為宰輔廳事誠隘為太祝奉禮廳事則已寛矣公名沆字太初位宰相諡文靖宋雒州人第第宅封邱宋都門名廳所以治事故曰廳事旋回轉也隘窄狭也太祝奉禮皆世䕃之官已太也張文節公為相自奉如河陽掌書記時所親或規之曰今公受俸不少而自奉若此雖自信清約外人頗有公孫布被之譏公宜少從衆公嘆曰吾今日之俸雖舉家錦衣玉食何患不能顧人之常情由儉入奢易由奢入儉難吾今日之俸豈能常有身豈能常存一旦異於今日家人習奢已久不能頓儉必至失所豈若吾居位去位身存身亡如一日乎公名知白字用晦宋滄州人初為河陽掌書記後為宰相諡文節漢丞相公孫𢎞為布被汲黯曰𢎞俸禄多而為布被此詐也或人見文節之儉約亦疑其詐故引是以譏之頓遽也温公曰先公為羣牧判官客至未嘗不置酒或三行或五行不過七行酒沽於市果止梨栗棗柿肴止於脯醢菜羮器用甆漆當時士大夫皆然人不相非也㑹數而禮勤物薄而情厚甆音慈數音朔温公父名池字和中行猶巡也近日士大夫家酒非内法果非逺方珍異食非多品器皿非滿案不敢㑹賔友常數日營聚然後敢發書苟或不然人争非之以為鄙吝故不隨俗奢靡者鮮矣案亦作按内法謂宫内造酒之法營辦也聚積也書謂召客之書嗟乎風俗頽弊如是居位者雖不能禁忍助之乎居位謂居相位時公已作相矣温公曰吾家本寒族世以清白相承吾性不喜華靡自為乳兒時長者加以金銀華美之服輒羞赧棄去之年二十忝科名聞喜宴獨不戴花同年曰君賜不可違也乃簪一花平生衣取蔽寒食取充腹亦不敢服垢敝以矯俗干名但順吾性而已赧乃板切矯音皎忝叨也聞喜進士宴名垢汚敝壊矯拂干求也汪信民嘗言人常咬得菜根則百事可做胡康侯聞之擊節嘆賞信民名革宋臨川人康侯文定公字也人能甘澹泊而不以外物動心則可以有為矣擊節一說擊手指節一說擊器物為節皆通嘆嗟嘆賞稱賞朱子曰學者湏常以志士不忘在溝壑為念則道義重而計較死生之心輕矣况衣食外物至微末事不得未必便死亦何用犯義犯分役心役志營營以求之耶某觀今人因不能咬菜根而至於違其本心者衆矣可不戒哉右實敬身李氏曰首十四章實心術之要次七章實威儀之則次一章實衣服之制末六章實飲食之節御定小學集註卷六
