body:
  text: 欽定四庫全書御定小學集註卷二内篇明倫第二明明之也倫人倫也其目有五明父子之親明君臣之義明夫婦之别明長㓜之序明朋友之交凡百七篇孟子曰設為庠序學校以教之皆所以明人倫也設立也庠以養老為義序以習射為義校以教民為義皆鄉學也學國學也夏曰校殷曰序周曰庠學則三代共之稽聖經訂賢傳述此篇以訓䝉士訂丁正切傳去聲稽考也訂評議聖人之書曰經賢人之書曰傳内則曰子事父母鷄初鳴咸盥潄櫛縰笄總拂髦冠緌纓端韠紳搢笏左右佩用偪屨著綦盥音管潄音𠻳櫛則瑟切縰音洒笄音鷄髦音毛緌如追切韠音畢搢音晉偪音逼屨音句著音酌綦音忌咸皆也盥洗手也潄潄口也櫛梳也縰韜髪作髻者黒繒為之笄簪也總束髪飾髻者練繒為之拂髦謂拂去髦上之塵緌者纓之餘纓者冠之系端元端服也韠蔽膝也搢插也插笏於大帶所以記事也左右佩用謂身之両旁佩帨巾小刀之類以備用也偪邪幅也纒足至膝者屨鞋也著猶結也綦鞋口帶也在首則櫛髪加縰加笄加總拂髦著冠結纓垂緌在身則服元端著韠加紳搢笏佩用在足則縛偪納屨著綦各以次第施之司馬温公曰孫事祖父母同劉氏曰髦謂子生三月則剪其胎髮為鬌帶之于首男左女右逮其冠笄也則采飾之加于冠不忘父母生育之恩也父母喪則去之婦事舅姑如事父母鷄初鳴咸盥潄櫛縰笄總衣紳左右佩用衿纓綦屨衿叵禁切夫之父曰舅夫之母曰姑衣紳著衣而加紳也佩用鍼線之類衿結也纓香囊也恐身有穢氣觸尊者故佩之司馬温公曰孫婦同以適父母舅姑之所適徃也所寢室也及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之出入則或先或後而敬扶持之燠音郁苛音疴癢音養抑音益搔音騷燠熱也苛疥也低下其氣怡悦其聲問衣之燠將減之也問衣之寒將加之也疾痛則抑按苛癢則搔爬出入則或前以扶持之或後以扶持之一出於敬也進盥少者奉槃長者奉水請沃盥盥卒授巾奉音捧槃音盤沃音屋沃盥注水而盥授進也巾拭手者問所欲而敬進之柔色以温之父母舅姑必嘗之而後退温去聲所欲意之所欲食者陳氏曰温承藉也謂以和柔之顔色承藉尊者之意男女未冠笄者鷄初鳴咸盥潄櫛縰拂髦總角衿纓皆佩容臭昧爽而朝問何食飲矣若已食則退若未食則佐長者視具冠音貫朝音潮佐去聲男未冠女未笄皆㓜者總角束髪為角也臭香物也助為容飾故曰容臭以纓佩之昧晦也爽明也謂欲明未明之時朝猶見也佐助也視具謂察視饌具寒暖之節凡内外鷄初鳴咸盥潄衣服斂枕簟灑掃室堂及庭布席各從其事衣去聲簟徒㸃切此亦内則之文而不言者䝉上章也他皆放此内外婢僕之輩斂收也枕簟謂尊者之枕簟布設也席謂尊者之坐席各從其事若女服事于内男服事于外是矣父母舅姑將坐奉席請何鄉將衽長者奉席請何趾少者執牀與坐御者舉几歛席與簟縣衾箧枕歛簟而襡之奉音捧鄉音向衽音稔趾音止縣音元箧音袪襡音獨將衽謂將設臥席趾足也牀謂安坐之牀御者謂侍奉之人衾被也箧以竹為之襡以布為之設坐席則問面向何方設臥席則問足向何方臥而起則執牀以與之坐舉几以與之憑席與簟則收歛之衾則束而縣之枕則以箧貯之簟既歛而又以襡韜之者以臥則簟在席上尤當敬也將坐奉席亦長者斂席以下皆侍者父母舅姑之衣衾簟席枕几不傳杖屨祗敬之勿敢近敦牟巵匜非餕莫敢用與恒飲食非餕莫之敢飲食祗音攴敦音對牟音謀巵音支匜音移餕音俊傳移也衣衾簟席枕几每日置之有常處不得輒移置他處也近謂挨逼之杖屨服飾之重者尤湏恭敬不敢挨逼之也敦牟皆盛黍稷之器巵酒器匜盛水之器食餘曰餕與及也恒常也尊者所用之器非食其餘則不敢用之所常飲食之物非飲食之餘者則不敢飲食之在父母舅姑之所有命之應唯敬對進退周旋慎齊唯音委齊側皆反應唯應以速也敬對對以敬也進退周旋慎齊言一進一退之時周回旋轉之際必謹慎齊莊也升降出入揖遊不敢噦噫􅅉咳欠伸跛倚睇視不敢唾洟噦於決切噫音隘􅅉音帝咳邱盖切跛音庇睇音第唾吐臥切洟音替升降以堂階言出入以門戶言揖謂進而前其身略俯如揖也遊揚也謂退而後其身微仰而揚也噦嘔逆聲噫食飽聲􅅉噴􅅉咳咳𠻳氣乏則欠體疲則伸偏任為跛依物為倚睇視邪視也唾出於口洟出於鼻噦噫􅅉咳則聲不恭欠伸跛倚睇視則貌不恭唾洟則聲貌俱不恭故升降出入揖遊之頃皆不敢寒不敢襲癢不敢搔不有敬事不敢袒裼不渉不撅䙝衣衾不見裏襲音習搔音騷袒音但裼音昔撅音貴䙝音屑見音現亦為不恭也襲謂重衣敬事謂習射袒裼露臂也撅褰裳也非習射則不敢露臂非渉水則不敢褰裳䙝猶近也近身之衣衾其裏有穢故不見父母唾洟不見冠帶垢和灰請漱衣裳垢和灰請澣衣裳綻裂紉箴請補綴見音現垢音苟潄音捜澣音緩紉尼隣切箴音針綴贅拙二音不見謂刷去之垢塵垢也和湯漬也手洗曰潄足洗曰澣上服曰衣下服曰裳以線貫鍼曰紉少事長賤事貴共帥時帥音率賤謂婢僕之輩共皆也帥循也時是也謂皆循是禮而行之曲禮曰凡為人子之禮冬温而夏凊昏定而晨省温以致其暖如温被之類凊以致其凉如扇枕之類定以安其寢省以問其安出必告反必面所遊必有常所習必有業恒言不稱老告啟也反還也面猶見也常猶方也陳氏曰遊有常身不他徃也習有業心不妄用也恒言平常言語也自以老稱則父母為過於老矣不稱老欲安父母之心也禮記曰孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容孝子如執玉如奉盈洞洞屬屬然如弗勝如將失之嚴威儼恪非所以事親也奉音捧屬音竹勝音升此禮記祭義之篇不曰祭義而曰禮記者以其言孝非言祭也餘皆放此愉悦之色見於面婉順之容見於身盈滿也洞洞質慤貌屬屬専一貌勝當也言敬親常如執玉奉盈恐不能當其重滿而且將覆墜也若夫嚴肅威重儼正謹恪乃以上臨下之敬耳豈事親之道哉陳氏曰和氣愉色婉容皆愛心之所發如執玉捧盈如弗勝如將失之皆敬心之所存愛敬兼至乃孝子之道曲禮曰凡為人子者居不主奧坐不中席行不中道立不中門主當也室西南隅為奥尊者所居也食饗不為槩祭祀不為尸食音似槩音盖食饗如延客奉祭之類槩量饌具之多少當順親意不得自限量也尸神象也父主祭而子為尸是父拜子也故不為聽於無聲視於無形親雖未言亦聽之恐言而不及聞也親雖未動亦視之恐動而不及見也以上言尊親之事不登髙不臨深不苟訾不苟笑訾音紫苟苟且訾毁也登髙臨深危道也苟訾苟笑辱道也此言愛身之事邵氏曰為子之道既當自卑以尊其親又當自重以愛其身孔子曰父母在不逺遊遊必有方朱子曰逺遊則去親逺而為日久定省曠而音問疎不惟己之思親不置亦恐親之念我不忘也遊近遊也遊必有方如已告云之東則不敢更適西欲親必知己之所在而無憂召已則必至而無失也范氏曰子能以父母之心為心則孝矣曲禮曰父母存不許友以死死謂患難相死親在而以死許人是忘親矣黄氏曰許友以死雖父母不在亦不可禮記曰父母在不敢有其身不敢私其財示民有上下也有猶専也即許友以死之謂示猶教也有上下卑當統於尊也父母在饋獻不及車馬示民不敢専也自此遺彼曰饋自下奉上曰獻車馬物之重者故不敢専之以饋獻内則曰子婦孝者敬者父母舅姑之命勿逆勿怠子而孝敬父母必愛之婦而孝敬舅姑必愛之然不可恃愛而於命或逆或怠也逆謂不順怠謂不勤若飲食之雖不耆必嘗而待加之衣服雖不欲必服而待飲去聲食音似耆音視耆欲皆好也待謂待尊者察已不好而改命焉然後去之加之事人代之已雖不欲姑與之而姑使之而後復之姑且也使教也陳氏曰尊者任之以事已既為之矣或念其勞又使人代為已雖不以為勞而不欲人代然必順尊者之意且與之若慮其為之不如己意且教之及其果不能而後已復為之黄氏曰此兩節皆明弗逆弗怠之意子婦無私貨無私畜無私器不敢私假不敢私與畜許六切畜養牲也假借人也鄭氏曰家事統於尊者也婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜帨音税茝昌改反或賜之謂私親兄弟與之也佩雜佩鍼線之類帨帨巾茝蘭皆香草輔氏曰新初也如初受兄弟之賜也若反賜之則辭不得命如更受賜藏以待乏反賜之謂舅姑不受而復與之不得命不允其辭也如更受賜如再受舅姑之賜也待乏者待舅姑之空乏而獻之也婦若有私親兄弟將與之則必復請其故賜而後與之復扶又切故為句故即反賜之物也亦必再請於舅姑既許然後與之黄氏曰不敢私受故獻諸舅姑不敢私與故復請其故曲禮曰父召無諾先生召無諾唯而起唯音委諾應之緩唯應之速士相見禮曰凡與大人言始視面中視抱卒視面毋改衆皆若是士相見禮儀禮篇名大人卿大夫也視面觀其顔色可傳言未也抱懐抱也視抱容其思之且為敬也視面察其納己言否也毋改謂見答之間當正容體以待之毋自變動嫌懈惰不虛心也衆謂諸卿大夫同在此者皆若是視之儀無異也若父則遊目毋上於面毋下於帶上上聲子於父主孝不主敬故所視差廣目觀安否何如也記曰凡視上於面則敖下於帶則憂若不言立則視足坐則視膝視足伺其行也視膝伺其起也禮記曰父命呼唯而不諾手執業則投之食在口則吐之走而不趨父命呼為父命所呼也唯諾皆應也而唯速於諾走趨皆歩也而走速於趨親老出不易方復不過時親癠色容不盛此孝子之疏節也復音伏癠音劑易改也不易方如已告云東徃則不敢更適西也復還也不過時如已告云晝還則不敢更至暮也癠病也色容不盛有憂色也孝子之事親無所不至此特其疏略之禮節耳父沒而不能讀父之書手澤存焉爾母没而杯圏不能飲焉口澤之氣存焉爾圈區員切不能猶不忍父母沒而澤猶存故不忍方氏曰書書策也杯圏飲食器也手澤汗之所漬也口澤津之所漬也口有氣焉故又以氣言之内則曰父母有婢子若庶子庶孫甚愛之雖父母沒没身敬之不衰婢子婢所生者若及也庶子庶孫庶母所出者父母所愛當終身敬之非特愛之而已子有二妾父母愛一人焉子愛一人焉由衣服飲食由執事毋敢視父母所愛雖父母沒不衰由自也視比也子甚宜其妻父母不説句出子不宜其妻父母曰是善事我子行夫婦之禮焉没身不衰説音悦宜猶善也出謂出其妻應氏曰父母以為善子情雖替而夫婦之禮亦不可不行焉曽子曰孝子之養老也樂其心不違其志樂其耳目安其寢處以其飲食忠養之養去聲樂音雒下俱同處上聲曽子孔子弟子名參字子輿老及四其字皆指親而言樂其心怡悦其心也不違其志承順其志也方氏曰怡聲以問所以樂其耳柔色以温所以樂其目昏定所以安其寢晨省所以安其處忠者盡己之心也是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而况於人乎父母所愛之犬馬猶愛之况父母所愛敬之人乎内則曰舅沒則姑老冢婦所祭祀賔客每事必請於姑介婦請於冢婦老謂傳家事於冢婦非以年計也冢婦長婦也祭祀賔客禮之大者猶必咨禀而後行焉介婦衆婦也舅姑使冢婦毋怠不友無禮於介婦友當作敢言舅姑以事使冢婦既不可怠於事又不敢恃舅姑之命而無禮於介婦也舅姑若使介婦毋敢敵耦於冢婦不敢竝行不敢竝命不敢竝坐耦音偶敵相抗也耦相竝也命出令也言舅姑若以事使介婦亦不敢恃此而與冢婦相抗竝非惟任事不敢抗竝亦不敢竝行竝命竝坐也凡婦不命適私室不敢退婦將有事大小必請於舅姑凡婦通冢婦介婦言私室婦之室盖婦侍舅姑不命之退不敢退也事謂私事適子庶子祇事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入不敢以貴富加於父兄宗族適音的舍去聲適子謂父及祖之適子是小宗也庶子謂適子之弟宗子謂大宗子宗婦謂大宗子之妻祇敬也徒從人也舍置也寡少也約省也入亦謂入宗子之家加髙也言非惟不敢以富貴入宗子之家凡内外父兄宗族皆不敢以此加之曽子曰父母愛之喜而弗忘父母惡之懼而無怨父母有過諫而不逆朱子曰諫而不逆謂委曲作道理以諫不唐突以觸父母之怒也内則曰父母有過下氣怡色柔聲以諫諫若不入起敬起孝説則復諫説音悦復扶又切吳氏曰下怡柔皆和順之意盖諫易至於犯故欲和順也入納也起者悚然興起之意不説與其得罪於鄉黨州閭寧孰諫父母怒不説而撻之流血不敢疾怨起敬起孝説音悦下同孰與熟同萬二千五百家為鄉五百家為黨二千五百家為州二十五家為閭孰諫謂純熟殷勤而諫疾惡也諫而父母不悦其罪輕不諫而父母得罪於人其罪重二者之間寧可孰諫曲禮曰子之事親也三諫而不聽則號泣而隨之號平聲將以感動親心庶或能聽也父母有疾冠者不櫛行不翔言不惰琴瑟不御食肉不至變味飲酒不至變貌笑不至矧怒不至詈疾止復故矧矢引切詈音利櫛梳髪也翔張拱也惰戲慢也變猶易也貌謂色也齒見曰矧怒罵曰詈孝子之事親病則致其憂不櫛憂不為飾也不翔憂不為容也不惰憂不為謔也不御憂不為樂也不變味憂不擇食也不變貌憂不多飲也大笑則見矧怒甚則至詈亦為忘憂故戒之復故復常也疾止則憂散故復常君有疾飲藥臣先嘗之親有疾飲藥子先嘗之嘗謂度其所堪醫不三世不服其藥吕氏曰醫至三世活人多矣用藥熟矣然後服之謹疾之道也方氏曰經之所言道其常而已非世傳而自得未及三世固在所取也孔子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣行去聲朱子曰父在子不得自専而志則可知父沒然後其行可見故觀此足以知其人之善惡然又必能三年無改於父之道乃見其孝不然則所行雖善亦不得為孝矣内則曰父母雖沒將為善思貽父母令名必果將為不善思貽父母羞辱必不果貽遺也令善也果謂果決為之祭義曰霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之悽音妻愴音創濡音儒怵音出惕他厯切祭義禮記篇名此言君子感時思親也履踐也悽愴悲傷貌濡沾濕也怵惕驚動貌見之謂見其親履霜露而悽愴故祭於秋履雨露而怵惕故祭於春祭統曰夫祭也者必夫婦親之所以備外内之官也官備則臭備夫音扶祭統禮記篇名統猶本也具者供祭之物國之祭卿大夫相君命婦相夫人家之祭衆子相宗子備外官也衆婦相宗婦備内官也官既備則事無闕矣君子之祭也必身親莅之有故則使人可也莅音利莅臨也必身親臨之者致其如在之誠也輔氏曰有故謂疾病或不得已之事已既不克與而時又不可失則使他人攝之可也祭義曰致齊於内散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所耆齊三日乃見其所為齊者齊音齋下同散上聲處上聲樂五教切耆音視齊之為言齊也所以齊不齊而致其齊也致齊於内若心不苟慮之類散齊於外若不飲酒不茹葷之類樂好也耆欲也五其字及所為皆指親而言祭之日入室僾然必有見乎其位周還出戶肅然必有聞乎其容聲出戶而聽愾然必有聞乎其歎息之聲僾音愛還音旋愾開代切陳氏曰入室入廟室也僾然彷彿之貌見乎其位如見親之在神位也周旋出戶謂薦爼酌獻之時行歩周旋之間或自戶内而出也肅然敬惕之貌容聲舉動容止之聲也出戶而聽祭畢而出聽也愾然大息之聲也是故先王之孝也色不忘乎目聲不絶乎耳心志耆欲不忘乎心輔氏曰先王能存其心故親之容色自不忘乎目親之聲音自不絶乎耳親之心志耆欲自不忘乎心致愛則存致慤則著著存不忘乎心夫安得不敬乎慤音確陳氏曰致愛極其愛親之心也致慤極其敬親之誠也存以上文三者不忘而言著以上文見乎其位以下三者而言輔氏曰著存不忘乎心則洋洋乎如在其上如在其左右夫安得不敬乎曲禮曰君子雖貧不粥祭器雖寒不衣祭服為宫室不斬於邱木粥音育衣去聲粥賣也邱墓也君子寧其身之困而不忍慢其先孝敬之至也王制曰大夫祭器不假祭器未成不造燕器假借也大夫有田祿祭器當自具故不假造為也燕器自奉之器祭器未成則不造先神而後已也孔子謂曽子曰身體髪膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也膚皮也身體言其大髪膚言其小道者當然之理身不苟安而行必由道則己之名揚於後世而父母之名亦顯矣夫孝始於事親中於事君終於立身夫音扶此孝之終始也愛親者不敢惡於人敬親者不敢慢於人愛敬盡於事親而徳教加於百姓刑於四海此天子之孝也惡去聲刑儀法也真氏曰孝者不出乎愛敬而已推愛親之心以愛人而無所疾惡推敬親之心以敬人而無所慢易則躬行於上而徳教自刑於下天下之人無不皆愛敬其親矣此大孝尊親之事在上不驕髙而不危制節謹度滿而不溢然後能保其社稷而和其民人此諸侯之孝也溢音逸制節自制於禮節也謹度謹守法度也貴為國君可謂髙矣富有千乘可謂滿矣髙則易危在上不驕故不危滿則易溢制節謹度故不溢社土神稷榖神惟諸侯得祭之民謂庶民人謂在位者此下三節其次弗辱之事非先王之法服不敢服非先王之法言不敢道非先王之徳行不敢行然後能保其宗廟此卿大夫之孝也法法度也道言也宗程子曰言人宗於此而祭祀也卿大夫有家家必有廟故言保宗廟以孝事君則忠以敬事長則順忠順不失以事其上然後能守其祭祀此士之孝也移事親之孝以事君則忠矣移事親之敬以事長則順矣上即君長也士有田祿以奉祭祀故言守祭祀用天之道因地之利謹身節用以養父母此庶人之孝也朱子曰用天之道因地之利謂依時及節耕種田土謹身謂不作非為不犯刑憲節用謂省使儉用不妄耗費如此則身安用足自有以奉養其父母也故自天子至於庶人孝無終始而患不及者未之有也孝之終始見上文事親而不能有終有始災及其身必矣孔子曰父母生之續莫大焉君親臨之厚莫重焉是故不愛其親而愛他人者謂之悖徳不敬其親而敬他人者謂之悖禮續音俗悖音佩悖猶逆也真氏曰父母生我者也我則嗣續乎父母者天性之恩孰大焉君之臨臣父之臨子所以治而教之也其厚乎我孰重焉合君親而並言以見君臣其義一也孝子之事親居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴五者備矣然後能事親養去聲樂音雒致極也樂謂愉色婉容人子事親之心自始至終無一毫之不盡可謂孝矣事親者居上不驕為下不亂在醜不爭居上而驕則亡為下而亂則刑在醜而爭則兵三者不除雖日用三牲之養猶為不孝也養去聲驕矜肆亂悖逆醜同類爭爭鬭亡滅亡刑刑戮也兵謂以兵刃相加除去也三牲牛羊豕也三者不除烖將及親其為不孝大矣口體之奉豈足贖哉孟子曰世俗所謂不孝者五惰其四支不顧父母之養一不孝也博奕好飲酒不顧父母之養二不孝也好貨財私妻子不顧父母之養三不孝也從耳目之欲以為父母戮四不孝也好勇鬭狠以危父母五不孝也養去聲下同弈音亦好去聲下同從音縱戮音六狠下懇切四支手足也顧猶念也博局戲弈圍碁私偏私從從恣也欲謂耳欲聲目欲色也戮羞辱狠忿戾也新安陳氏曰五不孝之序從輕漸説至重曽子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也莅官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不遂烖及其親敢不敬乎處上聲莅音利陳音陣烖音災行猶奉也莅臨也交兵曰戰制行伍曰陳遂成也曰莊曰忠曰敬曰信曰勇皆持身以敬也一有不敬小則辱親大則禍親矣孔子曰五刑之屬三千而罪莫大於不孝五刑墨劓剕宫大辟也墨者刺面劓者割鼻剕者刖足宫者去勢大辟死刑也按書吕刑墨屬千劓屬千剕屬五百宫屬三百大辟之屬二百凡三千條刑所以罰惡惡莫大於不孝故罪亦莫大於不孝右明父子之親禮記曰將適公所宿齊戒居外寢沐浴史進象笏書思對命既服習容觀玉聲乃出齊莊皆切觀音貫適徃也公所君所也宿前期也史掌文史者笏者忽也書事以備忽忘者也思謂所思告君者對謂所擬對君者命謂君命三者皆書於笏有進思盡忠之意焉既服著朝服畢也容貌儀觀佩玉之聲㸃檢不至則失色於人故預習之曲禮曰凡為君使者已受命君言不宿於家為去聲使去聲君言即君命受命即行敬君也君言至則主人出拜君言之辱使者歸則必拜送於門外使去聲出謂出門辱者屈辱君命之臨也陳氏曰至則拜命歸則拜送皆敬君也若使人於君所則必朝服而命之使者反則必下堂而受命下使去聲反還也朝服而遣使下堂而受命皆敬君也論語曰君召使擯色勃如也足躩如也躩區若切朱子曰擯主國之君所使出接賔者勃變色貌躩盤辟貌皆敬君命故也揖所與立左右手衣前後襜如也䄡赤占切朱子曰所與立謂同為擯者也揖左人則左其手揖右人則右其手襜整貌趨進翼如也朱子曰疾趨而進張拱端好如鳥舒翼賔退必復命曰賔不顧矣朱子曰舒君敬也此一節記孔子為君擯相之容入公門鞠躬如也如不容朱子曰鞠躬曲身也公門髙大而若不容敬之至也立不中門行不履閾閾音役朱子曰中門中於門也閾門限也謝氏曰立中門則當尊行履閾則不恪過位色勃如也足躩如也其言似不足者朱子曰位君之虚位君雖不在過之必敬不敢以虛位而慢之也言似不足不敢肆也攝齊升堂鞠躬如也屏氣似不息者齊音咨屏音丙朱子曰攝摳也齊衣下縫也禮將升堂兩手摳衣使去地尺恐躡之而傾跌失容也屏藏也息鼻息出入者也近至尊氣容肅也出降一等逞顔色怡怡如也沒階趨翼如也復其位踧踖如也踧子六切踖音積朱子曰等階之級也逞放也漸逺所尊舒氣解顔怡怡和悦也沒階下盡階也趨走就位也踧踖恭敬不寧之貌復位踧踖敬之餘也此一節記孔子在朝之容禮記曰君賜車馬乗以拜賜句衣服服以拜賜陳氏曰君賜及門既拜受矣明日又乗服詣君所而拜謝其賜敬之至也君未有命弗敢即乗服也輔氏曰君雖賜之而未有命使之乗服則亦不敢即乗服也意者古之人君賜臣下以車服又必命之乗服與曲禮曰賜果於君前其有核者懐其核核胡得切敬君賜也御食於君君賜餘器之溉者不寫其餘皆寫溉音盖御食侍食也餘謂食之餘者溉洗滌也陶器木器可以洗滌則就本器食之若萑竹所織之器不可洗滌則傾寫於别器而食之陳氏曰不欲口澤之瀆也論語曰君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之畜音旭朱子曰食恐或餕餘故不以薦正席先嘗如對君也言先嘗則餘當頒賜矣腥生肉熟而薦之祖考榮君賜也畜之者仁君之恵無故不敢殺也侍食於君君祭先飯飯音反祭謂祭先代始為飲食之人朱子曰侍食者君祭則已不祭而先飯若為君嘗食然不敢當客禮也疾君視之東首加朝服拖紳首去聲拖待可切朱子曰東首以受生氣也病臥不能著衣束帶又不可以䙝服見君故加朝服於身又引大帶於上也君命召不俟駕行矣朱子曰急趨君命行出而駕車隨之此四條皆記孔子事君之禮吉月必朝服而朝朝音潮下同朱子曰吉月月朔也孔子在魯致仕時如此孔子曰君子事君進思盡忠退思補過將順其美匡救其惡故上下能相親真氏曰將猶承也匡正也進謂入見其君則思盡己之忠退謂出適私室則思補君之過無一時一念之不在君也有善焉承順之使之益進於善有惡焉正救之使之潛消其惡此愛君之至也臣以忠愛而親其君君亦諒其忠愛而親之君使臣以禮臣事君以忠朱子曰二者皆理之當然各欲自盡而已大臣以道事君不可則止朱子曰以道事君者不從君之欲不可則止者必行己之志又曰不可則止謂不合則去也子路問事君子曰勿欺也而犯之子路孔子弟子姓仲名由字子路朱子曰犯謂犯顔諫爭鄙夫可與事君也與哉與音于與哉疑辭朱子曰鄙夫庸惡陋劣之稱其未得之也患得之既得之患失之何氏曰患得之謂患不能得之新安陳氏曰得謂得富貴權利苟患失之無所不至矣朱子曰小則吮癰䑛痔大則弑父與君皆生於患失而已孟子曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊范氏曰人臣以難事責於君使其君為堯舜之君者尊君之大也開陳善道以禁閉君之邪心唯恐其君或陷於有過之地者敬君之至也謂其君不能行善道而不以告者賊害其君之甚也有官守者不得其職則去有言責者不得其言則去朱子曰官守以官為守者言責以言為責者王蠋曰忠臣不事二君烈女不更二夫蠋齊之晝邑人忠義之臣始終一心貞烈之女始終一志不以利害易不以生死變按通鑑燕將樂毅破齊聞蠋賢使請蠋蠋拒之以此遂自經死右明君臣之義曲禮曰男女非有行媒不相知名非受幣不交不親行媒謂媒氏之徃來名謂男女之名幣幣帛也故日月以告君齊戒以告鬼神為酒食以召鄉黨僚友以厚其别也别必列反日月謂取婦之期鬼神謂先祖僚同官者友同志者厚别重其有别之禮也取妻不取同姓故買妾不知其姓則卜之取音娶下同不娶同姓為其近禽獸卜者卜其吉凶也士昏禮曰父醮子命之曰徃迎爾相承我宗事朂帥以敬先妣之嗣若則有常子曰諾唯恐弗堪不敢忘命醮去聲迎去聲相去聲朂音旭帥音率士昏禮儀禮篇名酌而無酬酢曰醮盖醮子以親迎也相助也妻所以助夫故謂之相宗事宗廟之事朂勉也帥倡也母曰先妣盖古稱也先妣之嗣謂婦代姑祭也若爾也有常始終以敬也諾應辭堪能也父送女命之曰戒之敬之夙夜無違命無母通下同夙早也違逆也命謂舅姑之命母施衿結帨曰勉之敬之夙夜無違宫事衿音琴衿衣帶帨佩巾違乖也宫事謂閫内之事也庶母及門内施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸衿鞶衿音琴庶母父妾鞶大帶申重宗尊愆過也不違命不違宫事則無過矣視衿鞶者欲其常覩之以憶父母之言而不忘也真氏曰夫之道在敬身以帥其婦婦之道在敬身以承其夫故父之醮子曰勉帥以敬親之送女曰戒之敬之夫婦之道盡於此矣禮記曰夫昏禮萬世之始也取於異姓所以附逺厚别也幣必誠辭無不腆告之以直信信事人也信婦徳也一與之齊終身不改故夫死不嫁夫音扶取音娶逺去聲别必列反腆他典反有夫婦然後有父子父子所以傳世故曰萬世之始附託也託於逺嫌之義也厚别重其有别之禮不欲相䙝也幣所以將意辭所以道情腆猶善也幣誠而不濫惡辭腆而不輕瀆是欲告戒為婦者以正直誠信也婦人事人者也信者事人之道婦人之徳故以是告戒之齊謂共牢而食合卺而酳不改謂不改而他適方氏曰信而無偽則直在其中矣男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也迎去聲先去聲下同先倡導也馬氏曰男子親迎而男先於女者剛先於柔之義也豈獨婚姻之際如此天造始而地代終君主倡而臣主和亦此義也執摯以相見敬章别也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安無别無義禽獸之道也摯音至别必列反昏禮摯用鴈章明也執鴈以相見行敬以明别也男女無别則淫僻之罪多而父子之恩薄故必男女有别然後父子親父子親則義生禮作揩之家國天下而萬物各安其所矣朱子曰漢武帝溺於聲色游燕後宫父子不親遂致戾太子之變此亦夫婦無别而父子不親之一證取婦之家三日不舉樂思嗣親也取音娶取妻以代父母有可感傷者故不舉樂昏禮不賀人之序也序猶代也在子則代父在婦則代姑故不賀内則曰禮始於謹夫婦為宫室辨外内男子居外女子居内深宫固門閽寺守之男不入女不出閽音昏寺音氏夫婦人倫之始禮為人倫而設故始於謹夫婦為宫室以下皆謹夫婦之事閽守門者寺守宫者男女不同椸枷不敢縣於夫之楎椸不敢藏於夫之箧笥不敢共湢浴椸音移下同枷音架縣音元楎音輝箧音蛺笥音似湢音逼横者曰椸直者曰楎挂衣者也箧笥皆竹為之貯衣者也浴室曰湢草廬吳氏曰言内外之辨非特男女為然雖夫婦得相親者亦然夫不在斂枕箧簟席襡句器而藏之少事長賤事貴咸如之襡音獨吳氏曰器者器重之謂斂枕於箧斂簟席於襡器重而藏之是不特妻事夫之禮凡少之事長賤之事貴皆當如是也雖婢妾衣服飲食必後長者長者謂婢妾中之長者婢妾雖賤亦必有長㓜之倫焉妻不在妾御莫敢當夕接於寢曰御古者妻妾之御各有夕當夕者當妻之夕也男不言内女不言外非祭非喪不相授器其相授則女受以篚其無篚則皆坐句奠之而後取之篚音匪下同内謂女事外謂男事篚箱類坐跪也奠置也男女授受不親惟喪祭二事得親相授器盖祭嚴喪遽不嫌也非此二事則不得親相授器其或相授則女必執篚使授者置之篚中然後受之其或無篚則男女皆跪授者置諸地受者取諸地不親相授也外内不共井不共湢浴不通寢席不通乞假男女不通衣裳乞求也假借也輔氏曰井湢一定故言不共寢席衣裳可移故言不通外内汎也男女切也男子入内不嘯不指夜行以燭無燭則止女子出門必擁蔽其面夜行以燭無燭則止嘯謂蹙口出聲指謂用手指畫不嘯不指為駭人視聽也以用也擁猶障也道路男子由右女子由左道路之法其右以行男子其左以行女子地道尊右故男右而女左孔子曰婦人伏於人也是故無専制之義有三從之道在家從父適人從夫夫死從子無所敢自遂也教令不出閨門事在饋食之間而已矣食音似伏屈伏也専制自遂即下文所謂擅為獨成也饋食供饋酒食也已止也是故女及日乎閨門之内不百里而犇喪事無擅為行無獨成叅知而後動可驗而後言晝不遊庭夜行以火所以正婦徳也犇音奔行去聲及日猶言終日不百里猶言不越境叅使人相叅也驗證驗也晝居於内而不出中庭夜行於内而必照以火婦人之徳以順為正凡此皆所以正婦徳而使之正也女有五不取逆家子不取亂家子不取世有刑人不取世有惡疾不取喪父長子不取取音娶下同逆謂逆徳如不忠不孝之類亂謂亂倫世有刑人棄於人也世有惡疾棄於天也長子長女也喪父而又無兄則無所受命矣或疑世有刑人不取朱子曰所謂不取者是世世為惡不能改者非指一世而言如喪父長子不取却可疑若然則無父之女不復嫁此不可曉婦有七去不順父母去無子去淫去妬去有惡疾去多言去竊盜去妬妬忌也不順父母去為其逆徳也無子去為其絶世也淫去為其亂族也妬去為其亂家也有惡疾去為其不可與共粢盛也多言去為其間親也竊盜去為其反義也無子去惡疾去於義未安若必以為不去則無以承宗事繼後世也處之自當以義何至於去邪此皆可疑有三不去有所取無所歸不去與更三年喪不去前貧賤後富貴不去取去聲與音預更平聲有所取無所歸謂其嫁有所受命後無父兄無可回之地也與更三年喪謂曽居舅姑之喪也前貧賤後富貴謂娶婦時貧賤而今富貴也凡此聖人所以順男女之際重婚姻之始也際謂交際之道始謂正始之義通結此章曲禮曰寡婦之子非有見焉弗與為友見音現見謂才徳著見不著見則不友避好色之嫌也右明夫婦之别孟子曰孩提之童無不知愛其親也及其長也無不知敬其兄也朱子曰孩提二三歳之間知孩笑可提抱者也孝弟之心人皆有之堯舜所以世為天下法亦充此而已矣徐行後長者謂之弟疾行先長者謂之不弟弟去聲下同先去聲徐緩也後長者在長者之後也疾速也先長者在長者之先也善事兄長為弟曲禮曰見父之執不謂之進不敢進不謂之退不敢退不問不敢對陳氏曰父之執父同志之友也謂之命之也敬之同於父年長以倍則父事之十年以長則兄事之五年以長則肩隨之此泛言敬長之節人生以十年為一節倍之則二十年也父事之兄事之即後章所謂父之齒隨行兄之齒鴈行也肩隨之並行而稍退也謀於長者必操几杖以從之長者問不辭讓而對非禮也操七刀切操執也從就也几所以憑杖所以扶謀事於長者必執以就之非謂長者所無也盡禮而已曽子曰參不敏何足以知之公西華曰非曰能之願學焉皆辭譲之言也從於先生不越路而與人言遭先生於道趨而進正立拱手先生與之言則對不與之言則趨而退從去聲從隨行也越踰也遭遇也趨急走也從長者而上邱陵則必鄉長者所視從去聲上上聲鄉音向土髙曰邱大阜曰陵向長者所視恐其因所見而問則可即所見以對也長者與之提攜則兩手奉長者之手負劒辟咡詔之則掩口而對奉音捧辟音僻咡音二提攜謂牽行捧手所以承長者之意負劒即帶劒謂長者旁挾㓜者狀如帶劒也辟偏也咡口旁也詔猶語也掩口謂以手障口不使氣觸長者凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者以箕自鄉而扱之拘音勾鄉音向扱音吸糞與拚同掃地也袂袖也拘障也退卻行也扱斂取也初則置帚於箕上得以兩手舉箕掃地之時則一手執帚一袖障帚郤歩而行不使塵及長者終則以箕自向斂取其塵不以箕向長者皆敬也將即席容毋怍兩手摳衣去齊尺怍音昨摳苦勾反齊音咨即就也怍愧也失容則可愧矣齊衣下縫也兩手摳衣使去地尺恐躡之而傾跌失容也衣毋撥足毋蹶先生書策琴瑟在前坐而遷之戒勿越撥半末切蹶音厥撥發揚貌蹶行遽貌二者亦失容坐跪也遷移也越謂跨之而過此皆將即席之事下文乃既即席之事坐必安執爾顔長者不及毋儳言儳音慙安謂不揺動爾指少者執顔即正顔色也不及不言及也儳言叅雜長者之先而言也正爾容聽必恭毋勦説毋雷同必則古昔稱先王勦初交切容謂見於一身者聽謂聽長者之言勦説擥取人之言也雷同附和人之言也法則古昔稱述先王則言有據而非勦説雷同矣侍坐於先生先生問焉終則對請業則起請益則起陳氏曰問終而後對欲盡聞所問之旨且不敢叅雜先生之言也請業者求當習之事請益者再問未盡之藴起所以致敬尊客之前不叱狗讓食不唾叱音赤唾吐臥切不叱狗慮駭尊客之聽不吐唾慮咈尊客之意侍坐於君子君子欠伸撰杖屨視日蚤莫侍坐者請出矣撰仕轉切蚤音早莫音暮氣乏則欠體疲則伸撰猶轉動也日謂日影四者皆厭倦之容故請退以息之侍坐於君子君子問更端則起而對更平聲問更端更易事端而見問也起所以致敬侍坐於君子若有告者曰少間願有復也則左右屏而待少上聲間去聲屏音丙復白也言欲得少間隙以白事也屏退也居左則屏於左居右則屏於右屏而且待者屏所以逺人之私語待所以防君子之召侍飲於長者酒進則起拜受於尊所長者辭少者反席而飲長者舉未釂少者不敢飲釂音醮尊酒尊也辭止之也反還也舉猶飲也盡酒曰釂長者賜少者賤者不敢辭不敢抗禮也御同於長者雖貳不辭偶坐不辭御侍也貳謂重殽膳偶坐謂配長者而坐侍食不辭饌偶坐不辭席皆以其不為己設非己之所敢辭也一説或侍食或偶坐有盛饌皆不辭侍於君子不顧望而對非禮也饒氏曰顧顧自已望望君子少儀曰尊長於已踰等不敢問其年燕見不將命遇於道見則面不請所之少去聲見音現少儀禮記篇名踰等祖與父之行流也不敢問年嫌若序齒也燕私來見不敢使擯者傳命非賔主之禮也相遇於道路尊長見已則面見之不見則隱避不敢煩動之也不請所之不敢問其所徃也侍坐弗使不執琴瑟不畫地手無容不翣也寢則坐而將命翣色洽切翣扇也坐跪也侍坐於尊長不使之鼔琴瑟則不得擅執而鼔之無故而畫地弄手以為容揮扇以取凉皆不敬也若當尊長寢臥而傳命則跪而言不敢直立以臨之侍射則約矢侍投則擁矢勝則洗而以請矢箭也射禮二人為耦各四矢更迭取之卑幼則一時并取之故曰約矢投壺之禮賔主亦各四矢皆委於地一一取而投之卑㓜則悉抱之故曰擁矢此皆不敢與尊長抗也若已勝則不敢使人酌以罰尊長必自洗爵而請行觴若尊長勝則亦不敢使人酌以飲已必自洗爵而請自飲故曰洗而以請王制曰父之齒隨行兄之齒鴈行朋友不相踰父之齒年與父等者兄之齒年與兄等者朋友年相若者隨行行則隨之也鴈行行如鴈列也踰越也不相踰並行而齊也輕任并重任分頒白者不提挈并去聲頒音班任以肩背提挈以手頒老人頭半白黑也并謂少者獨任之分謂少者分任之不提挈謂少者代之君子耆老不徒行庶人耆老不徒食耆音其君子謂士也六十曰耆七十曰老徒空也不徒行則有車不徒食則有肉此章記古者敬長優老之制論語曰鄉人飲酒杖者出斯出矣朱子曰杖者老人也六十杖於鄉未出不敢先既出不敢後此章記孔子居鄉之事右明長㓜之序凡二十條禮文雖殊要皆不出乎敬之一字曰先生以教稱之也曰君子以徳稱之也曰尊父行也曰長兄長也皆以長為主也曽子曰君子以文會友以友輔仁朱子曰講學以㑹友則道益明取善以輔仁則徳日進孔子曰朋友切切偲偲兄弟怡怡偲音思胡氏曰切切懇到也偲偲詳勉也怡怡和悦也孟子曰責善朋友之道也朱子曰朋友當相責以善也子貢問友孔子曰忠告而善道之不可則止毋自辱焉告音谷子貢孔子弟子姓端木名賜朱子曰友所以輔仁故盡其心以告之善其説以道之然以義合者也故不可則止若以數而見疏則自辱矣孔子曰居是邦也事其大夫之賢者友其士之仁者朱子曰賢以事言仁以徳言事大夫之賢者則有所嚴憚友士之仁者則有所切磋皆進徳之助也益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣便平聲諒信實也善猶工也朱子曰友直則聞其過友諒則進於誠友多聞則進於眀便習熟也便辟謂習於威儀而不直善柔謂工於媚悦而不諒便佞謂習於口語而無聞見之實三者損益正相反也孟子曰不挾長不挾貴不挾兄弟而友友也者友其徳也不可以有挾也朱子曰挾者兼有而恃之之稱陳氏曰有挾則取友之意不誠曲禮曰君子不盡人之歡不竭人之忠以全交也竭亦盡也歡謂好於我忠謂盡心於我不過望於人則交道可全矣凡與客入者每門讓於客客至於寢門主人請入為席然後出迎客客固辭主人肅客而入主人入門而右客入門而左凡者通貴賤言每門通大門寢門言讓於客欲客先入也寢門内門為猶布也固辭再辭肅謂揖也客辭不先入故主人揖客而先入以導之凡門南向入則東為右而西為左主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階主人與客讓登主人先登客從之拾級聚足連歩以上上於東階則先右足上於西階則先左足上上聲下同降等謂等列卑於主人先登所以導客拾當作捗級謂階之等聚足後足合前足也連歩以上不躐等也先右先左以相向為敬客也大夫士相見雖貴賤不敵主人敬客則先拜客客敬主人則先拜主人貴謂大夫賤謂士朋友之交先施之而已主人不問客不先舉客自外至主人當先致問客不當先舉言也右明朋友之交孔子曰君子之事親孝故忠可移於君事兄弟故順可移於長居家理故治可移於官是故行成於内而名立於後世矣弟去聲行去聲長謂官在已上者理猶齊也孝弟則家齊忠順則國治行即孝弟内即家也天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有争臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義爭去聲下同離去聲爭諫也父有爭子通上下言不義即無道也故當不義則子不可以弗爭於父臣不可以弗爭於君范氏曰子不爭則陷父於不義臣不爭則陷君於無道禮記曰事親有隱而無犯左右就養無方服勤至死致喪三年養去聲隱微諫也犯犯顔以諫也親者仁之所在有過而犯則傷恩故有隱而無犯左右即方也或左或右就近而奉養之無一定之方言事事皆當理會也服勤服行勤勞之事也致喪極其哀毁之節也黄氏曰於勤言至死則勤無時或已矣事君有犯而無隱左右就養有方服勤至死方喪三年君者義之所在有過而隱則近於容悦故有犯而無隱左右就養有方言當各盡職守也方喪比方於親喪也事師無犯無隱左右就養無方服勤至死心喪三年劉氏曰師者道之所在諫必不見拒不必犯也過則當疑問不必隱也心喪者身無衰麻之服而心有哀戚之情也欒共子曰民生於三事之如一父生之師教之君食之非父不生非食不長非教不知生之族也故一事之唯其所在則致死焉共音恭食音似下同欒共子晉大夫名成食養也族類也君父師皆人之所由生者故曰民生於三又曰生之族也一事之即事之如一所在致死謂在君為君在父為父在師為師報生以死報賜以力人之道也真氏曰報生以死謂君父師也報賜以力謂他人之有賜於我者則以力報之也晏子曰君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也共音恭晏子齊大夫名嬰聽猶從也真氏曰此十者皆禮之當然君令而不違臣共而不二父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也共音恭箴諫也從不自専也婉順也物猶事也真氏曰君以出令為職要必不違於理然後人心服而令行臣之事君以恭為本然必忠誠不二然後可貴父慈而不能教則敗其子子孝而不能箴則陷父於不義兄能愛弟矣必有切磋之益如朋友之相資弟能敬兄矣必有和順之美使情意之相親夫之於妻雖貴和樂必以義而帥其妻妻之於夫雖貴柔順必以正而事其夫君臣以下皆以二徳相濟姑之於婦一於慈而從婦之於姑一於聽而婉者盖姑婦相與専主於和柔也此十者於禮為至善矣曽子曰親戚不説不敢外交近者不親不敢求逺小者不審不敢言大説音悦親戚謂父兄外謂外人近即内人逺即外人小謂家大謂國與天下此三者欲人先修孝弟於家耳故人之生也百歳之中有疾病焉有老幼焉故君子思其不可復者而先施焉親戚既没雖欲孝誰為孝年既耆艾雖欲悌誰為悌故孝有不及悌有不時其斯之謂歟為去聲下同六十曰耆耆之言久也五十曰艾艾之言老也其間有疾病老㓜之變不能常也故君子思其養之不可復追而及時先行之若親沒則養不逮已老則兄不存欲行孝弟不可得已曽子曰木欲靜而風不止子欲養而親不逮此孝有不及之意也李勣曰姊年老勣亦老雖欲數為姊煑粥得乎此悌有不時之意也官怠於宦成病加於小愈禍生於懈惰孝衰於妻子察此四者慎終如始詩云靡不有初鮮克有終宦成官已遂也小愈病稍減也懈惰不謹也詩大雅蕩之篇靡無鮮少克能也有始無終人之常情能察能慎斯免矣荀子曰人有三不祥幼而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也荀子名况戰國人祥吉也三者皆凶徳有一於是災及其身矣無用之辯不急之察棄而不治若夫君臣之義父子之親夫婦之别則日切磋而不舍也别必列反治理也舍亦棄也切以刀鋸磋以鑪錫皆治骨角之事無用之言而辯之不急之務而察之非惟無益反害於心故當棄而不理若夫三綱之道乃人倫之大者則當朝夕講習如切如磋已精而益求其精不可舍也右通論通論五倫御定小學集註卷二
