body:
  text: 欽定四庫全書御製小學序古者八歳而入小學教之以灑掃應對進退之節愛親敬長之義俾童而習之以養其徳性其説散見經傳朱子採集為小學一書所以示人教學之方而有以為正心修身之本其言約其理該盖六經四子性理諸書之階梯也皇考聖祖仁皇帝嘗特頒諭㫖令有司兼以命題課士海内士子固已咸知誦法矣又命尚書顧八代一人翻譯清文曰進呈覽欽定三年而後成嘉恵後學之心至深且厚當曰未經刋刻頒行朕敬承皇考遺志特命校對授梓以資肄習讀者宜知綱常倫紀之當崇視聽言動之當謹與夫嘉言懿行之當遵循慕效修其職自在家庭日用之常經而充其量可以成聖賢忠孝之大節子弟之習於是而淳教化之原於是而備詩曰成人有徳小子有造朕盖深有望焉雍正五年十二月初三日欽定四庫全書子部一御定小學集註儒家類提要臣等謹案御定小學集註六卷雍正五年世宗憲皇帝詔儒臣因明臣陳選集注而訂正刋行之者冠以御製序文發明綱常倫紀之當崇視聽言動之當謹與嘉言懿行之當遵循慕效蓋儒者為學之始基實備於此朱子作小學内外篇以廸蒙幼皆雜取經傳中論幼儀者分類條繫而以史事廣之宋儒所謂養正之功立教之本諒非溢美選為此註隨文衍義務取明白曉暢俾鄉塾童䝉皆可省覽而得其意義實為有功初訓選字士賢臨海人天順庚辰進士官至廣東布政使追贈光禄寺卿謚恭慤其為御史時救羅倫劾倪謙錢溥馬昻汪直風采可觀及官廣東又以争市舶忤宦官卒至逮死其立身本末足以不愧所學而此注復得大聖人表章家絃户誦其食報亦榮且厚矣乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書小學原序古者小學教人以灑掃應對進退之節愛親敬長隆師親友之道皆所以為脩身齊家治國平天下之本灑去聲掃去聲長上聲治平聲後不圏者皆去聲古者夏商周也小學郷學也人指八歳以至十四嵗之子弟也灑謂灑水以斂塵掃謂掃地以去塵應謂應尊長之呼對謂對尊長之問節禮節也親父母也隆尊也親近也道者當然之理脩齊治平大學之事也古人由小學以收心養性基本已立至大學特收其成功耳而必使其講而習之於㓜穉之時欲其習與智長化與心成而無扞格不勝之患也穉音治長上聲扞音汗格胡得切勝音升講以明其理習以熟其事穉亦幼也扞格猶牴牾也不勝不能勝當其教也幼穉之子心知未有所主及時而教之使習於善而與智俱長化於善而與心俱成故無扞格不勝之患而大學之教亦易入矣此兩節言古者小學教人之意今其全書雖不可見而雜出於傳記者亦多讀者徃徃直以古今異宜而莫之行殊不知其無古今之異者固未始不可行也傅去聲今朱子自謂宋時也古者小學之全書不可見者以秦火焚之也傳記謂禮記管子諸書直猶但也殊猶絶也古今異宜謂宜於古而不宜於今也無古今之異謂古法亦有宜於今也今頗蒐輯以為此書授之童蒙資其講習庶幾有補於風化之萬一云爾蒐音捜輯音集㡬平聲蒐輯者索古法之宜於今者而纂輯之也授付也童蒙童幼而蒙昧也資助庶㡬近辭風化詩序曰上以風化下是也萬一萬分之一也云爾語辭朱子此書續古者小學之教以為大學基本有補於國家之風化大矣曰庶幾曰萬一皆謙辭耳吳氏曰朱子之於世教豈惟有補於當時實則有功於萬世也此兩節言繼絶學輯小學之意淳熙丁未三月朔旦晦菴題淳熙丁未宋孝宗十四年也晦菴朱子草堂之名因以為號小學原序小學題辭饒氏曰小學者小子之學也題辭者標題書首之辭也元亨利貞天道之常仁義禮智人性之綱元者生物之始亨者生物之通利者生物之遂貞者生物之成四者謂之天道天理自然之本體也亘萬世而不易故曰常仁者温和慈愛之理義者斷制裁割之理禮者恭敬撙節之理智者分别是非之理四者謂之人性人人所禀之天理也統萬善而不遺故曰綱猶網之綱下文所謂四端四行則其目之大者也元於時為春於人為仁亨於時為夏於人為禮利於時為秋於人為義貞於時為冬於人為智此一節言天道流行賦於人而為性也凡此厥初無有不善藹然四端隨感而見見音現饒氏曰此者指上文仁義禮智之性也厥語辭初謂本然也藹然衆盛貌端緒也孟子曰惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也此言仁義禮智之性其本然無有不善是以惻隱羞惡辭讓是非四者之善端藹藹然隨其物之所感動而形見也此一節言性發而為情也愛親敬兄忠君弟長是曰秉彞有順無彊長上聲彞音夷彊上聲饒氏曰忠者盡己之心也弟順是此秉執彞常也順者因其自然彊者抑之使然此言愛親敬兄忠君弟長四者人之善行根於秉執之常性因其自然而非抑之使然也此一節言性之見於行也惟聖性者浩浩其天不加毫末萬善足焉惟語辭天即理也毫末一毫之末也萬善如四端四行是也此言聖人性全於天無所汚壊其本然之理浩浩然廣大不待増加毫末人為而萬善自足無少欠缺也此一節言聖人之盡其性也衆人蚩蚩物欲交蔽乃頽其綱安此暴棄蚩音笞頽徒回切饒氏曰蚩蚩無知之貌物欲謂凡聲色臭味之欲也暴害也此言衆人氣禀昏愚而無知物欲交互而遮蔽是以頽墜其仁義禮智之綱而安於自暴自棄也此一節言衆人之汩其性也惟聖斯惻建學立師以培其根以逹其支惻音測培音裴支與枝同斯語辭建亦立也此言聖人見衆人安於暴棄於是惻然傷憫而建學立師以教之小學之教所以收其放心養其徳性如培擁木之根本也大學之教所以開發聰明進徳修業如發逹木之支條也此一節言聖人興學設教之意小學之方灑掃應對入孝出恭動罔或悖行有餘力誦詩讀書詠歌舞蹈思罔或逾悖音佩蹈音稻逾音俞方法也罔無也手曰舞足曰蹈饒氏曰此言小學之方必使學者謹夫灑掃應對之節入則愛其親出則敬其長凡所動作無或悖戾乎此也行此數者而有餘力則誦詩讀書或詠歌以習樂之聲或舞蹈以習樂之容凡所思慮無或逾越乎此也此一節言小學之教所以培其根也窮理修身斯學之大明命赫然罔有内外徳崇業廣乃復其初昔非不足今豈有餘復音伏饒氏曰斯人而人之所得以為也明命即天之所賦於者也赫然明盛貌徳者道之得於内者也業者功之成於外者也復還也初謂本然也此言格物致知以窮究其理誠意正心以修治其身此乃大學之道也然天之明命赫然照著無有内外之間學者誠能從事於大學使物格知至意誠心正身修而徳之積於内者極乎崇髙由是推之使家齊國治天下平而業之施於外者極乎廣博則有以復其性之本然矣昔日之安於暴棄也此性固非不足今日之徳崇業廣也此性亦非有餘但昔為氣稟物欲之所蔽今則復其本然耳此一節言大學之教所以逹其支也世逺人亡經殘教弛蒙養弗端長益浮靡鄉無善俗世乏良材利欲紛拏異言喧豗弛音始靡音米拏汝加切豗音灰饒氏曰端正也乏無也利欲猶言物欲也拏牽引也豗相擊也此言前世既逺聖人既沒六經殘缺而教法亦廢弛矣小學之教廢故學者自童䝉之時而養之不以其正大學之教廢故及其年長則所習日益輕浮華靡是以鄉無淳厚之習俗世無粹美之人材但見利欲之習紛然而相牽引異端之言喧然而相攻擊也此一節言後世教學不明之害幸兹秉彞極天罔墜爰輯舊聞庶覺來裔嗟嗟小子敬受此書匪我言耄惟聖之謨輯音集裔以制切耄音冒極終也極天罔墜言人心秉彝之理萬古常存也我朱子自稱也饒氏曰爰於也裔衣襟之末來裔謂後學也嗟嗟歎辭耄老而昏也此言後世教學不明雖如上文所云然所幸者人之秉彝極天罔墜我於是纂輯舊所聞者以為小學之書庶㡬可以覺悟後來之學者爾初學之小子宜敬受此書而學之此非我老耄之妄言是乃前聖之謨訓也此一節言輯小學開後學之意小學題辭
