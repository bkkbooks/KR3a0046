body:
  text: 欽定四庫全書御定小學集註卷五外篇説見内篇詩曰天生烝民有物有則民之秉彜好是懿徳孔子曰為此詩者其知道乎故有物必有則民之秉彜也故好是懿徳懿音意詩大雅烝民之篇尹吉甫之所作也朱子曰烝衆也物事也則法也彜常也懿羙也有物必有法如有耳目則有聰明之徳有父子則有慈孝之心是民所秉執之常性也故人之情無不好此懿徳者胡氏曰知道知率性之道也歴傳記接見聞述嘉言紀善行為小學外篇傳去聲歴考前代漢魏晉南北朝隋唐之傳記承接近代五代之見聞凡言之本乎物則民彜者嘉言也則述之行之本乎物則民彜者善行也則紀之所以合内篇而為小學之全書也學者讀内篇而逺師虞夏商周之聖賢讀外篇而近師漢唐宋之君子盛徳大業於是乎在矣奚可以為童稚之習而忽之哉嘉言第五嘉善也此篇述漢以来賢者所言之善言以廣立教明倫敬身也凡九十一章横渠張先生曰教小兒先要安詳恭敬横渠地名先生名載字子厚宋郿縣人安静詳審恭荘敬畏四者小學涵養本原之事也今世學不講男女從幼便驕惰壞了到長益凶狠只為未甞為子弟之事則於其親己有物我不肯屈下病根常在又隨所居而長至死只依舊只為之為去聲已音以安詳恭敬不講而矜驕惰慢成習此天理所由滅而人欲所由熾也壊謂壊其質性親父母也有物我猶言分彼此病根即驕惰也為子弟則不能安灑掃應對接朋友則不能下朋友有官長則不能下官長為宰相則不能下天下之賢此言病根隨所居而長也安謂安意為之下謂屈己下之甚則至於徇私意義理都喪句也只為病根不去隨所居所接而長徇私閏切為去聲徇從也居居處接交接楊文公家訓曰童稚之學不止記誦養其良知良能當以先入之言為主公名億字大年謚文宋浦城人良知者本然之知良能者本然之能愛親敬長是也程子曰人之㓜也知愚未有所主則當以格言至論日陳於前使盈耳充腹久自安習若固有之者後雖有讒説揺惑不能入也日記故事不拘今古必先以孝弟忠信禮義亷恥等事如黄香扇枕陸績懷橘叔敖隂德子路負米之類只如俗説便曉此道理久久成熟德性若自然矣扇平聲故事古今已徃之事也善事父母為孝善事兄長為弟盡己之謂忠以實之謂信禮者天理之節文義者人心之裁制亷即辭讓之心禮之發也恥即羞惡之心義之發也黄香扇枕之類即孝弟等事徳性謂得之於天者仁義禮智是也黄香字文强盡心養親暑則扇枕席冬則以身温被陸績字公紀年六歳見袁術術出橘績懐三枚拜辭墮地術曰陸郎作賔客而懐橘乎績跪答曰欲歸遺母術大奇之叔敖楚官名蔿氏名艾為兒時出遊見兩頭蛇殺而埋之歸而泣母問其故對曰聞見兩頭蛇者死嚮者見之恐去母而死也母曰蛇今安在曰恐他人又見殺而埋之矣母曰吾聞有隂徳者天報以福汝不死也及長為楚相子路姓仲名由嘗曰昔事二親常食藜藿為親負米百里之外親沒之後為楚大夫從車百乘積粟萬鍾累茵而坐列鼎而食雖欲食藜藿為親負米何可得也明道程先生曰憂子弟之輕俊者只教以經學念書不得令作文字子弟凡百玩好皆奪志至於書札於儒者事最近然一向好著亦自喪志好去聲下同著直略切喪去聲先生名灝字伯淳宋河南人文潞公題其墓曰明道先生憂者憂其不能致遠也盖少年之輕浮俊秀者惟教以學經讀書則可以收其放心而於道知所向若使作文字則心愈放而離道逺矣凡百玩好如畫與琴棊之類奪志謂奪其求道之志書習字札小簡書札固儒者之一藝若專攻乎此則亦喪其求道之志也伊川程先生曰教人未見意趣必不樂學欲且教之歌舞如古詩三百篇皆古人作之如關雎之類正家之始故用之鄉人用之邦國日使人聞之此等詩其言簡奥今人未易曉别欲作詩略言教童子灑掃應對事長之節令朝夕歌之似當有助樂五教切伊川地名先生名頤字正叔明道之弟趣指趣也樂喜好也關睢周南國風詩之首篇關睢等詩為教於閨門之内乃正家之始故當時上下通用之簡奥者辭簡約而意深奥也以灑掃等事編為韻語令朝夕詠歌之庶見意趣而好學矣朱子曰嘗疑曲禮衣無撥足無蹶將上堂聲必揚將入戸視必下等皆是古人教小兒語陳忠肅公曰幼學之士先要分别人品之上下何者是聖賢所為之事何者是下愚所為之事向善背惡去彼取此此幼學所當先也别必列切背音佩公名瓘字瑩中號了翁忠肅謚也宋延平人吳氏曰當向當取者上品聖賢也當背當去者下品下愚也顔子孟子亞聖也學之雖未至亦可為賢人今學者若能知此則顔孟之事我亦可學此下言聖賢之事當向而取也亞次也學之謂學顔孟也言溫而氣和則顔子之不遷漸可學矣過而能悔又不憚改則顔子之不貳漸可學矣朱子曰遷移也貳復也怒於甲者不移於乙過於前者不復於後知理鬻之戲不如俎豆念慈母之愛至於三遷自幼至老不厭不改終始一意則我之不動心亦可以如孟子矣鬻音育埋墓間之事鬻市中之事俎豆學宫之事此即三遷之教也不厭謂學不倦不改謂守不變若夫立志不高則其學皆常人之事語及顔孟則不敢當也其心必曰我為孩童豈敢學顔孟哉此人不可以語上矣先生長者見其卑下豈肯與之語哉先生長者不肯與之語則其所與語皆下等人也言不忠信下等人也行不篤敬下等人也過而不知悔下等人也悔而不知改下等人也聞下等之語為下等之事譬如坐於房舍之中四面皆墻壁也雖欲開明不可得矣語去聲行去聲此言下愚之事當背而去也下等之語下等之事皆蔽塞人心之牆壁也開而明之在立志以學聖賢而已吳氏曰言偽而行薄恥過而遂非所聞所行無一不歸於下愚之習耳目壅塞中心昏蔽一物無所見一歩不可行欲求開明何可得哉馬援兄子嚴敦並喜譏議而通輕俠客援在交趾還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也俠音協援字文淵漢茂陵人嚴敦援兄二子名譏譏誚議議論侠謂以權力俠輔人通輕俠客交通輕薄遊侠之客也交趾郡名汝曹汝軰也好議論人長短妄是非正法此吾所大惡也寜死不願聞子孫有此行也好去聲下同惡去聲行去聲妄是非正法謂妄談國法之是非龍伯高敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曹效之伯高名述京兆人敦篤而重厚周密而謹慎出言皆善而無可選擇謙約節儉而不驕奢亷公有威而不私䙝皆君子之常道杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也樂音雒下同季良名保人有憂已亦為之憂人有樂已亦為之樂不辨清濁待之皆無所失故父喪致客數郡皆至也此輕俠之事效伯高不得猶爲謹敕之士所謂刻鵠不成尚類鶩者也效季良不得陷爲天下輕薄子所謂畫虎不成反類狗者也敕音勑鶩音木吳氏曰鵠鶩皆鳥而略相似虎狗皆獸而絶不同漢昭烈將終勑後主曰勿以惡小而為之勿以善小而不為漢劉氏王天下之號昭烈漢帝名備字元徳勑戒也後主昭烈之子名禪朱子曰善必積而後成惡雖小而可戒諸葛武侯戒子書曰君子之行静以修身儉以養徳非澹泊無以明志非寜静無以致遠行去聲侯名亮字孔明諸葛其姓也事漢昭烈為丞相謚忠武子瞻字思逺静即寜静也儉即澹泊也寜静則心不逐於物故可以修身致逺澹泊則心不汩於欲故可以養徳明志夫學湏静也才湏學也非學無以廣才非静無以成學慆慢則不能研精險躁則不能理性年與時馳意與歳去遂成枯落悲歎窮廬將復何及也慆音滔躁音竈復扶又切廣才充廣其才也慆淫也慆慢則心不收故不能研究精微之理險躁則心妄動故不能理治氣質之性盖人之年意與時歳而俱徃不暫駐也失時不學遂與草木同枯落雖悲歎而無及矣眞氏曰孔明此書真格言也柳玭嘗著書戒其子弟曰壞名災己辱先喪家其失尤大者五宜深誌之玭蒲眠切玭字直清唐柳公綽之孫仲郢之子壊敗也誌記也其一自求安逸靡甘澹泊苟利於已不恤人言此言不勤儉之失靡不也恤憂也其二不知儒術不悦古道懵前經而不恥論當世而觧頤身既寡知惡人有學懵母總切解音蟹頤音怡惡去聲此言不好學之失懵無知貌頤口旁也人笑則口旁觧言其於前聖之經無所知而不恥於當世之事妄議之以為笑也其三勝己者厭之佞己者悦之唯樂戲談莫思古道聞人之善嫉之聞人之惡揚之浸漬頗僻銷刻徳義簪裾徒在廝養何殊樂去聲漬音恣頗音坡廝音思此言不好善之失厭惡佞諂嫉妬揚播也頗僻謂偏頗邪僻之行浸漬頗僻漸染於惡也銷刻徳義斵喪其善也簪裾猶言衣冠廝養謂奴僕徒空也殊異也其四崇好優游耽嗜麴蘖以銜杯為髙致以勤事為俗流習之易荒覺已難悔好去聲蘖魚列切此言好宴樂之失崇尚也吳氏曰麴蘖銜杯皆言酒也高致謂高尚之風致勤事勤於事業也言好逸嗜酒自以為高反鄙勤事者為俗流此心既荒雖知而不能悔也其五急於名宦匿近權要一資半級雖或得之衆怒羣猜鮮有存者猜倉才切此言好奔競之失名宦顯仕也匿近隂附也權要有勢位者資猶品也猜恨也鮮少也言雖或得官終必失之余見名門右族莫不由祖先忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛言之痛心爾宜刻骨覆音福下同燎音料古人以右為尊名門右族皆大家也頑劣輕率奢侈驕傲皆敗家之由也燎燒也刻骨猶言銘心亦深誌之意而語加切耳范魯公質為宰相從子杲嘗求奏遷秩質作詩曉之從去聲杲音稿質字文素周宰相事宋封魯國公從子兄之子也名杲遷陞也秩職也其略曰戒爾學立身莫若先孝悌怡怡奉親長不敢生驕易戰戰復兢兢造次必於是造音操孝悌者立身之本怡怡和悦也驕驕傲易慢易戰戰恐懼兢兢戒謹造次急遽苟且之時是指孝悌也戒爾學干禄莫若勤道藝嘗聞諸格言學而優則仕不患人不知惟患學不至干求也禄俸也道道理藝文藝諸語辭格猶法也優有餘力也學優則仕子夏之法言也戒爾遠恥辱恭則近乎禮自卑而尊人先彼而後己相鼠與茅鴟宜鑑詩人刺相去聲鴟音笞朱子曰恭致敬也禮節文也致恭而中其節則能遠恥辱矣自卑尊人先彼後己致恭之事也相䑕詩名其辭曰相䑕有體人而無禮人而無禮胡不遄死茅䲭亦詩名今亡其辭矣二詩皆刺無禮也鑑照也刺譏諷相視也戒爾勿放曠放曠非端士周孔垂名教齊梁尚清議南朝稱八達千載穢青史放放蕩曠疎曠端士正士也周孔謂周公孔子名教謂人倫之教有實有名也齊梁皆都江南故又稱南朝清議清虚之談也八達謂晉胡母輔之謝鯤阮放畢卓羊曼桓彜阮孚光逸八人終日清談酣飲為曠達也當時雖稱之而無禮無法得罪名教其姓名久汚史冊亦可賤矣古史以竹故曰青史戒爾勿嗜酒狂藥非佳味能移謹厚性化為凶險類古今傾敗者歴歴皆可記酒能亂性是狂藥也古今以之而傾覆喪敗者多矣戒爾勿多言多言衆所忌苟不慎樞機災厄從此始是非毁譽間適足為身累厄一作危譽平聲戸之開闔由於樞弩之張弛由於機人之禍福榮辱由於言故比言於樞機災厄謂禍辱毁者稱人之惡而損其真也譽者揚人之善而過其實也以言而是非毁譽人皆取禍召辱祇足自累而已舉世重交游擬結金蘭契忿怨容易生風波當時起所以君子心汪汪淡如水當去聲易曰二人同心其利斷金同心之言其臭如蘭契合也風波比忿怨勢利之交一言不合則怒氣相加如風波之起矣汪汪深廣貌記曰君子之交如水小人之交如醴君子淡以成小人甘以壞舉世好承奉昻昻增意氣不知承奉者以爾為玩戲所以古人疾籧篨與戚施籧音渠篨音除施音叶去聲疾憎惡也籧篨龜胷者戚施駞背者籧篨不能俯戚施不能仰皆醜疾也陳氏曰好承奉之態似之舉世重游俠俗呼為氣義為人赴急難往往陷囚繫所以馬援書殷勤戒諸子為去聲難去聲繫音係游俠之徒輕身以徇人似乎有氣有義而非正故馬援之書曰寜死不願聞子孫有此行也舉世賤清素奉身好華侈肥馬衣輕裘揚揚過閭里雖得市童憐還為識者鄙衣去聲揚揚自得之意憐猶愛也鄙猶賤也我本羈旅臣遭逢堯舜理位重才不充戚戚懷憂畏深淵與薄氷蹈之唯恐墜爾曹當憫我勿使増罪戾閉門歛踪跡縮首避名勢勢位難久居畢竟何足恃羈音肌蹈音稻戻音麗縮所六切羈寄旅寓理治也質既相周復相宋故自謂羈旅之臣宋太祖受周禪故比之堯舜之治戚戚憂畏意若蹈淵氷言憂畏之甚也曹即軰也戾亦罪也戒其勿求遷秩以增己罪也畢竟終也又言爾等當深自歛避勿求遷秩盖富貴無常不足恃也物盛則必衰有隆還有替速成不堅牢亟走多顛躓灼灼園中花早發還先萎遲遲澗畔松鬱鬱含晚翠賦命有疾徐青雲難力致寄語謝諸郎躁進徒為耳亟音擊躓音至萎音穢隆興替廢亟急也顛躓蹉跌也萎枯疾速徐遲也青雲比名位之髙顯也躁急徒空也此一節首八句言人物之常理次二句言富貴有定命末二句總括而戒之康節邵先生戒子孫曰上品之人不教而善中品之人教而後善下品之人教亦不善不教而善非聖而何教而後善非賢而何教亦不善非愚而何先生名雍字堯夫康節諡也宋河南人氣質之性雖有是三品然天地之性初無少異愚者果能奮然用力於善未必不可以為賢也是知善也者吉之謂也不善也者凶之謂也為善者為吉人為惡者為凶人吉也者目不觀非禮之色耳不聽非禮之聲口不道非禮之言足不踐非禮之地人非善不交物非義不取親賢如就芝蘭避惡如畏蛇蠍或曰不謂之吉人則吾不信也蠍音歇此一節言為善者為吉人凶也者語言詭譎動止隂險好利飾非貪淫樂禍疾良善如讎隙犯刑憲如飲食小則隕身滅性大則覆宗絶嗣或曰不謂之凶人則吾不信也詭音癸譎音厥樂音雒讎音酬隙乞逆切隕音允此一節言為惡者為凶人隂暗也餙非文過也貪淫嗜慾也樂禍樂人有禍也如讎隙疾之甚也如飲食好而甘之也隕猶喪也覆猶傾也吳氏曰隕身滅性禍止一身故曰小覆宗絶嗣祸及一族故曰大傳有之曰吉人為善惟日不足凶人為不善亦惟日不足汝等欲為吉人乎欲為凶人乎傳去聲傳之言今見書泰誓篇惟日不足者言終日為之而猶以為不足也節孝徐先生訓學者曰諸君欲為君子而使勞己之力費己之財如此而不為君子猶可也不勞己之力不費己之財諸君何不為君子鄉人賤之父母惡之如此而不為君子猶可也父母欲之鄉人榮之諸君何不為君子惡去聲先生名積字仲車節孝諡也宋山陽人諸君指學者君子成徳之稱又曰言其所善行其所善思其所善如此而不為君子未之有也言其不善行其不善思其不善如此而不為小人未之有也吳氏曰君子小人之分在乎口之所言身之所行心之所思而已胡文定公與子書曰立志以明道希文自期待公名安國字康侯文定諡也宋建安人三子寅字明仲寜字和仲宏字仁仲志者心之所之也明道程伯子也朱子稱其十四五歳便學聖人希文范文正公也朱子稱其自做秀才便以天下為己任立志以二公自期待而力行以求至焉聖賢之徳業不遠矣立心以忠信不欺為主本心者身之主也不欺即忠信之謂人無寔心言行雖善終非聖賢之徒故立心必以是為主為本行己以端莊清慎見操執操平聲操執皆守也端正莊肅清白謹慎惟有守者能之臨事以明敏果斷辨是非熊氏曰事有是非惟明敏可以立見惟果斷可以早決又謹三尺考求立法之意而操縱之斯可為政不在人後矣操平聲此言為政之方三尺謂法律古者以三尺竹簡書之操縱謂本法意原人情而適寛嚴之宜也汝勉之哉治心脩身以飲食男女為切要從古聖賢自這裏做工夫其可忽乎飲食男女人之大欲存焉一念之偏不能自克則陷其身於惡而不可振矣故治心修身必以是為切要古之聖賢如禹之菲飲食湯之不邇聲色皆從此做工夫者也古靈陳先生為仙居令教其民曰為吾民者父義母慈兄友弟恭子孝夫婦有恩男女有别子弟有學鄉閭有禮貧窮患難親戚相救婚姻死喪鄰保相助無墮農業無作盗賊無學賭博無好争訟無以惡陵善無以富吞貧行者譲路耕者譲畔斑白者不負戴於道路則為禮義之俗矣别必列切難去聲墮音灰又音惰好去聲古靈村名先生名襄字述古宋福州人仙居台州屬邑義謂能正其家有恩謂貧窮相守若棄妻不養夫亡改嫁是無恩也有别謂男有婦女有夫不相亂也有禮謂歳時相往来及燕飲叙齒之類患難為水火盗賊之類墮廢墜也陵侵欺也吞兼并也譲路若少避長輕避重之類譲畔謂地有界畔不相侵奪也此皆孟子所謂善敎得民者右廣立教司馬溫公曰凡諸卑幼事無大小毋得專行必咨禀於家長公姓司馬名光字君實宋陕州人贈温國公咨謀也凡子受父母之命必籍記而佩之時省而速行之事畢則返命焉省音醒籍簿也佩謂服於身省察也視也返命復命也或所命有不可行者則和色柔聲具是非利害而白之待父母之許然後改之若不許苟於事無大害者亦當曲從若以父母之命為非而直行己志雖所執皆是猶為不順之子况未必是乎備陳是非利害之兩端而禀白之欲父母自喻也曲委曲横渠先生曰舜之事親有不悦者為父頑母嚚不近人情若中人之性其愛惡若無害理必姑順之為去聲嚚音銀惡去聲舜盡事親之道宜得親之悦矣而猶不悦者為其頑嚚不近人情也今天下人之父母若舜之父母者盖寡矣事親不悦何以為人乎若親之故舊所喜當極力招致賔客之奉當極力營辦務以悦親為事不可計家之有無然又湏使之不知其勉强勞苦苟使見其為而不易則亦不安矣强上聲易音異故舊所喜謂故舊中所喜者賔客之奉謂酒餚之類羅仲素論瞽瞍底豫而天下之為父子者定云只為天下無不是底父母底音止為去聲底音低仲素名從彦宋豫章人底致也豫悦樂也定者子孝父慈各得其所也孟子曰舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下之為父子者定羅氏讀之而有是論盖天下無不愛子之父母豈有不是者哉子孝則父母之心自悦樂矣了翁聞而善之曰唯如此而後天下之為父子者定彼臣弑其君子弑其父常始於見其有不是處耳了翁陳忠肅公也臣子弑逆當起於一念之差以君父所為不是也若知天下無不是底君父惡有弑逆之事哉真氏曰罪已而不非其親者仁人孝子之心也怨親而不反諸己者亂臣賊子之心也伊川先生曰病臥於牀委之庸醫比之不慈不孝事親者亦不可不知醫委猶付託也病者死生所係而委之庸醫是飲藥以加病也故親有疾而委之庸醫比之不孝子有疾而委之庸醫比之不慈子能知醫則可以養親且不為庸醫所誤矣横渠先生嘗曰事親奉祭豈可使人為之事父母奉祭祀皆當親為之葉氏曰使人代為孝敬之心安在伊川先生曰冠昏喪祭禮之大者今人都不理㑹豺獺皆知報本今士大夫家多忽此厚於奉養而薄於先祖甚不可也冠去聲豺音柴獺音撻養去聲冠以責成人昏以承宗事喪以慎終祭以追遠理㑹謂講而行之孟春獺祭魚季秋豺祭獸皆有報本之意豈可人而不如獸乎此字指報本言奉養謂奉養其親某嘗修六禮大略家必有廟廟必有主月朔必薦新時祭用仲月冬至祭始祖立春祭先祖季秋祭禰忌日遷主祭於正寢凡事死之禮當厚於奉生者禰乃里切六禮冠昏喪祭鄉飲酒士相見之禮也主木主也所以依神新謂新物禰父廟也遷猶奉也正寢猶正堂也月朔一月之始四時天道之變冬至陽生之始立春物生之始季秋物成之始忌日親之死日君子於此必有悽愴怵惕之心故因之而行追遠之禮此言祭禮之大略司馬溫公曰國家時祭用孟月私家不敢用故用仲月人家能存得此等事數件雖幼者可使漸知禮義存謂行之久而不廢也司馬溫公曰冠者成人之道也成人者將責為人子為人弟為人臣為人少者之行也將責四者之行於人其禮可不重與冠去聲下同行去聲下同與平聲所謂成人者非謂形體異於童子也將責孝弟忠順之行也四行立而後可以為人故冠為成人之道冠禮之廢久矣近世以来人情尤為輕薄生子猶飲乳已加巾帽有官者或為之製公服而弄之過十歳猶總角者盖鮮矣彼責以四者之行豈能知之故徃往自幼至長愚騃如一由不知成人之道故也乳音汝為去聲騃五駭切巾㡌士庶所著者有官如今之廕襲也弄戲鮮少騃癡也古禮雖稱二十而冠然世俗之弊不可猝變若敦厚好古之君子俟其子年十五以上能通孝經論語粗知禮義之方然後冠之斯其羙矣猝倉沒切好去聲俟音似上上聲猝遽也古者父母之喪既殯食粥齊衰疏食水飲不食菜果齊音咨衰音崔疏音疎下同食音似下同衰喪服也緝其旁及下際曰齊衰不緝曰斬衰疏食粗飯也言父母之喪既殯始食粥若齊衰之喪既殯得疏食水飲異於父母之喪也父母之喪既虞卒哭疏食水飲不食菜果期而小祥食菜果又期而大祥食醯醬期音箕醯音希虞祭名既葬而虞虞之言安也以魂氣無所不之故三行虞祭以安之既虞而卒哭自是哀至則哭猶朝夕哭也期周年也祥吉也祭用吉禮也醯醋也中月而禫禫而飲醴酒始飲酒者先飲醴酒始食肉者先食乾肉古人居喪無敢公然食肉飲酒者禫徒感切醴音理乾音干中月間一月也禫祭名大祥之後間一月而禫禫者澹澹然平安之意喪至此凡二十七月也酒二宿熟者曰醴醴酒味薄乾肉味澀先食之者不忍遽御醇厚之味也漢昌邑王奔昭帝之喪居道上不素食霍光數其罪而廢之數上聲漢劉氏王天下之號昌邑王名賀昭帝崩無子賀嗣位光字子孟時為大將軍廢賀為海昏侯晉阮籍負才放誕居喪無禮何曾面質籍於文帝坐曰卿敗俗之人不可長也因言於帝曰公方以孝治天下而聽阮籍之重哀飲酒食肉於公坐宜擯四裔無令汚染華夏誕音但晉司馬氏篡國之號阮籍人姓名自負其才放蕩妄誕曾字頛考籍曾皆晉臣質謂正言之文帝司馬昭也時為晉公卿指籍公指昭聽猶許也重哀謂親喪擯斥也四裔四夷華夏中國也宋廬陵王義真居武帝憂使左右買魚肉珍羞於齋内别立廚帳㑹長史劉湛入因命曘酒炙車螯湛正色曰公當今不宜有此設義真曰旦甚寒長史事同一家望不為異酒至湛起曰既不能以禮自處又不能以禮處人曘音暖螯音翺處上聲宋南朝劉氏簒國之號義真武帝裕之子居憂即居喪珍羞美食㑹遇也湛字𢎞仁吳氏曰曘當作㬉古暖字炙燒也車螯海蛤也隋煬帝為太子居文獻皇后喪每朝令進一溢米而私令外取肥肉脯鮓置竹筒中以蠟閉口衣襆裹而納之煬音様溢音逸襆音僕裹音果隋楊氏據國之號煬帝名廣溢一手所握也衣襆即今之袱也湖南楚王馬希聲葬其父武穆王之日猶食雞臛其官屬潘起譏之曰昔阮籍居喪食蒸肫何代無賢臛音郝五代之時馬殷據湖南武穆王即殷也雞臛雞肉羮也蒸肫蒸熟豬也何代無賢反辭以譏之然則五代之時居喪食肉者人猶以為異事是流俗之弊其来甚近也今之士大夫居喪食肉飲酒無異平日又相從宴集靦然無愧人亦恬不為怪禮俗之壞習以為常悲夫靦他典切恬音甜承上文潘起之譏而言五代梁唐晉漢周也靦面見人之貌恬安也怪異也乃至鄙野之人或初喪未歛親賔則齎酒饌往勞之主人亦自備酒饌相與飲啜醉飽連日及葬亦如之甚者初喪作樂以娛尸及殯葬則以樂導輀車而號泣隨之亦有乗喪即嫁娶者噫習俗之難變愚夫之難曉乃至此乎斂去聲勞去聲啜昌恱切輀音而號平聲勞慰勞輀車喪車也凡居父母之喪者大祥之前皆未可飲酒食肉禮也若有疾暫湏食飲疾止亦當復初必若素食不能下咽久而羸憊恐成疾者可以肉汁及脯醢或肉少許助其滋味不可恣食珍羞盛饌及與人燕樂是則雖被衰麻其實不行喪也唯五十以上血氣既衰必資酒肉扶養者則不必然耳咽音煙羸音雷憊音敗樂音雒衰音崔上上聲暫權也食飲食肉飲酒也羸憊羸瘦疲憊也其居喪聽樂及嫁娶者國有正法此不復論復扶又切法謂法律父母之喪中門外擇樸陋之室為丈夫喪次斬衰寢苫枕塊不脫絰帶不與人坐焉婦人次於中門之内别室撤去帷帳衾褥華麗之物樸音朴衰音崔苫失亷切枕去聲絰音迭撤直列切樸樸素陋隘陋苫藁薦塊土墼麻在首曰絰在腰曰帶撤亦去也皆哀痛之至有所不安而然男子無故不入中門婦人不得輒至男子喪次内外之辨當然晉陳壽遭父喪有疾使婢丸藥客往見之鄉黨以為貶議坐是沉滯坎坷終身嫌疑之際不可不慎坷音可陳壽人姓名貶議謂貶抑而議論之坐猶為也沉滯不振也坎坷不遇也嫌疑事之可嫌可疑者父母之喪不當出若為喪事及有故不得已而出則乗樸馬布裹鞍轡為去聲樸音朴樸素也世俗信浮屠誑誘凡有喪事無不供佛飯僧云為死者滅罪資福使生天堂受諸快樂不為者必入地獄剉燒舂磨受諸苦楚殊不知死者形既朽滅神亦飄散雖有剉燒舂磨且無所施又况佛法未入中國之前人固有死而復生者何故都無一人誤入地獄見所謂十王者耶此其無有而不足信也明矣屠音徒誑古况切供去聲飯上聲為去聲樂音雒舂書容切磨去聲復音伏浮屠佛氏也誑欺也誘引也云猶言也滅消也資助也諸衆也不為謂不供佛飯僧也刀剉火燒碓舂碾磨甚言其苦楚也殊絶也形形體神神魂佛法入中國始於漢明帝言前此之時人死而復生者有矣未嘗聞有入地獄見十王者以未有佛法惑人本無天堂地獄故也後世有死而復生云入地獄見十王者乃佛法所惑耳顔氏家訓曰吾家巫覡符章絶於言議汝曹所見勿為妖妄覡刑狄切顔氏名之推北朝人作家訓巫女巫覡男巫符章即書符拜章之術皆妖怪妄誕之事也伊川先生曰人無父母生日當倍悲痛更安忍置酒張樂以為樂若具慶者可矣為樂之樂音雒念父母鞠育之劬勞故倍增悲痛父母俱存曰具慶可者可置酒張樂也呂氏童蒙訓曰事君如事親事官長如事兄與同僚如家人待羣吏如奴僕愛百姓如妻子處官事如家事然後能盡吾之心如有毫末不至皆吾心有所未盡也吕氏名本中字居仁宋正獻公之曾孫作童䝉訓盡吾之心致其誠而已或問簿佐令者也簿所欲為令或不從奈何伊川先生曰當以誠意動之今令與簿不和只是爭私意佐去聲簿者縣之佐令者縣之長動感動也令是邑之長若能以事父兄之道事之過則歸已善則惟恐不歸於令積此誠意豈有不動得人孟子曰至誠而不動者未之有也明道先生曰一命之士苟存心於愛物於人必有所濟周禮一命受職如今之第九品也苟誠也物即人也一命猶然况居大位者乎劉安禮問臨民明道先生曰使民各得輸其情問御吏曰正已以格物安禮字立之明道弟子輸猶盡也平易近民使下情各得上達則所以處之者自無不當矣御馭也格正也范氏曰未有已不能正而能正人者伊川先生曰居是邦不非其大夫此理最好不非議其過惡有忠敬意此古語而程子稱之童䝉訓曰當官之法唯有三事曰清曰慎曰勤知此三者則知所以持身矣吳氏曰淸謂亷潔不汚慎謂謹守禮法勤謂勤於職業能是三者則能持身而可以治人矣當官者凡異色人皆不宜與之相接巫祝尼媼之類尤宜疎絶要以清心省事為本媼音襖異色人謂不務常業之人巫祝皆事鬼神者尼女僧媼牙婆也此軰一接之内則伺意以納賄外則誑人以行私善敗事害政故當一切禁絶清心謂不以物欲累心省事謂不作無益之事後生少年乍到官守多為猾吏所餌不自省察所得毫末而一任之間不復敢舉動大抵作官嗜利所得甚少而吏人所盜不貲矣以此被重譴良可惜也少去聲猾音滑餌音耳省音醒復扶又切貲音咨譴去戰切猾狡猾餌釣餌不敢舉動為吏所制也不貲不可量也譴罪責也當官者先以暴怒為戒事有不可當詳處之必無不中若先暴怒只能自害豈能害人處上聲中去聲暴怒怒之暴者中中理也當官處事但務著實如塗摖文字追改日月重易押字萬一敗露得罪反重亦非所以養誠心事君不欺之道也處上聲著直略切摖音砌重平聲摖挑取也王吉上疏曰夫婦人倫大綱夭壽之萌也世俗嫁娶太蚤未知為人父母之道而有子是以教化不明而民多夭疏所助切漢王吉字子陽琅邪人疏奏疏也夭短命也萌芽也古者二十而嫁三十而娶後世反是嫁娶太蚤故民多夭未知為人父母之道而有子故教化不明文中子曰婚娶而論財夷虜之道也君子不入其鄉古者男女之族各擇徳焉不以財為禮虜音魯文中子姓王名通字仲淹隋之大儒也門人私謚曰文中子不入其鄉不與之共處也徳謂男女之性行財謂男之聘財女之資裝早婚少聘教人以偷妾媵無數教人以亂且貴賤有等一夫一婦庶人之職也少去聲媵以正切偷薄也媵從嫁者亂真氏謂内或䧟子弟於惡外或生僮僕之變是也等謂妾媵之等數也司馬温公曰凡議婚姻當先察其壻與婦之性行及家法如何勿苟慕其富貴行去聲婦家曰婚男家曰姻苟但也壻苟賢矣今雖貧賤安知異時不富貴乎苟為不肖今雖富盛安知異日不貧賤乎此言壻之性行當察也苟誠也不肖即不賢婦者家之所由盛衰也苟慕一時之富貴而娶之彼挟其富貴鮮有不輕其夫而傲其舅姑養成驕妬之性異日為患庸有極乎鮮上聲此言婦之性行當察也婦賢則家道盛不賢則家道衰故曰所繇盛衰借使因婦財以致富依婦勢以取貴苟有丈夫之志氣者能無愧乎富貴有命不可必得假使得之是亦妾婦之妾婦耳安定胡先生曰嫁女必湏勝吾家者勝吾家則女之事人必欽必戒娶婦必湏不若吾家者不若吾家則婦之事舅姑必執婦道安定地名先生名瑗字翼之宋泰州人欽欽敬戒戒謹吳氏曰女婦之性大率畏慕富盛而厭薄貧賤或問孀婦於理似不可取如何伊川先生曰然凡取以配身也若取失節者以配身是已失節也孀音霜取音娶下同此言孀婦不可取無夫曰孀又問或有孤孀貧窮無託者可再嫁否曰只是後世怕寒餓死故有是説然餓死事極小失節事極大此言孀婦不可再嫁顔氏家訓曰婦主中饋唯事酒食衣服之禮耳國不可使預政家不可使幹蠱如有聰明才智識達古今正當佐輔君子勸其不足必無牝雞晨鳴以致禍也食音似蠱音古牝毗忍切進食曰饋居中饋食婦人主之預干也幹猶主也蠱事也君子夫也牝雞雌雞也牝雞晨鳴婦人預政幹蠱之喻也婦人預政幹蠱則有敗亡之禍矣江東婦女略無交遊其婚姻之家或十數年間未相識者唯以信命贈遺致慇懃焉遺音位江東大江之東略無交遊絶不與外人往還也以用也信命以言贈遺以物皆所以通慇懃之意鄴下風俗專以婦持門戸爭訟曲直造請逢迎代子求官為夫訴屈此乃恒代之遺風乎鄴音業造土到切鄴下古之相州造請謂謁人於外逢迎謂延客於家恒代皆燕趙間地名燕太子丹不愛後宫美女以結士故其遺風如此夫有人民而後有夫婦有夫婦而後有父子有父子而後有兄弟一家之親此三者而已矣自兹以往至於九族皆本於三親焉故於人倫為重者也不可不篤夫音扶三親夫婦父子兄弟也九族髙曾祖父己身及子孫曾元九者及旁親也篤厚也三親於人倫為重不厚則無所不薄矣兄弟者分形連氣之人也方其幼也父母左提右挈前襟後裾食則同案衣則傳服學則連業遊則共方雖有悖亂之人不能不相愛也吳氏曰兄弟同出於父母故形分而氣同左提右挈謂父母左手引兄以行右手挈弟以走也前襟後裾謂兄前挽父母之襟弟後牽父母之裾也服著也及其壯也各妻其妻各子其子雖有篤厚之人不能不少衰也衰者相愛之情衰也娣姒之比兄弟則疎薄矣今使疎薄之人而節量親厚之恩猶方底而圎盖必不合矣唯友悌深至不為傍人之所移者免夫娣音弟姒音似為去聲長婦為姒少婦為娣疎薄謂娣姒親厚謂兄弟節量猶言裁處傍人亦謂娣姒免者免於衰也柳開仲塗曰皇考治家孝且嚴旦望弟婦等拜堂下畢即上手低面聽我皇考訓誡曰人家兄弟無不義者盡因娶婦入門異姓相聚爭長競短漸漬日聞偏愛私藏以致背戾分門割戸患若賊讐皆汝婦人所作男子剛腸者幾人能不為婦人言所惑吾見多矣若等寜有是耶退則惴惴不敢出一語為不孝事開軰抵此頼之得全其家云上上聲漸音尖漬音恣背音佩戾音利惴之瑞切開字仲塗宋大名人父沒稱皇考旦謂朔旦上手义手也漸漬為譖言如水之浸潤不驟也偏愛各有所欲也私蔵各冇所蓄也若汝也惴惴恐懼之貌抵此猶言至今全謂不分異云語辭伊川先生曰今人多不知兄弟之愛且如閭閻小人得一食必先以食父母夫何故以父母之口重於己之口也得一衣必先以衣父母夫何故以父母之體重於己之體也至於犬馬亦然待父母之犬馬必異乎己之犬馬也獨愛父母之子却輕於己之子甚者至若讐敵舉世皆如此惑之甚矣夫音扶下同衣去聲閭閻里巷之門也仇敵仇讐相敵也惑謂蔽惑而不知輕重也夫愛父母之口體犬馬重於己之口體犬馬者天理之明也愛父母之子輕於己之子者人欲之蔽也推其所明而逹之於其所蔽則弟矣横渠先生曰斯干詩言兄及弟矣式相好矣無相猶矣言兄弟宜相好不要相學猶似也人情大抵患在施之不見報則輟故恩不能終不要相學己施之而已好如字輟音拙已音紀斯干小雅篇名式語辭好和好輟止也朱子曰不要相學是不要相學其不好處如兄能愛其弟弟却不恭其兄兄豈可學弟之不恭而遂忘其愛但當盡其愛而已如弟能恭其兄兄却不愛其弟弟豈可學兄之不愛而遂忘其恭但當盡其恭而已伊川先生曰近世淺薄以相歡狎為相與以無圭角為相歡愛如此者安能久若要久湏是恭敬君臣朋友皆當以敬為主也歡狎為歡好而䙝狎也無圭角謂去方而為圓也橫渠先生曰今之朋友擇其善柔以相與拍肩執袂以為氣合一言不合怒氣相加朋友之際欲其相下不倦故於朋友之間主其敬者日相親與得效最速袂音寐善柔謂善為柔媚氣合謂意氣相合相下謂彼此相譲效即忠告善道之益也童蒙訓曰同僚之契交承之分有兄弟之義至其子孫亦世講之前軰專以此為務今人知之者盖少矣又如舊舉將及嘗為舊任按察官者後已官雖在上前軰皆辭避坐下坐風俗如此安得不厚乎分音問將去聲交承新舊官交代也舉將舉主也范文正公為叅知政事時告諸子曰吾貧時與汝母養吾親汝母躬執爨而吾親甘旨未嘗充也今而得厚禄欲以養親親不在矣汝母亦已早世吾所最恨者忍令若曹享富貴之樂也爨取亂切樂音雒公名仲淹字希文諡文正宋吳縣人公二歳而孤親謂母也爨炊爨也甘旨羙味也早世早沒也若曹汝軰也吾吳中宗族甚衆於吾固有親疎然吾祖宗視之則均是子孫固無親疎也苟祖宗之意無親疎則饑寒者吾安得不恤也自祖宗来積徳百餘年而始發於吾得至大官若獨享富貴而不恤宗族異日何以見祖宗於地下今何顔入家廟乎於是恩例俸賜常均於族人并置義田宅云恩例異數也俸賜常典也范氏義荘人日食米一升歳衣縑一匹嫁娶喪葬皆有給司馬温公曰凡為家長必謹守禮法以御羣子弟及家衆分之以職授之以事而責其成功制財用之節量入以為出稱家之有無以給上下之衣食及吉凶之費皆有品節而莫不均一裁省冗費禁止奢華常湏稍存贏餘以備不虞稱去聲贏音盈禮先王所制法國家所立御統也家衆婢僕軰也職如主庖廩掌田園之類事如治産業給征役之類量入以出入多則出多入少則出少也稱家以給有則豐無則儉也吉凶謂冠婚喪祭之事品節言其當均一言其平冗雜贏剰備防也不虞謂不可虞度之事如水火盗賊之類此皆制財用之節也右廣明倫李氏曰首十四章廣父子之親次十章廣君臣之義次八章廣夫婦之别次四章廣長幼之序次三章廣朋友之交末二章通論五倫之義董仲舒曰仁人者正其誼不謀其利明其道不計其功誼義同仲舒漢廣川人仁者心之徳仁人者無私欲而有其徳者也義者人心之裁制道者天理之自然功功效也朱子曰道是大綱説義是就一事上説正義未嘗不利明道豈必無功但不先以功利為心耳孫思邈曰膽欲大而心欲小智欲圎而行欲方行去聲思邈唐京兆人膽大謂敢為心小謂畏敬智圎謂通變行方謂有守古語云從善如登從惡如崩古語國語升高曰登墜下曰崩朱子曰善者天命所賦之本然惡者物欲所生之邪檅真氏曰從善如登善難進也從惡如崩惡易䧟也孝友先生朱仁軌隐居養親嘗誨子弟曰終身讓路不枉百歩終身譲畔不失一段先生字徳容孝友私謚也唐亳州人畔田界也終身讓路無枉百歩之時終身讓畔無失一叚之時何憚而不為乎濓溪周先生曰聖希天賢希聖士希賢濓溪地名先生名敦頤字茂叔宋道州人朱子曰希望也伊尹顔淵大賢也伊尹恥其君不為堯舜一夫不得其所若撻于市顔淵不遷怒不貳過三月不違仁朱子曰皆賢人之事也又曰三月言其久仁者心之徳不違仁者無私欲而有其徳也吳氏曰若撻於市言恥之甚也志伊尹之所志學顔淵之所學朱子曰此言士希賢也過則聖及則賢不及則亦不失於令名朱子曰三者隨其用力之淺深以為所至之近遠不失令名以其有為善之實也聖人之道入乎耳存乎心蘊之為徳行行之為事業彼以文辭而已者陋矣行去聲聖人之道仁義中正而已矣積於中為徳行道之體也發於外為事業道之用也陋謂卑陋仲由喜聞過令名無窮焉今人有過不喜人規如䕶疾而忌醫寜滅其身而無悟也噫朱子曰喜其得聞而改之規規諫悟悔悟噫傷痛聲過不改則為惡而速禍矣明道先生曰聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上達也約猶收也下學而上達下學人事而上達天理也朱子曰所謂反復入身來不是將已縱出底收拾轉來只是知求則心便在便是反復入身耒又曰能求放心則志氣清明義理昭著而可以上達矣心要在腔子裏腔音羗腔子猶言身子耳朱子曰心之為物至虚至靈神妙不測常為一身之主以提萬事之綱而不可有頃刻之不存者也一不自覺而馳騖飛揚以徇物欲於軀殻之外則一身無主萬事無綱雖其俯仰顧盼之間在己不自覺其身之所在矣又曰敬便在腔子裏伊川先生曰只整齊嚴肅則心便一一則自無非辟之干辟音僻整齊嚴肅如正衣冠尊瞻視之類一專一也盧氏曰外面整齊嚴肅則内面便一内面一則外面便無非僻之干伊川先生甚愛表記君子荘敬日彊安肆日偷之語盖常人之情纔放肆則日就曠蕩自簡束則日就規矩表記禮記篇名彊彊立也偷偷惰也常人以下程子釋記之言規所以為圎之器矩所以為方之器喻禮度也周氏曰安肆日偷亦言君子者謂雖為君子或安肆則日入於偷也人於外物奉身者事事要好只有自家一箇身與心却不要好苟得外物好時却不知道自家身與心已自先不好了也外物之奉身如飲食衣服宫室之類身不好謂身不簡心不好謂心不収伊川先生曰顔淵問克己復禮之目孔子曰非禮勿視非禮勿聽非禮勿言非禮勿動朱子曰克勝也已謂身之私欲也復反也禮者天理之節文也目條件也非禮者己之私也勿者禁止之辭是人心之所以為主而勝私復禮之機也四者身之用也由乎中而應乎外制乎外所以養其中也顔淵事斯語所以進於聖人後之學聖人者宜服膺而勿失也因箴以自警視聽言動皆身之用由心而出者也非禮勿視聽言動所以制外而養心也事從事也進者進歩幾及之意服著也膺胷也奉持而著之心胷之間也朱子曰繇中應外泛言其理如此耳制外養中方是説做工夫䖏其視箴曰心兮本虚應物無迹操之有要視為之則蔽交於前其中則遷制之於外以安其内克己復禮久而誠矣操平聲心之體本自虚明而其用則隨物而應無有形迹操而存之之要以視為則而已盖物欲之蔽交接於前則心隨之以遷此非禮之視所以當制也制之於外克己也以安其内復禮也至於真積力久則誠矣誠者從容不勉者也朱子曰人之視聽言動視最在先為操心之凖則其聽箴曰人有秉彝本乎天性知誘物化遂亡其正卓彼先覺知止有定閑邪存誠非禮勿聽性即理也人之秉彜乃得於天之正理也聽非禮則心之知為物所引誘與之俱化而正理遂亡矣惟彼先覺之人卓然自立知其所當止而志有定向故能防閑其邪妄於外而存其實理於内自然非禮勿聴之也其言箴曰人心之動因言以宣發禁躁妄内斯静專矧是樞機興戎出好吉凶榮辱惟其所召傷易則誕傷煩則支己肆物忤出悖来違非法不道欽哉訓辭躁音竈好字叶去聲易音異誕音但忤音誤宣布也人心有動於内因言以宣於外所謂言者心之聲也發發言也言不煩躁則心安静言不妄誕則心專一矧况也樞機喻言說見范魯公詩戎兵也好善也謂言能興戎出好且召吉凶榮辱也傷於輕易則妄誕傷於煩多則支蔓已放肆則忤於人出者逆則來者違四者言之病也道言也欽敬也訓辭訓戒之辭即非法不道也其動箴曰哲人知幾誠之於思志士勵行守之於為順理則裕從欲惟危造次克念戰兢自持習與性成聖賢同歸幾平聲行去聲造音操思者動於心也惟知幾之哲人能誠之為者動於身也惟勵行之志士能守之二者雖不同然皆順理則安裕從欲則危險也動於心造次而能念動於身戰兢而自持内外交致其力也習之久而與氣質之性俱成則賢亦聖矣故曰同歸一説聖性之也謂哲人賢習之也謂志士及其成功則一也故曰同歸朱子曰此章問答乃傳授心法切要之言程子之箴發明親切學者尤宜深玩伊川先生言人有三不幸少年登高科一不幸席父兄之勢為羙官二不幸有高才能文章三不幸也幸猶慶也席猶藉也少年登高科者學未優藉勢為羙官者人不稱有高才能文章者恒無徳以將之此三者皆不足以致遠故謂之不幸横渠先生曰學者捨禮義則飽食終日無所猷為與下民一致所事不踰衣食之間燕遊之樂耳樂音雒捨棄也猷為謀猷作為也下民下等之人也一致猶言同歸踰過也范忠宣公戒子弟曰人雖至愚責人則明雖有聰明恕己則昏爾曹但常以責人之心責己恕己之心恕人不患不到聖賢地位也公名純仁字堯夫忠宣諡也文正公之子朱子曰恕是推去的於己不當下恕字若欲修潤其語當曰以愛己之心愛人吳氏曰恕字之義范公盖以寛恕為言吕榮公嘗言後生初學且湏理㑹氣象氣象好時百事是當氣象者辭令容止輕重疾徐足以見之矣不惟君子小人於此焉分亦貴賤壽夭之所由定也當去聲公名希哲字原明宋東菜人封榮陽郡公理㑹謂省察矯揉之辭令出諸口容止見諸身乃徳之符也故端重安徐者為君子為貴為壽輕浮躁疾者為小人為賤為夭熊氏曰氣象不過言貌二者而已攻其惡無攻人之惡盖自攻其惡日夜且自㸃檢絲毫不盡則慊於心矣豈有工夫㸃檢他人耶慊苦簟切攻專治也攻其惡無攻人之惡孔子之言也盖發語辭士之檢身一念惡未盡去即有愧於心矣何暇責人哉大要前軰作事多周詳後軰作事多闕略大要猶言大抵周則無闕詳則不略用心勤密則作事多周詳用心疎怠則作事多闕略恩讐分明此四字非有道者之言也無好人三字非有徳者之言也後生戒之孔子曰以徳報徳以直報怨是恩讐不當分明也孟子曰人皆可以為堯舜是世未嘗無好人也張思叔座右銘曰凡語必忠信凡行必篤敬飲食必慎節字畫必楷正行去聲思叔名鐸宋河南人銘者自警之辭慎謂不苟食節謂不恣食楷謂不草率正謂不偏邪容貌必端莊衣冠必肅整歩履必安詳居處必正静處上聲皆敬也作事必謀始出言必顧行常徳必固持然諾必重應見善如已出見惡如已病行去聲事謀於始則無後悔言顧其行則非虚言常徳平常之徳持之固則不失然諾皆應辭應之重則思踐如已出冀已亦有是善也如已病恐已亦有是惡也凡此十四者我皆未深省書此當座隅朝夕視為警省察也警戒也胡文定公曰人湏是一切世味淡薄方好不要有富貴相孟子謂堂髙數仭食前方丈侍妾數百人我得志不為學者湏先除去此等嘗自激昻便不到得墜墮一切世味如飲食衣服居室之類淡薄謂食取充腹衣取蔽形居室取蔽風雨也富貴相驕奢之態也八尺曰仞方丈食饌列於前者方一丈也此所謂富貴相也激昻猶奮發也墜墮皆落也不以富貴為事嘗自激昻而為善則不淪於汙下矣常愛諸葛孔明當漢末躬耕南陽不求聞達後来雖應劉先主之聘宰割山河三分天下身都將相手握重兵亦何求不得何欲不遂乃與後主言成都有桑八百株薄田十五頃子孫衣食自有餘饒臣身在外别無調度不别治生以長尺寸若死之日不使廩有餘粟庫有餘財以負陛下及卒果如其言如此軰人真可謂大丈夫矣握一角切調去聲度去聲南陽地名先主漢昭烈也嘗三顧武侯於草盧之中宰宰制割分割三分天下謂昭烈居蜀曹操居中原孫權居江南分天下為三國也都猶居也握猶掌也成都郡名百畝為頃饒亦餘也調度猶言區畫長增益也尺寸猶言毫末背恩忘徳曰負躬耕南陽若將終身及為將相志惟興漢孟子稱大丈夫貧賤不能移富貴不能淫武侯有之矣范益謙座右戒曰一不言朝廷利害邊報差除二不言州縣官員長短得失三不言衆人所作過惡四不言仕進官職趨時附勢五不言財利多少厭貧求富六不言淫媟戲慢評論女色七不言求覔人物干索酒食媟音屑評音平覔音密索音色益謙名冲宋人利害謂事有利有害也邊報邊境之報也遣使曰差授官曰除無心失理為過有心悖理為惡媟狎也淫媟戲慢皆邪僻之事覔干索皆求也又曰一人附書信不可開拆沉滯開拆則干人之私沉滯則誤人之託二與人並坐不可窺人私書窺竊視也私書親故之書也三凡入人家不可看人文字文字如書簡簿籍之類四凡借人物不可損壞不還物如書籍器物之類五凢喫飲食不可揀擇去取謂揀擇以去其不可意者而取其可意者六與人同處不可自擇便利如夏擇清凉冬擇和暖之類七見人富貴不可歎羡詆毁詆音底慕之則歎羡惡之則詆毁凡此數事有犯之者足以見用意之不肖於存心修身大有所害因書以自警凡此數事學者所當察之於念慮之萌謹之於事為之著者也胡子曰今之儒者移學文藝干仕進之心以收其放心而美其身則何古人之不可及哉父兄以文藝令其子弟朋友以仕進相招往而不返則心始荒而不治萬事之成咸不逮古先矣胡子名宏字仁仲文定公之子言今之儒者學文藝而干仕進其用心最勤能移此心以存心修身雖古人亦可及也往而不返謂心馳逐於文藝仕進而不知返也心者萬事之本心既荒故萬事之成皆不及古之人矣顔氏家訓曰夫所以讀書學問本欲開心明目利於行耳夫音扶開心明目猶言推極知識也利者行無不得之謂未知養親者欲其觀古人之先意承顔怡聲下氣不憚劬勞以致甘腝惕然慙懼起而行之也腝音輭惕他歴切先意道迎父母之善意也惕然慙懼意吳氏曰先意而承順顔色怡聲而低下其氣所謂養志也不憚已之疲勞以營奉甘腝之飲食所謂養口體也此皆古人之所行者今因讀書學問而知之故必惕然慙懼興起而必欲行之也後五者文意皆倣此未知事君者欲其觀古人之守職無侵見危授命不忘誠諫以利社稷惻然自念思欲效之也守職無侵有官守者脩其職有言責者盡其忠也見危授命知有君而不知有身也不忘誠諫以利社稷知有國而不知有家也惻然感念意素驕奢者欲其觀古人之恭儉節用卑以自牧禮為教本敬者身基瞿然自失斂容抑志也瞿音句素平日也驕矜奢縱役於氣者也自收自處也禮以律人敬以立已瞿然自失貌收斂其容抑下其志則不驕奢矣素鄙悋者欲其觀古人之貴義輕財少私寡慾忌盈惡滿賙窮䘏匱赧然悔恥積而能散也悋音吝惡烏故切賙音周䘏恤同赧乃板切鄙鄙陋悋悋嗇慾貪欲也盈則溢故可忌滿則覆故可惡匱乏也赧然慙而面赤之貌積財而能散施則不鄙吝矣素暴悍者欲其觀古人之小心黜已齒弊舌存含垢藏疾尊賢容衆恭然沮喪若不勝衣也悍音旱黜音出􅚿音揑沮再吕切喪去聲勝音升猛㬥强悍剛惡也黜已自退抑也齒弊舌存喻强死而弱生也含垢猶言忍恥藏疾猶言隐惡衆謂衆人􅚿然沮喪貌謂自沮喪其㬥悍之氣也素怯懦者欲其觀古人之達生委命强毅正直立言必信求福不回勃然奮厲不可恐懼也怯乞葉切懦音糯怯耎懦弱柔惡也達生委命達生死之常理而委之命也求福不囘不為回邪之行以求福也勃然奮厲貌謂奮發振厲以去其怯懦也歴兹以往百行皆然縱不能淳去泰去甚學之所知施無不達世人讀書但能言之不能行之武人俗吏所共嗤詆良由是耳去上聲下同嗤音笞詆音邸兹指上文六者而言皆然謂皆如此取法古人也人能勇於力行雖或未至盡善而氣習之偏駁泰甚者亦必克而去之矣盖學之所知者能力行之自無不達也達即周子所謂行之利也嗤笑也詆毁也又有讀數十卷書便自高大凌忽長者輕慢同列人疾之如讐敵惡之如鴟梟如此以學求益今反自損不如無學也梟音鴞鴟梟惡鳥伊川先生曰大學孔氏之遺書而初學入徳之門也於今可見古人為學次第者獨頼此篇之存而其他則未有如論孟者故學者必由是而學焉則庶乎其不差矣大學之書古之大學所以教人之法孔子誦而傳之以詔後世者也徳之為言得也行道而有得於心也門以比大學之書盖入徳必由乎大學譬之入室必由乎門也為學次第謂格物致知誠意正心脩身齊家治國平天下有先後之序也是指大學而言凡看語孟且湏熟讀玩味將聖人之言語切記不可只作一場話說看得此二書切已終身儘多矣孔孟之言皆實理也熟讀其辭玩味其理而著之於已則終身用之不能盡矣讀論語者但將弟子問處便作己問將聖人答處便作今日耳聞自然有得若能於論孟中深求玩味將来涵養成甚生氣質讀書當體認歸已不徒誦説而已輔氏曰將來涵養成謂後来涵養成就也新安陳氏曰甚生氣質謂愚者明柔者强生出好氣質也横渠先生曰中庸文字軰直湏句句理㑹過使其言互相發明理㑹謂深求玩味之互交互也朱子曰張子之言真讀書之要法不但可施於中庸也六經湏循環理㑹儘無窮待自家長得一格則又見得别古者以易詩書禮樂春秋為六經循環謂周而復始此理㑹亦謂深求玩味也儘無窮謂義理無窮盡也長一格謂學有進也學進則所見益髙矣吕舍人曰大抵後生為學先湏理㑹所以為學者何事舍人吕本中也嘗為中書舍人此理㑹猶言識得也盖學所以為道如下文行止語黙湏要盡合道理及求古聖賢用心竭力從之是已非為作文章取官禄計也後生為學先湏識得此意然後志定而徳業可成一行一住一語一黙湏要盡合道理黙不言也學業則湏是嚴立課程不可一日放慢每日湏讀一般經書一般子書不湏多只要令精熟湏静室危坐讀取二三百遍字字句句湏要分明又每日湏連前三五授通讀五七十遍湏令成誦不可一字放過也史書每日湏讀取一卷或半卷以上始見功湏是從人授讀疑難處便質問求古聖賢用心竭力從之難去聲經書聖人之書子書賢人之書史書紀事之書危坐猶正坐也質正也經書子書必讀之精熟反覆玩味然後文義可通史書必讀一卷半卷以上然後事之本末可見皆必從師友授而讀之有疑難則取正審問乃不差也如是以求古聖賢所以用心而盡力從之道將為我有矣夫指引者師之功也行有不至從容規戒者朋友之任也決意而往則湏用已力難仰他人矣從音聰仰去聲仰資也吕氏童䝉訓曰今日記一事明日記一事久則自然貫穿今日辨一理明日辨一理久則自然浃洽穿去聲浃音接洽音匣此致知之事久謂日日如此無間斷也貫穿通透也理即事中之理辨謂辨其是非浃洽謂心與理相涵矣今日行一難事明日行一難事久則自然堅固此力行之事堅固則身與事相安矣渙然氷釋怡然順理久自得之非偶然也釋消也林氏曰渙然觧散如春冰之釋怡然喜悦而衆理皆順前軰嘗説後生才性過人者不足畏惟讀書尋思推究者為可畏耳又云讀書只怕尋思盖義理精深惟尋思用意為可以得之鹵莽厭煩者决無有成之理鹵音魯莾母黨切鹵莾不用心也熊氏曰人有才貴乎有學非學無以充其才有學貴乎有思非思無以充其學故後生可畏者非以其才之難既能學而又能思者為難也夫義理散在簡冊之中聖賢之言不可以粗看不可以淺窺若鹵莽厭煩則何由知聖賢用心而窮其義理乎顔氏家訓曰借人典籍皆湏愛䕶先有缺壞就為補治此亦士大夫百行之一也為行並去聲百行大而忠君孝親小而手容恭足容重皆是借人器物皆湏保䕶况書籍乎或先損壊即為修補完好實士君子之一行也濟陽江禄讀書未竟雖有急速必待卷束整齊然後得起故無損敗人不厭其求假焉卷音捲濟陽縣名禄字彦遐竟終也假借也讀書雖遇急事必整束而起此亦可見其處事敬謹宜乎人不厭其求借也或有狼籍几案分散部帙多為童幼婢妾所㸃汚風雨蟲鼠所毁傷實為累徳吾每讀聖人書未嘗不肅敬對之其故紙有五經詞義及聖賢姓名不敢他用也籍音席汚累並去聲狼籍草而臥去則穢亂故物之散亂曰狼籍部帙書冊卷帙也散汚經書實累大徳故顔氏書以為世戒且云舊紙有經書之文聖賢之姓名皆不當别用所以廣敬也明道先生曰君子教人有序先傳以小者近者而後教以大者遠者非是先傳以近小而後不教以遠大也小者近者謂灑掃應對進退之節大者遠者謂明徳新民之事明道先生曰道之不明異端害之也昔之害近而易知今之害深而難辨昔之惑人也乗其迷暗今之入人也因其髙明道者聖人之道也異端非聖人之道而别為一端如楊墨老佛是也昔之害謂楊墨今之害謂佛氏葉氏曰淺近故迷暗者為所惑深微故髙明者反䧟其中朱子曰楊墨只是硬恁地做為我兼愛做得来也淺不能惑人佛氏最有精微動人處從他説愈深愈害人又曰他劈初頭便錯了如天命之謂性他把這箇便都做空虚説了吾儒見得都是實自謂之窮神知化而不足以開物成務言為無不周徧實則外於倫理窮深極微而不可以入堯舜之道天下之學非淺陋固滯則必入於此言為夏氏曰所言所為也佛氏空寂之教自謂通神明之徳知變化之道語大包法界語小入微塵或陳説道徳指陳心性皆朱子所謂彌近理而大亂真者也開物謂人所未知者開發之成務謂人之欲為者成全之如三皇五帝造書契教稼穡制衣服宫室之類是也倫理謂父子君臣夫婦長幼朋友之倫有親義别序信之理也堯舜之道即倫理也淺陋固滯如刑名術數之説記誦詞章之習皆是道不明故天下之學不入於淺陋固滯必入於佛氏之空寂自道之不明也邪誕妖妄之說競起塗生民之耳目溺天下於汚濁雖髙才明智膠於見聞醉生夢死不自覺也楊墨老佛皆邪誕妖妄之説也塗猶塞也溺猶䧟也膠猶泥也覺悟也言其迷溺之深如醉如夢自生至死而不悟也是皆正路之蓁蕪聖門之蔽塞闢之而後可以入道正路喻聖道蓁草盛貌蕪荒也闢開也右廣敬身李氏曰首十六章廣心術之要次四章廣威儀之則次三章廣衣服之制及飲食之節後十三章通論為學之道御定小學集註卷五
