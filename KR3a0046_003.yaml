body:
  text: 欽定四庫全書御定小學集註卷三内篇敬身第三敬身者敬以持身也許文正公曰敬身之目其别有四心術威儀衣服飲食心術正乎内威儀正乎外則敬身之大體得矣其衣服飲食所以奉身也苟不制之以義節之以禮将見其所以養人者反害於人也分而言之心術威儀脩徳之事也衣服飲食克己之事也統而言之皆敬身之要也葢惟敬身故於父子君臣夫婦長幼朋友之間無施而不可此古人脩身必本於敬矣凡四十六章孔子曰君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本傷其本枝從而亡與平聲身之於親猶木之有枝親之於身猶木之有本仰聖模景賢範述此篇以訓䝉士仰慕也景猶向也聖賢之言為天下後世法故曰模範丹書曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶丹書書名師尚父所以告武王者敬敬畏怠怠慢滅亡也義者天理之公欲者人欲之私從順也真氏曰敬則萬善俱立怠則萬善俱廢義則理為之主欲則物為之主吉凶存亡之所由分也曲禮曰毋不敬儼若思安定辭安民哉黄氏曰毋禁止辭儼矜荘貌人之坐思貌必儼然安定審也毋不敬正其心也儼若思正其貌也安定辭正其言也安民哉正已而物正也敖不可長欲不可從志不可滿樂不可極從音縱敖者矜已慢物之謂欲謂飲食男女之欲馬氏曰敖不可長必消而絶之欲不可縱必克而止之志不可滿必損而抑之樂不可極必約而歸於禮賢者狎而敬之畏而愛之愛而知其惡憎而知其善積而能散安安而能遷狎謂素親狎安安謂安其所安朱子曰此言賢者於其所狎能敬之於其所畏能愛之於其所愛能知其惡於其所憎能知其善雖積財而能散施雖安安而能遷義可以為法與上下文禁戒之辭不同臨財毋苟得臨難毋苟免狠毋求勝分毋求多難去聲苟苟且分分財毋苟得見利思義也毋苟免見危授命也毋求勝忿思難也毋求多患不均也疑事毋質直而勿有質成也事有疑則闕之不可以己意斷也朱子曰兩句連說為是疑事毋質即少儀所謂毋身質言語也直而勿有謂陳我所見聽彼決擇不可據而有之専務强辯不然則是以身質言語也孔子曰非禮勿視非禮勿聽非禮勿言非禮勿動此答顔淵問仁也朱子曰非禮者己之私也勿者禁止之辭又曰但有些箇不循道理處便是非禮也出門如見大賔使民如承大祭己所不欲勿施於人此答仲弓問仁也出門如賔使民如祭敬以持己也己所不欲勿施於人恕以及物也居處恭執事敬與人忠雖之夷狄不可棄也處上聲此答樊遲問仁也之往也夷東夷狄北狄朱子曰恭主容敬主事恭見乎外敬主乎中雖之夷狄不可棄勉其固守而勿失也蔡氏曰諸子問仁而所答各異者因其所稟之資而發也言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉此答子張問行也盡己之謂忠以實之謂信篤厚也篤敬厚而敬也蠻南蠻貊北狄二千五百家為州二十五家為里乎哉疑辭君子有九思視思明聽思聰色思温貌思恭言思忠事思敬疑思問忿思難見得思義朱子曰視無所蔽則明無不見聽無所壅則聰無不聞色見於面者貌舉一身而言思問則疑不蓄思難則忿必懲思義則得不苟曽子曰君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣遠去聲下同倍音佩朱子曰貴猶重也容貌舉一身而言斯猶即也暴粗厲也慢放肆也信實也正顔色而近信則非色荘也辭言語氣聲氣也鄙几陋也倍與背同謂背理也言道雖無所不在然君子所重者在此三事而已是皆修身之要為政之本學者所當操存省察而不可有造次顛沛之違者也曲禮曰禮不踰節不侵侮不好狎脩身踐言謂之善行好去聲行去聲踰越也節謂上下之等級侵侮侵犯而侮慢也好狎好為褻狎也三者禮之所禁也脩治其身踐行其言二者行之善者也然禮之實亦不外是也樂記曰君子姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪辟之氣不設於身體使耳目鼻口心知百體皆由順正以行其義慝音忒辟音僻姦聲亂色聲色之不正者也淫樂慝禮禮樂之不正者也不留聰明謂不停於耳目不接心術謂不入於念慮由從也眞氏曰君子之所以自養者無他内外交致其功而已姦聲亂色不留聰明養其外也淫樂慝禮不接心術養其内也惰慢之氣自内出者也邪辟之氣自外入者也二者不設於身體如是則外而耳目鼻口百體内而心知皆由順正以行其義自養之功畢矣孔子曰君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也已朱子曰不求安飽者志有在而不暇及也敏於事者勉其所不足慎於言者不敢盡其所有餘也然猶不敢自是而必就有道之人以正其是非則可謂好學也矣管敬仲曰畏威如疾民之上也從懐如流民之下也見懐思威民之中也管敬仲齊大夫名夷吾威刑名也疾疾病也懐貪欲也流謂水之流畏威如疾懐刑之君子也從懐如流懐惠之小人也見懐思威畏則君子不畏則小人矣右明心術之要冠義曰凡人之所以為人者禮義也冠去聲冠義禮記篇名人之所以異於禽獸者以其有禮義也冠者成人之道故以是責之禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而後禮義備以正君臣親父子和長㓜君臣正父子親長㓜和而後禮義立順謂順理立猶成也曲禮曰毋側聽毋噭應毋淫視毋怠荒遊毋倨立毋跛坐毋箕寝毋伏斂髮毋髢冠毋免勞毋袒暑毋褰裳噭音呌倨音句跛音庇髢音替袒音但褰音牽側聽側耳以聽也噭應髙急以應也淫視流動而視也怠荒容止放縱也遊行也倨傲慢也跛偏任一足也箕兩展其足如箕也伏覆其身也髢髲也言垂如髲也免脫去也袒露臂也褰揭也袒衣所以息倦褰裳所以取凉凡此數者皆不敬也敬身之要禁止乎此而已矣登城不指城上不呼呼去聲指則惑人之見呼則惑人之聞将適舍求毋固適舍就主人之館也有所求而堅欲得之非為客之道矣将上堂聲必揚户外有二屨言聞則入言不聞則不入上上聲屨音句聞音問下同陳氏曰上堂升主人之堂也揚其聲者使内人知之也古人脫屨在户外客雖衆脫屨於户内者惟長者一人言有二屨則并户内一屨為三人矣三人而所言不聞於外必是密謀故不入也古者即席則去屨不以屨踐席将入户視必下入户奉扄視瞻毋回户開亦開户闔亦闔有後入者闔而勿遂奉音捧扄涓熒切陳氏曰入户入主人之户也視下不舉目也扄門關木也入户之時兩手當心如奉扄然雖視瞻而不為廻轉嫌於干人之私也開闔皆如前不違主人之意也遂闔之盡也嫌于拒後來者故勿遂毋踐屨毋踖席摳衣趨隅必慎唯諾踖音迹摳苦侯切唯音委此即席之儀踐屨踏他人之屨也踖席躡他人之席也摳揭也陳氏曰欲便於坐故摳之趨隅由席角而升坐也唯諾皆應辭既坐定又當謹於應對也禮記曰君子之容舒遲見所尊者齊遫齊荘皆切遫音速舒遲閒雅也燕居之容齊遫謹飭也敬所尊之意足容重手容恭目容端口容止聲容靜頭容直氣容肅立容徳色容荘重舉欲遲也恭高且正也端不邪視也止不妄言也靜不噦咳也直不傾顧也肅似不息也徳謂中立不倚儼然有徳之氣象荘矜持之貌朱子曰九者皆敬之目即此是涵養本原也曲禮曰坐如尸立如齊齊荘皆切尸以象神齊以交神朱子曰皆敬之目也少儀曰不窺密不旁狎不道故舊不戲色窺覘人隠處狎與人褻狎言知識之過失為戱侮之容色皆非厚重之事毋拔來毋報往拔蒲末切報音赴拔赴皆疾也朱子曰來往只是向背之意言人見有箇好事火急歡喜去做這様人不耐久少間心懶意闌則速去之矣所謂其進銳者其退速也毋瀆神毋循枉毋測未至毋瀆神敬鬼神而逺之也毋循枉過則勿憚改也毋測未至不逆詐不億不信也毋訾衣服成器毋身質言語訾音子訾毁也人之衣服及已成之器不可毁其不善也質成也言語之際疑則闕之不可以己意斷也論語曰車中不内顧不疾言不親指朱子曰内顧回視也三者皆失容且惑人此章記孔子升車之容曲禮曰凡視上於面則敖下於帶則憂傾則姦敖音傲呂氏曰上於面者其氣驕知其不能下人矣下於帶者其神奪知其憂在乎心矣視流則容側必有不正之心存乎胷中矣此君子之所慎也論語曰孔子於鄉黨恂恂如也似不能言者恂音荀朱子曰恂恂信實之貌似不能言者謙卑遜順不以賢知先人也鄉黨父兄宗族之所在故孔子居之其容貌辭氣如此其在宗廟朝廷便便言唯謹爾朱子曰便便辯也宗廟禮法之所在朝廷政事之所出言不可以不明辯故必詳問而極言之但謹而不放爾朝與下大夫言侃侃如也與上大夫言誾誾如也誾音銀朱子曰此君未視朝時也侃侃剛直也誾誾和悅而諍也此章記孔子在鄉黨宗廟朝廷言貌之不同孔子食不語寝不言朱子曰答述曰語自言曰言范氏曰聖人存心不他當食而食當寝而寝言語非其時也士相見禮曰與君言言使臣與大人言言事君與老者言言使弟子與㓜者言言孝弟於父兄與衆言言忠信慈祥與居官者言言忠信大人即大夫也老者人之父兄㓜者人之子弟衆謂衆人居官者謂上士至庶人在官者言使臣則以禮言事君則以忠言使弟子則以慈愛祥猶善也論語曰席不正不坐謝氏曰聖人心安於正故於位之不正者雖小不處子見齊衰者雖狎必變見冕者與瞽者雖褻必以貌齊音咨衰音崔瞽音古褻音屑齊衰喪服也狎謂素親狎變謂變其容色冕有爵者瞽無目者褻謂燕見貌謂禮貌范氏曰聖人之心哀有喪尊有爵矜不成人凶服者式之式負版者朱子曰式車前横木有所敬則俯而慿之負版持邦國圖籍者式此二者哀有喪重民數也禮記曰若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐迅音信迅急也變謂變其容色興起也皆所以敬天之怒論語曰寢不尸居不容尸屍通用朱子曰尸謂偃卧似死人也居居家容容儀此章記孔子之事子之燕居申申如也夭夭如也朱子曰燕居閑暇無事之時楊氏曰申申其容舒也夭夭其色愉也程子曰今人燕居之時不怠惰放肆必太嚴厲唯聖人便自有中和之氣曲禮曰竝坐不橫肱授立不跪授坐不立肱姑横切肱臂也不横肱為妨竝坐者授以物與人也不跪不立為不便於受者入國不馳入里必式吳氏曰國國都馳馳驟車馬也不馳者恐傷人也二十五家為里式說見前章必式者恐里中有賢人也少儀曰執虚如執盈入虚如有人執虚器加執盈滿之器入虚室如入有人之室敬心常存也禮記曰古之君子必佩玉右徵角左宫羽徵音止佩玉比徳也徵角宫羽玉聲所中也左右之分互文耳不言商者亦以文不偶而遺之也必求其取義則泥矣趨以采薺行以肆夏周還中規折還中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞鸞和之聲行則鳴佩玉是以非辟之心無自入也薺音慈還音旋下同中音衆下同辟音僻自由也通上文而言君子以禮樂養其心故非違邪僻之心無由而入也朱子曰周旋是直去了却回來其回轉處欲其圓如規也折旋是直去了復橫去其横轉處欲其方如矩也陳氏曰路寝門外至應門曰趨趨則歌采薺之詩以為節路寝門内至堂曰行行則歌肆夏之詩以為節進而前則其身略俯故曰揖退而後則其身微仰故曰揚進退俯仰皆得其節故佩玉之聲鏘然而鳴焉鸞和皆車上之鈴也方氏曰心雖在内有物引之而出及其久也則與物俱入矣射義曰射者進退周還必中禮内志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀徳行矣還音旋中音衆行去聲射義禮記篇名方氏曰進退者升降之節周還者揖讓之容内志正然後持弓矢審外體直然後持弓矢固惟固也故其力能至惟審也故其巧能中動必合禮而志正體直有徳行者也故曰可以觀徳行也右明威儀之則士冠禮始加祝曰令月吉日始加元服棄爾幼志順爾成徳壽考維祺介爾景福冠音貫令去聲祺音其士冠禮儀禮篇名古者二十而冠筮日筮賔三加而三祝之始加用緇布冠令吉皆善也元首也元服謂冠也爾汝順從祺祥也介景皆大也棄童幼之志而從成人之徳斯有夀考之祥而介大福矣再加曰吉月令辰乃申爾服敬爾威儀淑慎爾徳睂壽萬年永受胡福再加用皮弁辰時也申重也有威而可畏謂之威有儀而可象謂之儀淑善也睂夀老人以秀睂為夀徵也胡猶遐也敬威儀而善謹其徳則睂夀萬年而永享遐福矣三加曰以歲之正以月之令咸加爾服兄弟具在以成厥徳黃耉無疆受天之慶耉音苟疆音姜三加用爵弁正猶善也咸猶盡也兄弟具在祝其無故也黃謂髪白而復黃耉凍梨也老人面色如之皆壽徴也疆猶限也徳既成則有無疆之壽而受天之福慶也曲禮曰為人子者父母存冠衣不純素孤子當室冠衣不純采純音准下同冠飾衣緣皆曰純不純素樂也不純采哀也幼而無父曰孤當室為父後者雖除喪猶純素加隆也衆子則否論語曰君子不以紺緅飾紺古暗切緅音鄒朱子曰君子謂孔子紺深青揚赤色齊服也緅綘也三年之喪以飾練服者飾領縁也張氏曰紺緅不以飾重喪祭也紅紫不以為䙝服朱子曰紅紫間色不正且近於婦人女子之服也䙝服私居服也當暑袗絺綌必表而出之袗音軫絺音笞綌乞逆切朱子曰袗單也葛之精者曰絺麤者曰綌表而出之謂先著裏衣表絺綌而出之於外欲其不見體也去喪無所不佩去上聲朱子曰君子無故玉不去身觿礪之屬亦皆佩也孔子羔裘𤣥冠不以弔羔裘用黑羊皮為之元黑色朱子曰喪主素吉主元弔必變服所以哀死此三章皆記孔子衣服之制禮記曰童子不裘不帛不屨絇屨音句絇音劬絇屨頭飾不裘不帛不備服也不屨絇不盡飾也皆以其未成人也孔子曰士志於道而恥惡衣惡食者未足與議也朱子曰心欲求道而以口體之奉不若人為恥其識趣之卑陋甚矣何足與議於道哉右明衣服之制曲禮曰共食不飽共飯不澤手飯上聲食者所食非一品飯者止飯而已共食而求飽非讓道也古之飯者以手共飯而手有汗澤人将惡之矣毋摶飯毋放飯毋流歠摶音團上飯去聲下飯音反歠昌悅切取飯作摶則易得多是欲爭飽也放飯大飯食無節也流歠長歠飯無節也毋咤食毋齧骨毋反魚肉毋投與狗骨毋固獲咤丑亞切齧魚列切咤謂以舌作聲反謂還之器中固獲謂必欲取之毋咤食毋齧骨皆嫌不謹也毋反魚肉為已歴口人所穢也毋投與狗骨慮其相噬也毋固獲嫌貪食也毋揚飯飯黍毋以箸上飯去聲下飯音反箸音住陳氏曰揚謂散其熱氣嫌欲食之急也毋以箸取匙之便也毋嚃羮毋絮羮毋刺齒毋歠醢客絮羮主人辭不能烹客歠醢主人辭以窶嚃音塔絮音處刺音戚歠昌悅切下同醢音海窶音巨嚃謂羮有菜以口嚃食之絮謂羮無味就器調和之刺猶剔也歠謂詳味之毋嚃羮宜以箸也毋刺齒亦嫌不謹也毋絮羮毋歠醢皆惡貪味也辭不能烹煑辭以貧窶葢主人不當正客之失但遜謝之而已濡肉齒決乾肉不齒決毋嘬炙濡音如乾音干嘬初􅏜切炙音柘濡濕也決斷也乾肉脯類濕肉以齒斷之乾肉以手治之各有宜也炙炙肉一食盡臠曰嘬毋嘬炙謂宜以漸食之少儀曰侍食於君子則先飯而後已毋放飯毋流歠小飯而亟之數噍毋為口容飯音反下俱同亟音擊數音朔噍在笑切君子三達尊之稱先飯者嘗食之禮後己者勸食之意放飯流歠說見前章小口而飯備噦噎也亟疾而嚥備見問也數數而嚼易至於弄口為容故又以為戒論語曰食不厭精膾不厭細食音似膾音檜朱子曰食飯也精鑿也牛羊與魚之腥聶而切之為膾食精則能養人膾麤則能害人不厭言以是為善非謂必欲如是也食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食食音似饐於計切餲於賣切餒奴罪切飪而甚切臭氣也朱子曰饐飯傷熱濕也餲味變也魚爛曰餒肉腐曰敗色惡臭惡味敗而色臭變也飪烹調生熟之節也不時五穀不成果實未熟之類此數者皆足以傷人故不食割不正不食不得其醤不食朱子曰割肉不方正者不食造次不離於正也食肉用醤各有所宜不得則不食惡其不備也此二者無害於人但不以嗜味而苟食耳肉雖多不使勝食氣唯酒無量不及亂食音似朱子曰食以榖為主故不使肉勝食氣酒以為人合懽故不為量但以醉為節而不及亂耳沽酒市脯不食朱子曰沽市皆買也恐不精潔或傷人也不撤薑食撤直列切撤去也朱子曰薑通神明去穢惡故不撤不多食朱子曰適可而止無貪心也此一節記孔子飲食之節禮記曰君無故不殺牛大夫無故不殺羊士無故不殺犬豕君子逺庖廚凡有血氣之類弗身踐也豕音矢逺去聲踐當作剪故謂祭祀及賔客之禮庖宰殺之所廚烹飪之所身親也剪殺也樂記曰豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也是故先王因為酒禮一獻之禮賔主百拜終日飲酒而不得醉焉此先王之所以備酒禍也豢音患豢養也為造也獄訟益繁為小人乗醉相侵以致獄訟滋多也士之酒禮惟行一獻百拜言多也酒所以合懽先王因其生禍而制禮以防之葢通乎上下記特舉士以例其餘耳孟子曰飲食之人則人賤之矣為其養小以失大也為去聲飲食之人専養口腹者也小謂口腹大謂心志右明飲食之節御定小學集註巻三
